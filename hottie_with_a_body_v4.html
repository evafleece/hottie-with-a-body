her over time.\nPogo hops are not meant to tire you out or be particularly challenging - it's more about\nbuilding elasticity and resiliency in your calves and achilles!\nALTERNATIVES:\n\n1️⃣ Deep Squat Jump Plyos: 3 sets of 8-10 with 30 seconds rest between sets. Your heels\ncan pick up in the bottom position - in fact, your weight should be slightly shifted forward.\n\nThese Squat Jumps are an example of \"Deep Tier\" plyos where the goal is to create force\nthrough greater ranges of motion. The Pogo Hops above are an example of \"Shallow Tier\"\nplyos where the goal is to be quicker and more elastic. Both are important to expose\nyourself to so pick the one that you feel best aligns with your goals!\n\n⭐ Try to increase by one repetition or add weight each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB 1\" Power Snatch: 4 sets of 2 reps at a 6-7 RPE with 60-90 seconds rest between\nsets. Start by lifting the bar 1 inch off the floor, pause briefly and maintain position and\nalignment, and then complete the snatch. Aim to increase the weight by 2.5-5 lbs each\nweek as you progress.","variations":[],"rpe":""},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"4 sets of 5 at a 7-8 RPE of ONE of the following","notes":"B1) Deadlift Variations\n4 sets of 5 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Rotation","exercise":"1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Ba","sets_info":"3 sets of 8-10 reps each side","notes":"B2) Core: Rotation\n\n➡️ 1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Band\nRotations: 3 sets of 8-10 reps each side at a 8 RPE. Choose from one of the following\n\nmoves that incorporate core rotation - each of them use a different implement\n(kettlebells/dumbbells, landmine attachments, and bands/cable machine) so choose the\nmost convenient option for you!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1/2 Kneeling Quick KB Lifts","Angled BB Rotations","Wide 1/2 Kneeling Cable/Ba"],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2KB Rear Foot Elevated Split Squat Alternating Pick Ups","sets_info":"3 sets of 8 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 2KB Rear Foot Elevated Split Squat Alternating Pick Ups: 3 sets of 8 reps on each side\nat a 8 RPE. Superset (alternate sets) with the C2 movement down below.\n\nThis is a challenging move to coordinate, but you receive some serious stability benefits\nout of it! You'll feel your core and hip stabilizers working overtime as you continuously\nalternate which side the load is on!\nALTERNATIVES:\n\n1️⃣ 2DB Rear Foot Elevated Split Squat OR 2DB Split Squat: 3 sets of 10 reps on each side\nat a 6-7 RPE. If the Alternating Pick Ups feel a bit too cumbersome, feel free to opt for\ntraditional Rear Foot Elevated Split Squats or standard Split Squats instead!\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 6 reps on each side at a 7-8 RPE. If\n\nyou're working on Pistol Squats specifically, you can opt for this progression instead! It is\nworth mentioning though that the stronger you are with the Rear Foot Elevated Split\nSquat, the easier Pistol Squats become so make sure you establish a solid strength base\nfirst with RFE Split Squats!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C2","label":"Isolation: Delts","exercise":"2KB OR 2DB Z-Press","sets_info":"3 sets of 8 reps","notes":"C2) Isolation: Delts\n\n➡️ 2KB OR 2DB Z-Press : 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds\nbefore returning to C1.\n\nBy taking your legs out of the equation, it forces your trunk and upper back to work even\nharder to stabilize!\nALTERNATIVES:\n\n1️⃣ 2DB Rainbow Flye to Slow Lower: 3 sets of 8 at a 8 RPE. If you'd rather perform a\n\nlateral raise alternative to really isolate the delts, then opt for these Rainbow Flyes with a\nSlow Lower instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2KB","2DB Z-Press"],"rpe":"8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 10. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10. Use a band thickness that allows you\nto get about 12 reps, but only do 10 so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 8 reps at a 7-8 RPE with a 2 second isometric hold at the\n\nbottom of each rep. This is a great option if you're not a fan of pull-ups, but still want to\nmimic the overhead pulling pattern. You can use the lat pulldown machine at your gym or\nset up a band on a pull-up bar/door frame to perform your pulldowns. Also, these can be\ndone with one arm at a time.\n\n2️⃣ 2DB OR 2KB Bent Over Seesaw Row: 3 sets of 8 reps each side at a 7-8 RPE. The\nSeesaw nature of these rows challenge your core significantly and help to improve\nrotation at your trunk!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"1KB Goblet Staggered Stance Squat","sets_info":"3 sets of 8 reps each side","notes":"D2) Multi-Planar Variations\n➡️ 1KB Goblet Staggered Stance Squat: 3 sets of 8 reps each side at a 7-8 RPE. After\neach set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n1️⃣ 1KB Goblet Staggered Stance Squat to Lateral Lunge: 3 sets of 6 reps ","variations":[],"rpe":"7-8"},{"id":"E","label":"Finisher","exercise":"Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), W","sets_info":"4 sets of 10-12 reps","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill\n(1x)\n\nThat's one rep on one side.\nPerform 3 reps in a row without setting the weight down. Then switch sides for an\nadditional 3 reps.\nThat's one set.\nPerform 3 total sets with 60 seconds rest in between sets.\nYou can choose between kettlebells or dumbbells!\n\n⭐ Each week, try to increase weight, reps, or add an additional round for progressive\noverload.\n\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set for\nyour glutes:\n\n1️⃣ Single-Leg KAS Hip Lift: 3-4 sets of 10-12 reps at a 9 RPE with 60-90 seconds rest\n\nbetween sets. Use your bodyweight or a moderate to light weight and go for high reps and\na pump here! Control the eccentric, pause at the top, and keep constant tension on the\nglutes.\n\n⭐ Each week, try to add weight, increase reps, or slow down the tempo even further to\nmaximize tension!","variations":[],"rpe":""}]},{"id":"W2D4","week":2,"day":4,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Alternating Deep Speed Skater Series","sets_info":"3 sets of 6-8 reps each side with 30 seconds","notes":"A) Power Development - Day 4\n\n➡️ Alternating Deep Speed Skater Series: 3 sets of 6-8 reps each side with 30 seconds\n\nrest in between sets. This exercise is not part of a superset. Complete all sets before moving on\nto the B superset.\nDuring traditional Speed Skaters, the goal is to travel further horizontally with minimal\nknee bend. During these Deep Speed Skaters, we'd love to see you focus more on\ntraveling further vertically with more knee bend!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":[],"rpe":""},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"3 sets of 5 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at\na 20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at a\n\n20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells! If you're\nexperienced with overhead pressing and would like to challenge your overhead strength\nwith more weight than you can handle with a strict press, then opt for these Push Presses\ninstead.\n\n📝 If you were on RISE last month, lower the weight down by about 5-10% from the\n\nweight you used last week, and then increase by 2.5-5lbs each week thereafter. This note\nis only relevant for your *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye","sets_info":"","notes":"B2) Isolation: Rear Delts\n\n➡️ 1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye: 3 sets of\n10 reps (each side for the 1DB move) at a 8 RPE. Both work the rear delts similarly choose either one!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1DB Side Lying Bench Rear Delt Flye","Band/Cable Rear Delt Crossover Flye"],"rpe":"8"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side","sets_info":"3 sets of as many reps as possible","notes":"C1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side\n\nTransfer: 3 sets of as many reps as possible. Choose the variation that allows you to get\naround 10-12 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Bench Press: 3 sets of 10 reps at a 7 RPE. Supplement the heavier bench press\nwork we do on Day 2 with lighter, higher rep work on Day 4!\n\n2️⃣ 2DB Incline Flyes: 3 sets of 10 reps at a 7 RPE. If you're looking for more pec isolation,\nopt for the Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you\nhave access to one! Get 3 sets of 12-15 reps at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","Push Up w/ MB Side to Side"],"rpe":""},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"2DB Step Up to Knee Drive","sets_info":"3 sets of 6 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 2DB Step Up to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. After each set,\nrest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 2DB Reverse Lunge to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. Choose\nthis option if you want to work similar muscles and movements but don't have access to a\nbox for step ups!\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Carry Variations - Day 4","exercise":"2KB Farmer Carry","sets_info":"3 sets of 45 second carries","notes":"D1) Carry Variations - Day 4\n\n➡️ 2KB Farmer Carry: 3 sets of 45 second carries at a 9 RPE. Superset (alternate sets)\nwith the D2 movement down below.\n\nFarmer Carries are incredible at building grip endurance as well as core/back endurance\nstrength!\nALTERNATIVES:\n\n1️⃣ 1-KB Suitcase Carry: 3 sets of 20-30 seconds carries on each side at a 8-9 RPE.\nChoose this option if you'd rather work on single side stability and oblique strength.\n\n2️⃣ Single Arm KB Overhead March/Carry: 3 sets of 20-30 seconds carries on each side at\na 8-9 RPE. Choose this option if you'd rather work on shoulder stability!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"9"},{"id":"D2","label":"Core: Flexion","exercise":"Reverse Crunch off Bench OR Seated L-Sit Leg Raise Series OR Hanging Knee Raise","sets_info":"","notes":"D2) Core: Flexion\n\n➡️ Reverse Crunch off Bench OR Seated L-Sit Leg Raise Series OR Hanging Knee Raise: 3\nsets of 8-12 rep at a 8-9 RPE. After each set, rest 60 seconds before returning to D1.\n\nAll of the movements above are flexion-based core exercises where your lift you raise\nyour legs up rather than curling your trunk down. Choose ONE of the options above that\nbest meets you where you're at!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Reverse Crunch off Bench","Seated L-Sit Leg Raise Series","Hanging Knee Raise"],"rpe":"8-9"},{"id":"E","label":"PUMP Segment - Day 4","exercise":"PUMP Segment - Day 4","sets_info":"3 sets of 8-10","notes":"E) PUMP Segment - Day 4\n{You can choose between a biceps or triceps or a glute pump for this segment. This exercise is\nNOT part of a superset!}\n\n💪 For arms, try this out:\n1️⃣ 2DB Lying Triceps Extension AND 2DB Seated Hammer Curl Superset: 3 sets of 8-10\n\nreps at a 9 RPE for each movement. Immediately after your Tricep Extensions, sit yourself\nup and perform the Seated Curls. Rest 90 seconds before moving on to the next set.\n\n⭐ Each week, add weight or reps, or increase by an entire set!\n🍑 For glutes, try this out:\n2️⃣ Quadruped Single Leg Band/Cable Hip Abduction OR Band/Cable 45 Degree Glute\n\nKickbacks: 3 sets of 12-15 reps each side at a 9 RPE with 60 rest in between sets. Both\nversions work the glutes - choose the option that works best for you! Do your best to keep\nconsistent tension on the glutes and maintain mind-muscle connection with them!\n\n💡 Feel free to sub in the hip abductor machine (the one where the knees go out) if you\nhave access to one! Get 3 sets of 15 reps at a 9 RPE :)\n\n⭐ Each week, add weight, or increase the reps, or add an entire set!","variations":[],"rpe":""}]},{"id":"W3D1","week":3,"day":1,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Box Jumps","sets_info":"3 sets of 5 reps with 30 seconds rest between sets","notes":"A) Power Development - Day 1\n\n➡️ Box Jumps: 3 sets of 5 reps with 30 seconds rest between sets. This exercise is not part\nof a superset. Complete all sets before moving on to the B superset.\nALTERNATIVES:\n\n1️⃣ Ninety-Degree Box Jumps: 3 sets of 3 reps each side with 30 seconds rest between\n\nsets. This variation emphasizes rotational power and coordination. Only attempt these if\nyou have a lot of experience with traditional box jumps!\n\n2️⃣ Staggered Rotational Box Jumps: 3 sets of 3 reps each side with 30 seconds rest\n\nbetween sets. The staggered stance further challenges your balance and stability as\nyou're jumping from a less stable position.\n\n3️⃣ Seated Squat 'Jump' onto Toes: 3 sets of 6 reps with 30 seconds rest between sets. Sit\non a box or bench with your feet planted. Explode upward into a standing position while\ndriving onto your toes at the top. This is a low-impact option that still emphasizes power\ndevelopment and quickness!\n\n⭐ Progress by gradually increasing the box height, advancing to more challenging\nvariations, or adding an extra repetition each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you want to incorporate some olympic weightlifting into your routine, you can opt for\nthese oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Clean: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB 1\" Power Clean: 4 sets of 2 reps at a 6-7 RPE with 60-90 seconds rest between\nsets. Start by lifting the bar 1 inch off the floor, pause briefly and maintain position and\nalignment, and then complete the clean. Aim to increase the weight by 2.5-5 lbs each\nweek as you progress.","variations":[],"rpe":""},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","sets_info":"3 sets of 6 reps","notes":"B1) Squat Variations\n3 sets of 6 reps at a 7 RPE, followed by 1 back-off set of 8-10 reps at a 20% lighter\nweight. Superset (alternate sets) with the B2 movement down below. Choose ONE of the\nfollowing exercises:\n\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB or DB Goblet Squat\n📝 If you were on RISE last month, start this volume at a working weight 5-10 lbs heavier\nthan what you used last week. Increase the weight by 5-10 lbs weekly for your working\nsets. This note is relevant for your first week on Volume 67!\n\n⭐ Aim to progressively overload by adding weight to your working sets each week or\nincreasing the reps in your back-off set!","variations":[],"rpe":"7"},{"id":"B2","label":"Isolation: Calves","exercise":"Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg","sets_info":"3 sets of 10 reps","notes":"B2) Isolation: Calves\n\n➡️ Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg\nCalf Raise Dropset: 3 sets. Perform As Many Reps As Possible (AMRAP) while leaning\nback followed immediately by AMRAP while leaning forward.\nYou're working the calves in a shortened position, followed by working them in a\nlengthened position - it's important to expose your calves to both! After each set, rest 60120 seconds before returning to B1.\nALTERNATIVES:\n\n1️⃣ Deficit Shortened to Lengthened Calf Raise Dropset OR Deficit Single-Leg Shortened to\n\nLengthened Calf Raise Dropset: 3 sets. Perform As Many Reps As Possible (AMRAP) while\nleaning back followed immediately by AMRAP while leaning forward. It's the same as\nabove except this time you're foot is off an elevated surface like a low plyo box, an aerobic\nstep, a stair step, etc.\n\n💡 Feel free to sub in a standing/seated calf raise machine here if you have access to one!\nPerform 3 sets of 10 reps at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Shortened to Lengthened Calf Raise Dropset","Shortened to Lengthened Single Leg"],"rpe":""},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB OR 2DB Romanian Deadlifts","sets_info":"3 sets of 8 reps","notes":"C1) Lower Body Accessory - Day 1\n\n➡️ BB OR 2DB Romanian Deadlifts: 3 sets of 8 reps at a 7-8 RPE. Focus on maintaining a\nneutral spine and engaging your hamstrings and glutes throughout the movement. Keep\n\nthe weight in close to your body and control the descent. Superset (alternate sets) with the\nC2 movement below.\nALTERNATIVES:\n\n1️⃣ BB Good Morning: 3 sets of 8 reps at a 7 RPE. If you'd like to shift the focus more onto\nthe posterior chain and reduce the load on your grip, give this exercise a try!\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":["BB","2DB Romanian Deadlifts"],"rpe":"7-8"},{"id":"C2","label":"Isolation: Delts","exercise":"Single Arm DB Leaning-In Lateral Raise - Behind Back","sets_info":"3 sets of 10 reps per side","notes":"C2) Isolation: Delts\n\n➡️ Single Arm DB Leaning-In Lateral Raise - Behind Back: 3 sets of 10 reps per side at a 56 RPE. Rest 60 seconds after each set before returning to C1.\n\nAnchor yourself against a pole, squat rack upright, or any sturdy surface for stability. The\nlean allows for a greater range of motion and focused activation of your delts. Keep your\nhand behind you to further stretch the delts in the bottom position!\nALTERNATIVES for C2:\nSingle Arm Band/Cable Lateral Raise - Behind Back: 3 sets of 10 reps per side at a 5-6\nRPE. If you prefer using a band or cable, this is an excellent alternative to the leaning\nvariation that places constant tension on the delts.\n\n1️⃣\n\n2️⃣ 2DB Lateral Raise: 3 sets of 10 reps at a 6 RPE. Stick with the classic two-dumbbell\n\nvariation if the leaning/hand-behind variations feel uncomfortable or overly complicated!\n\n3️⃣ TGU: 3 sets of 1-2 reps per side at a 6-7 RPE. If you’d like a more functional alternative\nthat challenges core strength, mobility, and stability, the Turkish Get-Up is a great choice!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"56"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 5. Use a band thickness th","notes":"D1) Pull Variations - Day 1\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 5. Use a band thickness that allows you to\nget about 7 reps, but only do 5 reps so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 6 reps at a 8 RPE with a 4 second eccentric tempo (after you\n\nlower down, resist for 4 seconds on the way back up.) This is a great option if you're not a\nfan of pull-ups, but still want to mimic the overhead pulling pattern. You can use the lat\n\npulldown machine at your gym or set up a band on a pull-up bar/door frame to perform\nyour pulldowns.\n\n2️⃣ BB Bent Over Row - Overhand Grip OR 2DB Bent Over Row - Pronated Grip OR BB\n\nAngled BB Row with Rope Handle: 3 sets of 8 reps at a 8 RPE. Choose from any of these\nrowing options if you'd rather not work on Pullups or Lat Pulldowns!\n\n⭐ Try to add weight or increase by one repetition each week! Alternate these with the D2\nmovement down below!","variations":[],"rpe":""},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball Hamstring Curl Series","sets_info":"3 sets of 8-10 reps","notes":"D2) Isolation: Hamstrings\n\n➡️ Stability Ball Hamstring Curl Series: 3 sets of 8-10 reps. Choose the option in the\nseries that allows you to get those 8-10 reps. Rest 60 seconds after each set before\nreturning to D1.\nALTERNATIVES:\n\n1️⃣ Slider Hamstring Curl Series: 3 sets of 8-10 reps. Choose from one of the options in\n\nthis series if you don't have access to a stability ball, but still want to do hamstring curls!\nYou can use furniture sliders, Valslides, towel on hardwood floor/tile, etc. for your \"slider!\"\n\n2️⃣ TRX Hamstring Curl: 3 sets of 8-10 reps with a slow 3 second eccentric (slow lower.) If\nyou have access to a TRX and would like to use it, these TRX Hamstring Curls are\nabsolutely brutal! The further away you are from the anchor point, the tougher the\nmovement will be.\n\n3️⃣ Nordic Hamstring Curl: 3 sets of 3-5 reps. Anchor your feet under something sturdy like\na dumbbell rack, a bench, a partner's hands, etc. and lower yourself down as slowly as\npossible before pushing yourself back up with your arms.\n\n💡 Feel free to sub in a seated or prone hamstring curl machine here if you have access to\none! Perform 3 sets of 10 at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"E","label":"Legs OR Core Finisher","exercise":"Legs OR Core Finisher","sets_info":"","notes":"E) Legs OR Core Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\nYou can choose between a lower body or core finisher:\n\n🦵 LOWER BODY FINISHER:\nChoose ONE:\n\n1️⃣ Heels Elevated Goblet Squats: Perform 50 reps in as few sets as possible. Keep\n\ntension on the quads, maintain depth, and aim to complete all reps with minimal rest.\nEach week, try to reduce the number of sets needed to hit 50, or increase the total\nnumber of reps by 5.\n\n2️⃣ 2DB Wall Sit: Accumulate 90 total seconds in as few sets as possible. Each week, try\n\nto extend the wall sit duration by 5-10 seconds or add/increase weight. Wall Sits are great\nif deep squats bother your knees, but you still want a burnout option for your legs!\n\n🔥 CORE FINISHER:\nChoose ONE:\n\n1️⃣ Cross-Body Crunches: Perform 50 total reps (25 per side), focusing on a strong\n\ncontraction at the top of each rep. Each week, aim to finish in fewer sets or increase reps\nby 5.\n\n2️⃣ Fast Bicycles: Perform 50 reps (25 per side) as quickly as possible with full torso\nrotation. Each week, aim to finish in fewer sets or increase reps by 5.","variations":["Legs","Core Finisher"],"rpe":""}]},{"id":"W3D2","week":3,"day":2,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Single Arm DB Push Press","sets_info":"3 sets of 5 reps each side","notes":"A) Power Development - Day 2\n\n➡️ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds\n\nrest in between sets. This exercise is not part of a superset. Complete all sets before moving on\nto the B superset.\nALTERNATIVES:\n\n1️⃣ DB Split Stance Rotational Split Jerk OR Angled BB Rotational Split Jerk: 3 sets of 4\nreps each side at a 6-7 RPE with 45 seconds rest between sets. These are definitely\nextremely tricky to coordinate so only attempt these if you have a lot of experience with\ntraditional push presses!\n\n2️⃣ Alternating Medicine Ball Side Rotation Throws: 3 sets of 6-8 reps each side at a 10\n\nRPE with 30 seconds rest in between sets. This one takes some coordination and\nfootwork, but if you have access to a medicine ball and a wall, it's a fun power move for\nthe upper body!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":[],"rpe":"6-7"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","sets_info":"3 sets of 6 reps","notes":"B1) BB Bench Press\n\n➡️ BB Bench Press: 3 sets of 6 reps at a 7 RPE, followed by 1 back-off set of 8-10 reps at\na 20% lighter weight. Superset (alternate sets) with the B2 movement down below.\n\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a\nmore shoulder-friendly alternative!\n\n📝 If you were on RISE last month, start this volume at a working weight 2.5-5lbs heavier\nthan what you used last week. Increase the weight by 2.5-5 lbs weekly for your working\nsets. This note is relevant for your first week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"B2","label":"Row Variations - Day 2","exercise":"3 Point DB Row - Constant Tension","sets_info":"3 sets of 8 reps each side","notes":"B2) Row Variations - Day 2\n\n➡️ 3 Point DB Row - Constant Tension: 3 sets of 8 reps each side at a 7 RPE. After each\nset, rest 60-120 seconds before returning to B1.\n\nStart lighter than you think for these Constant Tension Rows! It'll feel like a hit to the ego,\nbut the mind-muscle connection benefit you'll get as well as the strong back pump will\nmore than make up for it!\n\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one!\nPerform 3 sets of 12 at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Arnold Press","sets_info":"3 sets of 8 reps","notes":"C1) Upper Body Accessory - Day 2\n\n➡️ 2DB Arnold Press: 3 sets of 8 reps at a 7-8 RPE. Superset (alternate sets) with the C2\nmovement down below.\nALTERNATIVE:\n\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Spiderman Push Up: 3\nsets of as many reps as possible. Choose the variation that allows you to get around 8\nreps or so! Choose this option if you're looking to strengthen your push up game!\n\n💡 Feel free to sub in any chest press machine here if you have access to one! Perform 3\nsets of 8 at a 7-8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","sets_info":"3 sets of 10 reps","notes":"C2) Lower Body Accessory - Day 2\n\n➡️ BB Shoulders Elevated Hip Lift: 3 sets of 10 reps at a 7-8 RPE. If you're looking for\n\nadditional glute work, feel free to drop the weight by 10% and do a fourth and final set for\nas many reps as possible.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ BB Supine Glute Bridge: 3 sets of 10 reps at a 7-8 RPE. If you're looking for additional\nglute work, feel free to drop the weight by 10% and do a fourth and final set for as many\nreps as possible.\nThis BB Supine Glute Bridge is a great option for those of you having trouble with the\nbalance and set up with the shoulder elevated version!\n\n2️⃣ Supported Deficit Reverse Lunge OR Suitcase 1KB Supported SL Deadlift: 3 sets of 10\nreps each side at a 8-9 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these\nLunges/SL Deadlifts instead! Choose either of the supported lifts that you feel the most\nconsistent tension on your glutes!\n\n💡 Feel free to sub in a 45 degree back extension machine here if you have access to one!\nPerform 3 sets of 12 reps at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Isolation: Biceps","exercise":"BB Wide Grip Curls OR 2DB Curls - Externally Rotated","sets_info":"3 sets of 12 reps","notes":"D1) Isolation: Biceps\n\n➡️ BB Wide Grip Curls OR 2DB Curls - Externally Rotated: 3 sets of 12 reps at a 8-9 RPE.\nSuperset (alternate sets) with the D2 movement down below.\n\nEven with classic bodybuilding movements, it's important to explore different angles and\npositions!\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":["BB Wide Grip Curls","2DB Curls - Externally Rotated"],"rpe":"8-9"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Core: Anti-Extension","sets_info":"3 sets of 30-45 seconds","notes":"D2) Core: Anti-Extension\nChoose ONE of the following anti-extension core exercises. They are ordered from least\ndifficult to most difficult! Superset (alternate sets) with D1 above.\n\n1️⃣ Front Plank: 3 sets of 30-45 seconds\n2️⃣ Long Lever Front Plank: 3 sets of 20-30 seconds\n3️⃣ Stability Ball Plank: 3 sets of 30-40 seconds\n4️⃣ Stability Ball Plank Extensions: 3 sets of 8-12 reps\n5️⃣ Stability Ball Rollout: 3 sets of 8-10 reps\n6️⃣ Ab Wheel Rollout: 3 sets of 6-8 reps\n7️⃣ BB Rollout: 3 sets of 6-8 reps\nChoose a variation that matches your ability level—planks for isometric stability, rollouts\nfor more dynamic core control.\n\n⭐ Each week, aim to extend your plank duration by 5 seconds or increase your rollout\nrepetitions by one rep for progressive overload!","variations":[],"rpe":""},{"id":"E","label":"Finisher","exercise":"Complex: Front Squat (5x), Push Press (3x), Bent Over Row (5x), Deadlift (5x)","sets_info":"3 sets of 12-15 reps","notes":"E) Finisher\n[                   \"        .\"                -                                                     \n                            !]\n4-6 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press\nfor around 5 rep","variations":[],"rpe":""}]},{"id":"W3D3","week":3,"day":3,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Consecutive Lateral Pogo Hops","sets_info":"2 sets of 10-12 reps on each side with 30 seconds rest","notes":"A) Power Development - Day 3\n\n➡️ Consecutive Lateral Pogo Hops: 2 sets of 10-12 reps on each side with 30 seconds rest\nin between sets. This exercise is not part of a superset. Complete all sets before moving on to\nthe B superset.\nStart with small hops to the side and gradually try to jump higher and higher over time.\nPogo hops are not meant to tire you out or be particularly challenging - it's more about\nbuilding elasticity and resiliency in your calves and achilles!\nALTERNATIVES:\n\n1️⃣ Deep Squat Jump Plyos: 3 sets of 8-10 with 30 seconds rest between sets. Your heels\ncan pick up in the bottom position - in fact, your weight should be slightly shifted forward.\n\nThese Squat Jumps are an example of \"Deep Tier\" plyos where the goal is to create force\nthrough greater ranges of motion. The Pogo Hops above are an example of \"Shallow Tier\"\nplyos where the goal is to be quicker and more elastic. Both are important to expose\nyourself to so pick the one that you feel best aligns with your goals!\n\n⭐ Try to increase by one repetition or add weight each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB 1\" Power Snatch: 4 sets of 2 reps at a 6-7 RPE with 60-90 seconds rest between\nsets. Start by lifting the bar 1 inch off the floor, pause briefly and maintain position and\nalignment, and then complete the snatch. Aim to increase the weight by 2.5-5 lbs each\nweek as you progress.","variations":[],"rpe":""},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"4 sets of 5 at a 7-8 RPE of ONE of the following","notes":"B1) Deadlift Variations\n4 sets of 5 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Rotation","exercise":"1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Ba","sets_info":"3 sets of 8-10 reps each side","notes":"B2) Core: Rotation\n\n➡️ 1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Band\nRotations: 3 sets of 8-10 reps each side at a 8 RPE. Choose from one of the following\n\nmoves that incorporate core rotation - each of them use a different implement\n(kettlebells/dumbbells, landmine attachments, and bands/cable machine) so choose the\nmost convenient option for you!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1/2 Kneeling Quick KB Lifts","Angled BB Rotations","Wide 1/2 Kneeling Cable/Ba"],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2KB Rear Foot Elevated Split Squat Alternating Pick Ups","sets_info":"3 sets of 8 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 2KB Rear Foot Elevated Split Squat Alternating Pick Ups: 3 sets of 8 reps on each side\nat a 8 RPE. Superset (alternate sets) with the C2 movement down below.\n\nThis is a challenging move to coordinate, but you receive some serious stability benefits\nout of it! You'll feel your core and hip stabilizers working overtime as you continuously\nalternate which side the load is on!\nALTERNATIVES:\n\n1️⃣ 2DB Rear Foot Elevated Split Squat OR 2DB Split Squat: 3 sets of 10 reps on each side\nat a 6-7 RPE. If the Alternating Pick Ups feel a bit too cumbersome, feel free to opt for\ntraditional Rear Foot Elevated Split Squats or standard Split Squats instead!\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 6 reps on each side at a 7-8 RPE. If\n\nyou're working on Pistol Squats specifically, you can opt for this progression instead! It is\nworth mentioning though that the stronger you are with the Rear Foot Elevated Split\nSquat, the easier Pistol Squats become so make sure you establish a solid strength base\nfirst with RFE Split Squats!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C2","label":"Isolation: Delts","exercise":"2KB OR 2DB Z-Press","sets_info":"3 sets of 8 reps","notes":"C2) Isolation: Delts\n\n➡️ 2KB OR 2DB Z-Press : 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds\nbefore returning to C1.\n\nBy taking your legs out of the equation, it forces your trunk and upper back to work even\nharder to stabilize!\nALTERNATIVES:\n\n1️⃣ 2DB Rainbow Flye to Slow Lower: 3 sets of 8 at a 8 RPE. If you'd rather perform a\n\nlateral raise alternative to really isolate the delts, then opt for these Rainbow Flyes with a\nSlow Lower instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2KB","2DB Z-Press"],"rpe":"8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 10. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10. Use a band thickness that allows you\nto get about 12 reps, but only do 10 so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 8 reps at a 7-8 RPE with a 2 second isometric hold at the\n\nbottom of each rep. This is a great option if you're not a fan of pull-ups, but still want to\nmimic the overhead pulling pattern. You can use the lat pulldown machine at your gym or\nset up a band on a pull-up bar/door frame to perform your pulldowns. Also, these can be\ndone with one arm at a time.\n\n2️⃣ 2DB OR 2KB Bent Over Seesaw Row: 3 sets of 8 reps each side at a 7-8 RPE. The\nSeesaw nature of these rows challenge your core significantly and help to improve\nrotation at your trunk!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"1KB Goblet Staggered Stance Squat","sets_info":"3 sets of 8 reps each side","notes":"D2) Multi-Planar Variations\n➡️ 1KB Goblet Staggered Stance Squat: 3 sets of 8 reps each side at a 7-8 RPE. After\neach set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n1️⃣ 1KB Goblet Staggered Stance Squat to Lateral Lunge: 3 sets of 6 reps ","variations":[],"rpe":"7-8"},{"id":"E","label":"Finisher","exercise":"Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), W","sets_info":"4 sets of 10-12 reps","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill\n(1x)\n\nThat's one rep on one side.\nPerform 3 reps in a row without setting the weight down. Then switch sides for an\nadditional 3 reps.\nThat's one set.\nPerform 3 total sets with 60 seconds rest in between sets.\nYou can choose between kettlebells or dumbbells!\n\n⭐ Each week, try to increase weight, reps, or add an additional round for progressive\noverload.\n\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set for\nyour glutes:\n\n1️⃣ Single-Leg KAS Hip Lift: 3-4 sets of 10-12 reps at a 9 RPE with 60-90 seconds rest\n\nbetween sets. Use your bodyweight or a moderate to light weight and go for high reps and\na pump here! Control the eccentric, pause at the top, and keep constant tension on the\nglutes.\n\n⭐ Each week, try to add weight, increase reps, or slow down the tempo even further to\nmaximize tension!","variations":[],"rpe":""}]},{"id":"W3D4","week":3,"day":4,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Alternating Deep Speed Skater Series","sets_info":"3 sets of 6-8 reps each side with 30 seconds","notes":"A) Power Development - Day 4\n\n➡️ Alternating Deep Speed Skater Series: 3 sets of 6-8 reps each side with 30 seconds\n\nrest in between sets. This exercise is not part of a superset. Complete all sets before moving on\nto the B superset.\nDuring traditional Speed Skaters, the goal is to travel further horizontally with minimal\nknee bend. During these Deep Speed Skaters, we'd love to see you focus more on\ntraveling further vertically with more knee bend!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":[],"rpe":""},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"3 sets of 5 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at\na 20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at a\n\n20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells! If you're\nexperienced with overhead pressing and would like to challenge your overhead strength\nwith more weight than you can handle with a strict press, then opt for these Push Presses\ninstead.\n\n📝 If you were on RISE last month, lower the weight down by about 5-10% from the\n\nweight you used last week, and then increase by 2.5-5lbs each week thereafter. This note\nis only relevant for your *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye","sets_info":"","notes":"B2) Isolation: Rear Delts\n\n➡️ 1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye: 3 sets of\n10 reps (each side for the 1DB move) at a 8 RPE. Both work the rear delts similarly choose either one!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1DB Side Lying Bench Rear Delt Flye","Band/Cable Rear Delt Crossover Flye"],"rpe":"8"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side","sets_info":"3 sets of as many reps as possible","notes":"C1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side\n\nTransfer: 3 sets of as many reps as possible. Choose the variation that allows you to get\naround 10-12 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Bench Press: 3 sets of 10 reps at a 7 RPE. Supplement the heavier bench press\nwork we do on Day 2 with lighter, higher rep work on Day 4!\n\n2️⃣ 2DB Incline Flyes: 3 sets of 10 reps at a 7 RPE. If you're looking for more pec isolation,\nopt for the Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you\nhave access to one! Get 3 sets of 12-15 reps at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","Push Up w/ MB Side to Side"],"rpe":""},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"2DB Step Up to Knee Drive","sets_info":"3 sets of 6 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 2DB Step Up to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. After each set,\nrest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 2DB Reverse Lunge to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. Choose\nthis option if you want to work similar muscles and movements but don't have access to a\nbox for step ups!\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Carry Variations - Day 4","exercise":"2KB Farmer Carry","sets_info":"3 sets of 45 second carries","notes":"D1) Carry Variations - Day 4\n\n➡️ 2KB Farmer Carry: 3 sets of 45 second carries at a 9 RPE. Superset (alternate sets)\nwith the D2 movement down below.\n\nFarmer Carries are incredible at building grip endurance as well as core/back endurance\nstrength!\nALTERNATIVES:\n\n1️⃣ 1-KB Suitcase Carry: 3 sets of 20-30 seconds carries on each side at a 8-9 RPE.\nChoose this option if you'd rather work on single side stability and oblique strength.\n\n2️⃣ Single Arm KB Overhead March/Carry: 3 sets of 20-30 seconds carries on each side at\na 8-9 RPE. Choose this option if you'd rather work on shoulder stability!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"9"},{"id":"D2","label":"Core: Flexion","exercise":"Reverse Crunch off Bench OR Seated L-Sit Leg Raise Series OR Hanging Knee Raise","sets_info":"","notes":"D2) Core: Flexion\n\n➡️ Reverse Crunch off Bench OR Seated L-Sit Leg Raise Series OR Hanging Knee Raise: 3\nsets of 8-12 rep at a 8-9 RPE. After each set, rest 60 seconds before returning to D1.\n\nAll of the movements above are flexion-based core exercises where your lift you raise\nyour legs up rather than curling your trunk down. Choose ONE of the options above that\nbest meets you where you're at!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Reverse Crunch off Bench","Seated L-Sit Leg Raise Series","Hanging Knee Raise"],"rpe":"8-9"},{"id":"E","label":"PUMP Segment - Day 4","exercise":"PUMP Segment - Day 4","sets_info":"3 sets of 8-10","notes":"E) PUMP Segment - Day 4\n{You can choose between a biceps or triceps or a glute pump for this segment. This exercise is\nNOT part of a superset!}\n\n💪 For arms, try this out:\n1️⃣ 2DB Lying Triceps Extension AND 2DB Seated Hammer Curl Superset: 3 sets of 8-10\n\nreps at a 9 RPE for each movement. Immediately after your Tricep Extensions, sit yourself\nup and perform the Seated Curls. Rest 90 seconds before moving on to the next set.\n\n⭐ Each week, add weight or reps, or increase by an entire set!\n🍑 For glutes, try this out:\n2️⃣ Quadruped Single Leg Band/Cable Hip Abduction OR Band/Cable 45 Degree Glute\n\nKickbacks: 3 sets of 12-15 reps each side at a 9 RPE with 60 rest in between sets. Both\nversions work the glutes - choose the option that works best for you! Do your best to keep\nconsistent tension on the glutes and maintain mind-muscle connection with them!\n\n💡 Feel free to sub in the hip abductor machine (the one where the knees go out) if you\nhave access to one! Get 3 sets of 15 reps at a 9 RPE :)\n\n⭐ Each week, add weight, or increase the reps, or add an entire set!","variations":[],"rpe":""}]},{"id":"W4D1","week":4,"day":1,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Box Jumps","sets_info":"3 sets of 5 reps with 30 seconds rest between sets","notes":"A) Power Development - Day 1\n\n➡️ Box Jumps: 3 sets of 5 reps with 30 seconds rest between sets. This exercise is not part\nof a superset. Complete all sets before moving on to the B superset.\nALTERNATIVES:\n\n1️⃣ Ninety-Degree Box Jumps: 3 sets of 3 reps each side with 30 seconds rest between\n\nsets. This variation emphasizes rotational power and coordination. Only attempt these if\nyou have a lot of experience with traditional box jumps!\n\n2️⃣ Staggered Rotational Box Jumps: 3 sets of 3 reps each side with 30 seconds rest\n\nbetween sets. The staggered stance further challenges your balance and stability as\nyou're jumping from a less stable position.\n\n3️⃣ Seated Squat 'Jump' onto Toes: 3 sets of 6 reps with 30 seconds rest between sets. Sit\non a box or bench with your feet planted. Explode upward into a standing position while\ndriving onto your toes at the top. This is a low-impact option that still emphasizes power\ndevelopment and quickness!\n\n⭐ Progress by gradually increasing the box height, advancing to more challenging\nvariations, or adding an extra repetition each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you want to incorporate some olympic weightlifting into your routine, you can opt for\nthese oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Clean: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB 1\" Power Clean: 4 sets of 2 reps at a 6-7 RPE with 60-90 seconds rest between\nsets. Start by lifting the bar 1 inch off the floor, pause briefly and maintain position and\nalignment, and then complete the clean. Aim to increase the weight by 2.5-5 lbs each\nweek as you progress.","variations":[],"rpe":""},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","sets_info":"3 sets of 6 reps","notes":"B1) Squat Variations\n3 sets of 6 reps at a 7 RPE, followed by 1 back-off set of 8-10 reps at a 20% lighter\nweight. Superset (alternate sets) with the B2 movement down below. Choose ONE of the\nfollowing exercises:\n\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB or DB Goblet Squat\n📝 If you were on RISE last month, start this volume at a working weight 5-10 lbs heavier\nthan what you used last week. Increase the weight by 5-10 lbs weekly for your working\nsets. This note is relevant for your first week on Volume 67!\n\n⭐ Aim to progressively overload by adding weight to your working sets each week or\nincreasing the reps in your back-off set!","variations":[],"rpe":"7"},{"id":"B2","label":"Isolation: Calves","exercise":"Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg","sets_info":"3 sets of 10 reps","notes":"B2) Isolation: Calves\n\n➡️ Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg\nCalf Raise Dropset: 3 sets. Perform As Many Reps As Possible (AMRAP) while leaning\nback followed immediately by AMRAP while leaning forward.\nYou're working the calves in a shortened position, followed by working them in a\nlengthened position - it's important to expose your calves to both! After each set, rest 60120 seconds before returning to B1.\nALTERNATIVES:\n\n1️⃣ Deficit Shortened to Lengthened Calf Raise Dropset OR Deficit Single-Leg Shortened to\n\nLengthened Calf Raise Dropset: 3 sets. Perform As Many Reps As Possible (AMRAP) while\nleaning back followed immediately by AMRAP while leaning forward. It's the same as\nabove except this time you're foot is off an elevated surface like a low plyo box, an aerobic\nstep, a stair step, etc.\n\n💡 Feel free to sub in a standing/seated calf raise machine here if you have access to one!\nPerform 3 sets of 10 reps at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Shortened to Lengthened Calf Raise Dropset","Shortened to Lengthened Single Leg"],"rpe":""},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB OR 2DB Romanian Deadlifts","sets_info":"3 sets of 8 reps","notes":"C1) Lower Body Accessory - Day 1\n\n➡️ BB OR 2DB Romanian Deadlifts: 3 sets of 8 reps at a 7-8 RPE. Focus on maintaining a\nneutral spine and engaging your hamstrings and glutes throughout the movement. Keep\n\nthe weight in close to your body and control the descent. Superset (alternate sets) with the\nC2 movement below.\nALTERNATIVES:\n\n1️⃣ BB Good Morning: 3 sets of 8 reps at a 7 RPE. If you'd like to shift the focus more onto\nthe posterior chain and reduce the load on your grip, give this exercise a try!\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":["BB","2DB Romanian Deadlifts"],"rpe":"7-8"},{"id":"C2","label":"Isolation: Delts","exercise":"Single Arm DB Leaning-In Lateral Raise - Behind Back","sets_info":"3 sets of 10 reps per side","notes":"C2) Isolation: Delts\n\n➡️ Single Arm DB Leaning-In Lateral Raise - Behind Back: 3 sets of 10 reps per side at a 56 RPE. Rest 60 seconds after each set before returning to C1.\n\nAnchor yourself against a pole, squat rack upright, or any sturdy surface for stability. The\nlean allows for a greater range of motion and focused activation of your delts. Keep your\nhand behind you to further stretch the delts in the bottom position!\nALTERNATIVES for C2:\nSingle Arm Band/Cable Lateral Raise - Behind Back: 3 sets of 10 reps per side at a 5-6\nRPE. If you prefer using a band or cable, this is an excellent alternative to the leaning\nvariation that places constant tension on the delts.\n\n1️⃣\n\n2️⃣ 2DB Lateral Raise: 3 sets of 10 reps at a 6 RPE. Stick with the classic two-dumbbell\n\nvariation if the leaning/hand-behind variations feel uncomfortable or overly complicated!\n\n3️⃣ TGU: 3 sets of 1-2 reps per side at a 6-7 RPE. If you’d like a more functional alternative\nthat challenges core strength, mobility, and stability, the Turkish Get-Up is a great choice!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"56"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 5. Use a band thickness th","notes":"D1) Pull Variations - Day 1\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 5. Use a band thickness that allows you to\nget about 7 reps, but only do 5 reps so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 6 reps at a 8 RPE with a 4 second eccentric tempo (after you\n\nlower down, resist for 4 seconds on the way back up.) This is a great option if you're not a\nfan of pull-ups, but still want to mimic the overhead pulling pattern. You can use the lat\n\npulldown machine at your gym or set up a band on a pull-up bar/door frame to perform\nyour pulldowns.\n\n2️⃣ BB Bent Over Row - Overhand Grip OR 2DB Bent Over Row - Pronated Grip OR BB\n\nAngled BB Row with Rope Handle: 3 sets of 8 reps at a 8 RPE. Choose from any of these\nrowing options if you'd rather not work on Pullups or Lat Pulldowns!\n\n⭐ Try to add weight or increase by one repetition each week! Alternate these with the D2\nmovement down below!","variations":[],"rpe":""},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball Hamstring Curl Series","sets_info":"3 sets of 8-10 reps","notes":"D2) Isolation: Hamstrings\n\n➡️ Stability Ball Hamstring Curl Series: 3 sets of 8-10 reps. Choose the option in the\nseries that allows you to get those 8-10 reps. Rest 60 seconds after each set before\nreturning to D1.\nALTERNATIVES:\n\n1️⃣ Slider Hamstring Curl Series: 3 sets of 8-10 reps. Choose from one of the options in\n\nthis series if you don't have access to a stability ball, but still want to do hamstring curls!\nYou can use furniture sliders, Valslides, towel on hardwood floor/tile, etc. for your \"slider!\"\n\n2️⃣ TRX Hamstring Curl: 3 sets of 8-10 reps with a slow 3 second eccentric (slow lower.) If\nyou have access to a TRX and would like to use it, these TRX Hamstring Curls are\nabsolutely brutal! The further away you are from the anchor point, the tougher the\nmovement will be.\n\n3️⃣ Nordic Hamstring Curl: 3 sets of 3-5 reps. Anchor your feet under something sturdy like\na dumbbell rack, a bench, a partner's hands, etc. and lower yourself down as slowly as\npossible before pushing yourself back up with your arms.\n\n💡 Feel free to sub in a seated or prone hamstring curl machine here if you have access to\none! Perform 3 sets of 10 at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"E","label":"Legs OR Core Finisher","exercise":"Legs OR Core Finisher","sets_info":"","notes":"E) Legs OR Core Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\nYou can choose between a lower body or core finisher:\n\n🦵 LOWER BODY FINISHER:\nChoose ONE:\n\n1️⃣ Heels Elevated Goblet Squats: Perform 50 reps in as few sets as possible. Keep\n\ntension on the quads, maintain depth, and aim to complete all reps with minimal rest.\nEach week, try to reduce the number of sets needed to hit 50, or increase the total\nnumber of reps by 5.\n\n2️⃣ 2DB Wall Sit: Accumulate 90 total seconds in as few sets as possible. Each week, try\n\nto extend the wall sit duration by 5-10 seconds or add/increase weight. Wall Sits are great\nif deep squats bother your knees, but you still want a burnout option for your legs!\n\n🔥 CORE FINISHER:\nChoose ONE:\n\n1️⃣ Cross-Body Crunches: Perform 50 total reps (25 per side), focusing on a strong\n\ncontraction at the top of each rep. Each week, aim to finish in fewer sets or increase reps\nby 5.\n\n2️⃣ Fast Bicycles: Perform 50 reps (25 per side) as quickly as possible with full torso\nrotation. Each week, aim to finish in fewer sets or increase reps by 5.","variations":["Legs","Core Finisher"],"rpe":""}]},{"id":"W4D2","week":4,"day":2,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Single Arm DB Push Press","sets_info":"3 sets of 5 reps each side","notes":"A) Power Development - Day 2\n\n➡️ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds\n\nrest in between sets. This exercise is not part of a superset. Complete all sets before moving on\nto the B superset.\nALTERNATIVES:\n\n1️⃣ DB Split Stance Rotational Split Jerk OR Angled BB Rotational Split Jerk: 3 sets of 4\nreps each side at a 6-7 RPE with 45 seconds rest between sets. These are definitely\nextremely tricky to coordinate so only attempt these if you have a lot of experience with\ntraditional push presses!\n\n2️⃣ Alternating Medicine Ball Side Rotation Throws: 3 sets of 6-8 reps each side at a 10\n\nRPE with 30 seconds rest in between sets. This one takes some coordination and\nfootwork, but if you have access to a medicine ball and a wall, it's a fun power move for\nthe upper body!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":[],"rpe":"6-7"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","sets_info":"3 sets of 6 reps","notes":"B1) BB Bench Press\n\n➡️ BB Bench Press: 3 sets of 6 reps at a 7 RPE, followed by 1 back-off set of 8-10 reps at\na 20% lighter weight. Superset (alternate sets) with the B2 movement down below.\n\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a\nmore shoulder-friendly alternative!\n\n📝 If you were on RISE last month, start this volume at a working weight 2.5-5lbs heavier\nthan what you used last week. Increase the weight by 2.5-5 lbs weekly for your working\nsets. This note is relevant for your first week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"B2","label":"Row Variations - Day 2","exercise":"3 Point DB Row - Constant Tension","sets_info":"3 sets of 8 reps each side","notes":"B2) Row Variations - Day 2\n\n➡️ 3 Point DB Row - Constant Tension: 3 sets of 8 reps each side at a 7 RPE. After each\nset, rest 60-120 seconds before returning to B1.\n\nStart lighter than you think for these Constant Tension Rows! It'll feel like a hit to the ego,\nbut the mind-muscle connection benefit you'll get as well as the strong back pump will\nmore than make up for it!\n\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one!\nPerform 3 sets of 12 at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Arnold Press","sets_info":"3 sets of 8 reps","notes":"C1) Upper Body Accessory - Day 2\n\n➡️ 2DB Arnold Press: 3 sets of 8 reps at a 7-8 RPE. Superset (alternate sets) with the C2\nmovement down below.\nALTERNATIVE:\n\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Spiderman Push Up: 3\nsets of as many reps as possible. Choose the variation that allows you to get around 8\nreps or so! Choose this option if you're looking to strengthen your push up game!\n\n💡 Feel free to sub in any chest press machine here if you have access to one! Perform 3\nsets of 8 at a 7-8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","sets_info":"3 sets of 10 reps","notes":"C2) Lower Body Accessory - Day 2\n\n➡️ BB Shoulders Elevated Hip Lift: 3 sets of 10 reps at a 7-8 RPE. If you're looking for\n\nadditional glute work, feel free to drop the weight by 10% and do a fourth and final set for\nas many reps as possible.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ BB Supine Glute Bridge: 3 sets of 10 reps at a 7-8 RPE. If you're looking for additional\nglute work, feel free to drop the weight by 10% and do a fourth and final set for as many\nreps as possible.\nThis BB Supine Glute Bridge is a great option for those of you having trouble with the\nbalance and set up with the shoulder elevated version!\n\n2️⃣ Supported Deficit Reverse Lunge OR Suitcase 1KB Supported SL Deadlift: 3 sets of 10\nreps each side at a 8-9 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these\nLunges/SL Deadlifts instead! Choose either of the supported lifts that you feel the most\nconsistent tension on your glutes!\n\n💡 Feel free to sub in a 45 degree back extension machine here if you have access to one!\nPerform 3 sets of 12 reps at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Isolation: Biceps","exercise":"BB Wide Grip Curls OR 2DB Curls - Externally Rotated","sets_info":"3 sets of 12 reps","notes":"D1) Isolation: Biceps\n\n➡️ BB Wide Grip Curls OR 2DB Curls - Externally Rotated: 3 sets of 12 reps at a 8-9 RPE.\nSuperset (alternate sets) with the D2 movement down below.\n\nEven with classic bodybuilding movements, it's important to explore different angles and\npositions!\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":["BB Wide Grip Curls","2DB Curls - Externally Rotated"],"rpe":"8-9"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Core: Anti-Extension","sets_info":"3 sets of 30-45 seconds","notes":"D2) Core: Anti-Extension\nChoose ONE of the following anti-extension core exercises. They are ordered from least\ndifficult to most difficult! Superset (alternate sets) with D1 above.\n\n1️⃣ Front Plank: 3 sets of 30-45 seconds\n2️⃣ Long Lever Front Plank: 3 sets of 20-30 seconds\n3️⃣ Stability Ball Plank: 3 sets of 30-40 seconds\n4️⃣ Stability Ball Plank Extensions: 3 sets of 8-12 reps\n5️⃣ Stability Ball Rollout: 3 sets of 8-10 reps\n6️⃣ Ab Wheel Rollout: 3 sets of 6-8 reps\n7️⃣ BB Rollout: 3 sets of 6-8 reps\nChoose a variation that matches your ability level—planks for isometric stability, rollouts\nfor more dynamic core control.\n\n⭐ Each week, aim to extend your plank duration by 5 seconds or increase your rollout\nrepetitions by one rep for progressive overload!","variations":[],"rpe":""},{"id":"E","label":"Finisher","exercise":"Complex: Front Squat (5x), Push Press (3x), Bent Over Row (5x), Deadlift (5x)","sets_info":"3 sets of 12-15 reps","notes":"E) Finisher\n[                   \"        .\"                -                                                     \n                            !]\n4-6 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press\nfor around 5 rep","variations":[],"rpe":""}]},{"id":"W4D3","week":4,"day":3,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Consecutive Lateral Pogo Hops","sets_info":"2 sets of 10-12 reps on each side with 30 seconds rest","notes":"A) Power Development - Day 3\n\n➡️ Consecutive Lateral Pogo Hops: 2 sets of 10-12 reps on each side with 30 seconds rest\nin between sets. This exercise is not part of a superset. Complete all sets before moving on to\nthe B superset.\nStart with small hops to the side and gradually try to jump higher and higher over time.\nPogo hops are not meant to tire you out or be particularly challenging - it's more about\nbuilding elasticity and resiliency in your calves and achilles!\nALTERNATIVES:\n\n1️⃣ Deep Squat Jump Plyos: 3 sets of 8-10 with 30 seconds rest between sets. Your heels\ncan pick up in the bottom position - in fact, your weight should be slightly shifted forward.\n\nThese Squat Jumps are an example of \"Deep Tier\" plyos where the goal is to create force\nthrough greater ranges of motion. The Pogo Hops above are an example of \"Shallow Tier\"\nplyos where the goal is to be quicker and more elastic. Both are important to expose\nyourself to so pick the one that you feel best aligns with your goals!\n\n⭐ Try to increase by one repetition or add weight each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB 1\" Power Snatch: 4 sets of 2 reps at a 6-7 RPE with 60-90 seconds rest between\nsets. Start by lifting the bar 1 inch off the floor, pause briefly and maintain position and\nalignment, and then complete the snatch. Aim to increase the weight by 2.5-5 lbs each\nweek as you progress.","variations":[],"rpe":""},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"4 sets of 5 at a 7-8 RPE of ONE of the following","notes":"B1) Deadlift Variations\n4 sets of 5 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Rotation","exercise":"1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Ba","sets_info":"3 sets of 8-10 reps each side","notes":"B2) Core: Rotation\n\n➡️ 1/2 Kneeling Quick KB Lifts OR Angled BB Rotations OR Wide 1/2 Kneeling Cable/Band\nRotations: 3 sets of 8-10 reps each side at a 8 RPE. Choose from one of the following\n\nmoves that incorporate core rotation - each of them use a different implement\n(kettlebells/dumbbells, landmine attachments, and bands/cable machine) so choose the\nmost convenient option for you!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1/2 Kneeling Quick KB Lifts","Angled BB Rotations","Wide 1/2 Kneeling Cable/Ba"],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2KB Rear Foot Elevated Split Squat Alternating Pick Ups","sets_info":"3 sets of 8 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 2KB Rear Foot Elevated Split Squat Alternating Pick Ups: 3 sets of 8 reps on each side\nat a 8 RPE. Superset (alternate sets) with the C2 movement down below.\n\nThis is a challenging move to coordinate, but you receive some serious stability benefits\nout of it! You'll feel your core and hip stabilizers working overtime as you continuously\nalternate which side the load is on!\nALTERNATIVES:\n\n1️⃣ 2DB Rear Foot Elevated Split Squat OR 2DB Split Squat: 3 sets of 10 reps on each side\nat a 6-7 RPE. If the Alternating Pick Ups feel a bit too cumbersome, feel free to opt for\ntraditional Rear Foot Elevated Split Squats or standard Split Squats instead!\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 6 reps on each side at a 7-8 RPE. If\n\nyou're working on Pistol Squats specifically, you can opt for this progression instead! It is\nworth mentioning though that the stronger you are with the Rear Foot Elevated Split\nSquat, the easier Pistol Squats become so make sure you establish a solid strength base\nfirst with RFE Split Squats!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C2","label":"Isolation: Delts","exercise":"2KB OR 2DB Z-Press","sets_info":"3 sets of 8 reps","notes":"C2) Isolation: Delts\n\n➡️ 2KB OR 2DB Z-Press : 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds\nbefore returning to C1.\n\nBy taking your legs out of the equation, it forces your trunk and upper back to work even\nharder to stabilize!\nALTERNATIVES:\n\n1️⃣ 2DB Rainbow Flye to Slow Lower: 3 sets of 8 at a 8 RPE. If you'd rather perform a\n\nlateral raise alternative to really isolate the delts, then opt for these Rainbow Flyes with a\nSlow Lower instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2KB","2DB Z-Press"],"rpe":"8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 10. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10. Use a band thickness that allows you\nto get about 12 reps, but only do 10 so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 8 reps at a 7-8 RPE with a 2 second isometric hold at the\n\nbottom of each rep. This is a great option if you're not a fan of pull-ups, but still want to\nmimic the overhead pulling pattern. You can use the lat pulldown machine at your gym or\nset up a band on a pull-up bar/door frame to perform your pulldowns. Also, these can be\ndone with one arm at a time.\n\n2️⃣ 2DB OR 2KB Bent Over Seesaw Row: 3 sets of 8 reps each side at a 7-8 RPE. The\nSeesaw nature of these rows challenge your core significantly and help to improve\nrotation at your trunk!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"1KB Goblet Staggered Stance Squat","sets_info":"3 sets of 8 reps each side","notes":"D2) Multi-Planar Variations\n➡️ 1KB Goblet Staggered Stance Squat: 3 sets of 8 reps each side at a 7-8 RPE. After\neach set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n1️⃣ 1KB Goblet Staggered Stance Squat to Lateral Lunge: 3 sets of 6 reps ","variations":[],"rpe":"7-8"},{"id":"E","label":"Finisher","exercise":"Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), W","sets_info":"4 sets of 10-12 reps","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill\n(1x)\n\nThat's one rep on one side.\nPerform 3 reps in a row without setting the weight down. Then switch sides for an\nadditional 3 reps.\nThat's one set.\nPerform 3 total sets with 60 seconds rest in between sets.\nYou can choose between kettlebells or dumbbells!\n\n⭐ Each week, try to increase weight, reps, or add an additional round for progressive\noverload.\n\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set for\nyour glutes:\n\n1️⃣ Single-Leg KAS Hip Lift: 3-4 sets of 10-12 reps at a 9 RPE with 60-90 seconds rest\n\nbetween sets. Use your bodyweight or a moderate to light weight and go for high reps and\na pump here! Control the eccentric, pause at the top, and keep constant tension on the\nglutes.\n\n⭐ Each week, try to add weight, increase reps, or slow down the tempo even further to\nmaximize tension!","variations":[],"rpe":""}]},{"id":"W4D4","week":4,"day":4,"vol":67,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Alternating Deep Speed Skater Series","sets_info":"3 sets of 6-8 reps each side with 30 seconds","notes":"A) Power Development - Day 4\n\n➡️ Alternating Deep Speed Skater Series: 3 sets of 6-8 reps each side with 30 seconds\n\nrest in between sets. This exercise is not part of a superset. Complete all sets before moving on\nto the B superset.\nDuring traditional Speed Skaters, the goal is to travel further horizontally with minimal\nknee bend. During these Deep Speed Skaters, we'd love to see you focus more on\ntraveling further vertically with more knee bend!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":[],"rpe":""},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"3 sets of 5 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at\na 20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 3 sets of 5 reps at a 7 RPE, followed by 1 back-off set of 6-8 reps at a\n\n20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells! If you're\nexperienced with overhead pressing and would like to challenge your overhead strength\nwith more weight than you can handle with a strict press, then opt for these Push Presses\ninstead.\n\n📝 If you were on RISE last month, lower the weight down by about 5-10% from the\n\nweight you used last week, and then increase by 2.5-5lbs each week thereafter. This note\nis only relevant for your *first* week on Volume 67!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye","sets_info":"","notes":"B2) Isolation: Rear Delts\n\n➡️ 1DB Side Lying Bench Rear Delt Flye OR Band/Cable Rear Delt Crossover Flye: 3 sets of\n10 reps (each side for the 1DB move) at a 8 RPE. Both work the rear delts similarly choose either one!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["1DB Side Lying Bench Rear Delt Flye","Band/Cable Rear Delt Crossover Flye"],"rpe":"8"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side","sets_info":"3 sets of as many reps as possible","notes":"C1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR Push Up w/ MB Side to Side\n\nTransfer: 3 sets of as many reps as possible. Choose the variation that allows you to get\naround 10-12 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Bench Press: 3 sets of 10 reps at a 7 RPE. Supplement the heavier bench press\nwork we do on Day 2 with lighter, higher rep work on Day 4!\n\n2️⃣ 2DB Incline Flyes: 3 sets of 10 reps at a 7 RPE. If you're looking for more pec isolation,\nopt for the Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you\nhave access to one! Get 3 sets of 12-15 reps at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","Push Up w/ MB Side to Side"],"rpe":""},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"2DB Step Up to Knee Drive","sets_info":"3 sets of 6 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 2DB Step Up to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. After each set,\nrest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 2DB Reverse Lunge to Knee Drive: 3 sets of 6 reps on each side at a 7-8 RPE. Choose\nthis option if you want to work similar muscles and movements but don't have access to a\nbox for step ups!\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Carry Variations - Day 4","exercise":"2KB Farmer Carry","sets_info":"3 sets of 45 second carries","notes":"D1) Carry Variations - Day 4\n\n➡️ 2KB Farmer Carry: 3 sets of 45 second carries at a 9 RPE. Superset (alternate sets)\nwith the D2 movement down below.\n\nFarmer Carries are incredible at building grip endurance as well as core/back endurance\nstrength!\nALTERNATIVES:\n\n1️⃣ 1-KB Suitcase Carry: 3 sets of 20-30 seconds carries on each side at a 8-9 RPE.\nChoose this option if you'd rather work on single side stability and oblique strength.\n\n2️⃣ Single Arm KB Overhead March/Carry: 3 sets of 20-30 seconds carries on each side at\na 8-9 RPE. Choose this option if you'd rather work on shoulder stability!\n\n⭐ Try to add weight or increase by one repetition each week!","variations
