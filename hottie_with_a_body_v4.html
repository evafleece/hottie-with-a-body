ations - Day 2\n\n➡️ BB OR DB Yates Row: 3 sets of 10 reps at a 7 RPE. After each set, rest 60-120\nseconds before returning to B1.\n\nFor these Yates Rows, have a very *slightly* inclined torso position and focus on the\nrowing the weight towards your hips using your lats. This is different from a traditional bent\nover row where your torso is nearly parallel to the floor and you're pulling the weight\ntowards the base of your sternum.\n\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one!\nPerform 3 sets of 10 at a 7 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB","DB Yates Row"],"rpe":"7"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"Single Arm KB Rotational Press OR 1/2 Kneeling Angled BB Rotational Press","sets_info":"3 sets of as many reps as possible","notes":"C1) Upper Body Accessory - Day 2\n\n➡️ Single Arm KB Rotational Press OR 1/2 Kneeling Angled BB Rotational Press: 3 sets of\n8 reps each at a 7 RPE. Superset (alternate sets) with the C2 movement down below.\n\nBoth options incorporate pressing with rotation so pick the variation you prefer based upon\nwhich piece of equipment you'd like to use! The Single Arm KB Rotational Press can also\nbe performed using dumbbells!\nALTERNATIVE:\n\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Hand Release Push\n\nUp: 3 sets of as many reps as possible. Choose the variation that allows you to get around","variations":["Single Arm KB Rotational Press","1/2 Kneeling Angled BB Rotational Press"],"rpe":"7"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"BB KAS Hip Lift","sets_info":"4 sets of 15 reps","notes":"C2) Lower Body Accessory - Day 2\n\n➡️ BB KAS Hip Lift: 3-4 sets of 15 reps at a 8-9 RPE. The KAS Hip Lift focuses only on\n\nthe top half portion of the movement. Use a relatively slow tempo and focus your attention\non your glutes as you perform the movement.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ BB Supine Glute Bridge: 3-4 sets of 15 reps at a 8-9 RPE. The BB Supine Glute Bridge\nis a great option for those of you having trouble with the balance and set up of the\nshoulder elevated version!\n\n2️⃣ 2DB High Box Step Up: 3 sets of 8 reps each side at a 7-8 RPE. If Hip Lifts/Glute\n\nBridges aren't your jam, then opt for these High Box Step Ups instead! Again, focus on\nmind-muscle connection with the glutes as you perform this movement!\n\n💡 Feel free to sub in a 45 degree back extension machine here if you have access to one!\nPerform 3 sets of 15 reps at a 8-9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8-9"},{"id":"D1","label":"Isolation: Biceps","exercise":"Single Arm DB Preacher Hammer Curl OR 2DB Alternating Hammer Curls","sets_info":"3 sets of 810 reps each side","notes":"D1) Isolation: Biceps\n\n➡️ Single Arm DB Preacher Hammer Curl OR 2DB Alternating Hammer Curls: 3 sets of 810 reps each side at a 9 RPE. If you have access to a preacher bench or incline bench,\nopt for that Hammer Curl variation! If not, choose the 2DB Alternating Hammer Curl!\nSuperset (alternate sets) with the D2 movement down below.\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":["Single Arm DB Preacher Hammer Curl","2DB Alternating Hammer Curls"],"rpe":"9"},{"id":"D2","label":"Isolation: Rear Delts","exercise":"Split Stance Bench Supported Single Arm DB Reverse Flye","sets_info":"3 sets of 10 reps each side","notes":"D2) Isolation: Rear Delts\n\n➡️ Split Stance Bench Supported Single Arm DB Reverse Flye: 3 sets of 10 reps each side\nat a 7-8 RPE. This move engages your entire posterior chain while challenging your core\nstability and balance. After each set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n\n1️⃣ Single Leg Deadlift Bench Supported Single Arm DB Reverse Flye: 3 sets of 8 reps each\nside at a 7-8 RPE. If you want to up the ante even further, you can get into a full Single\nLeg Deadlift position while performing these Reverse Flyes.\n\n2️⃣ 2DB Seated Bent Over Reverse Flye: 3 sets of 10 reps at a 8-9 RPE. Functional\n\nschmunctional. If you simply want to work your rear delts without all the frills, opt for these!\n\n⭐ Try to add weight or increase by one repetition each week to progressively overload!","variations":[],"rpe":"7-8"},{"id":"E","label":"Finisher","exercise":"Complex: Deadlift (5x), High Pull (3x), Push Press (3x), Front Squat (5x)","sets_info":"","notes":"E) Finisher\n[                   \"        .\"                -                                                     \n                            !]\n4-5 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press\nfor around 5 rep","variations":[],"rpe":""}]},{"id":"W3D3","week":3,"day":3,"vol":68,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"KB OR DB Hang to Overhead to Box Step","sets_info":"3 sets of 6 reps on each side","notes":"A) Power Development - Day 3\n\n➡️ KB OR DB Hang to Overhead to Box Step: 2-3 sets of 6 reps on each side at a 6-7 RPE\nwith 30 seconds rest in between sets. This exercise is not part of a superset. Complete all sets\nbefore moving on to the B superset.\nThere's a lot to coordinate here, but the Hang to Overhead to Box Step is a fantastic total\nbody power development exercise. Start with a light weight and focus on smooth\nrepetitions before introducing speed to the mix!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB Power Snatch - Slow Start to Knee: 4 sets of 2 reps at a 7-8 RPE with 90 seconds\n\nrest between sets. Slowly lift the bar off of the floor up until your knees while maintaining\nspinal position and alignment, and then explosively complete the snatch. Aim to increase\nthe weight by 2.5-5 lbs each week as you progress.","variations":["KB","DB Hang to Overhead to Box Step"],"rpe":"6-7"},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"3 sets of 4 reps","notes":"B1) Deadlift Variations\n3 sets of 4 reps at a 7-8 RPE, followed by 1 back-off set of 6 reps at a 20% lighter weight\nfor ONE of the following:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\nFor example, if you were using 100lbs for your 3 sets of 4, you'd perform 6 reps at 80lbs\nfor your back-off set. Superset (alternate sets) with the B2 movement down below.\n\n📝 If you were on RISE last month, decrease weight by about 5-10% from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 68!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Anti-Extension","exercise":"Wall Marching","sets_info":"3 sets of 8 reps each side","notes":"B2) Core: Anti-Extension\n\n➡️ Wall Marching: 3 sets of 8 reps each side at a 8 RPE. After each set, rest 60-120\nseconds before returning to B1.\n\nThese are surprisingly challenging! Move slowly, keep your rib cage/lower back down, and\nyou'll feel a ton of tension in your core. The further out your legs go, the tougher the\nmovement will be!\nALTERNATIVES:\n\n1️⃣ Deadbugs: 3 sets of 6-8 reps each side at a 8 RPE. The Deadbug is technically more\n\nchallenging than Wall Marching, but only if you're able to maintain the alignment that you\nlearned from Wall Marching. So, if you skip ahead to this move because it's \"harder,\" you\nmight not get the full benefit. Spend time with Wall Marching first before moving on to\ndeadbugs!\n\n2️⃣ Deadbug with DB Pullover: 3 sets of 6-8 reps each side at a 8 RPE. If you want to up\nthe ante further, you can add a Pullover to the mix as well!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"1DB Supported Suitcase Split Squat","sets_info":"3 sets of 10 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 1DB Supported Suitcase Split Squat: 3 sets of 10 reps on each side at a 6-7 RPE.\nSuperset (alternate sets) with the C2 movement down below.\n\nThe \"Supported\" nature of this move really allows you to eke out some more reps due to\nthe increase amount of support, while still challenging your single leg stability.\nALTERNATIVES:\n\n1️⃣ 1DB Suitcase Supported RFE Split Squat: 3 sets of 10 reps on each side at a 6-7 RPE.\nIf you want to up the ante further, you can perform Rear Foot Elevated Split Squats\ninstead.\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 5 reps on each side at a 7-8 RPE. If\n\nyou're working on Pistol Squats specifically, you can opt for this progression instead! It is\nworth mentioning though that the stronger you are with Split Squats and RFE Split Squats,\nthe easier Pistol Squats become so make sure you establish a solid strength base first\nwith Split Squats!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"C2","label":"Isolation: Delts","exercise":"1/2 Kneeling KB Single Arm Press to Windmill","sets_info":"3 sets of 6 reps each side","notes":"C2) Isolation: Delts\n\n➡️ 1/2 Kneeling KB Single Arm Press to Windmill: 3 sets of 6 reps each side at a 7-8 RPE.\nAfter each set, rest 60 seconds before returning to C1.\n\nTurn your chest, neck, and eyes up toward the weight. You can use kettlebells or\ndumbbells for this movement!\nALTERNATIVES:\n\n1️⃣ 1DB OR 1KB Overhead Press to Windmill: 3 sets of 6 reps each side at a 7-8 RPE. If\nyou're proficient with Kneeling Windmills, then try out these Standing Windmills!\n\n2️⃣ 2DB Arcing Lateral Raise: 3 sets of 10 reps at a 6-7 RPE. If you'd rather perform a\n\nlateral raise alternative to really isolate the delts, then opt for these Arcing Lateral Raises\ninstead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 8. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8. Use a band thickness that allows you to\nget about 10 reps, but only do 8 so you can conserve energy across the 3 sets. Do 4 sets\nin Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Seated Cable Row OR 2DB Head Supported Bent Over Row: 3 sets of 10 reps at a7-8\nRPE. If you're not a fan of pullups, but still want to work your back, then opt for either of\nthese Rows!\n\n💡 Feel free to sub in a lat pulldown machine here if you have access to one! Perform 3\nsets of 12 reps at a 8-9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week! Alternate these with the D2\nmovement down below!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"DB Staggered Stance Good Morning OR DB Staggered Stance Good Morning - Front","sets_info":"3 sets of 8 reps","notes":"D2) Multi-Planar Variations\n\n➡️ DB Staggered Stance Good Morning OR DB Staggered Stance Good Morning - Front\n\nRack: 3 sets of 8 reps at a 7 RPE. After each set, rest 60 seconds before returning to D1.\nChoose the rack position that works best for you (front or on your back) and perform a\ndeep hip hinge!\n\nALTERNATIVES:\n\n1️⃣ 1DB Goblet Curtsy Lunge OR Angled BB Leaning Curtsy Lunge: 3 sets of 8 reps on each\nside at a 6-7 RPE. If you're looking for more of a multi-planar movement, then opt for\nthese Curtsy Lunges instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["DB Staggered Stance Good Morning","DB Staggered Stance Good Morning - Front"],"rpe":"7"},{"id":"E","label":"Finisher","exercise":"KB Swing OR 2DB Walking Lunge EMOM","sets_info":"","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ KB Swing OR 2DB Walking Lunge EMOM\nSet a timer for 5 minutes. Every Minute on the Minute, perform either 8-10 Swings or 6-8\nWalking Lunges on each side. Make sure you're not working for more than 40 seconds at\na time so that you have at least 20 seconds to rest during each round!\n\n⭐ Each week, try to add weight, increase by one repetition, or add an additional minute!","variations":["KB Swing","2DB Walking Lunge EMOM"],"rpe":""}]},{"id":"W3D4","week":3,"day":4,"vol":68,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Diagonal Speed Skater OR Loaded Diagonal Speed Skater","sets_info":"2 sets of 6 reps each side","notes":"A) Power Development - Day 4\n\n➡️ Diagonal Speed Skater OR Loaded Diagonal Speed Skater: 2 sets of 6 reps each side\n\nwith 30 seconds rest in between sets. This exercise is not part of a superset. Complete all sets\nbefore moving on to the B superset.\nThe further the distance you travel, the tougher the movement will be and the more impact\nyou'll feel on your knees. You can make these Diagonal Speed Skaters easier and more\njoint friendly by simply reducing the distance you travel!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":["Diagonal Speed Skater","Loaded Diagonal Speed Skater"],"rpe":""},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"3 sets of 4 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 3 sets of 4 reps at a 7-8 RPE, followed by 1 back-off set of 6 reps at\na 20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 3 sets of 4 reps at a 7-8 RPE, followed by 1 back-off set of 6 reps at a\n20% lighter weight. You can perform these with a barbell or dumbbells/kettlebells!\n\nIf you're experienced with overhead pressing and would like to challenge your overhead\nstrength with more weight than you can handle with a strict press, then opt for these Push\nPresses instead.\n\n📝 If you were on RISE last month, decrease weight by about 5-10% from last week's\n\nweights, and then increase by 2.5-5lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 68!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"7-8"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","sets_info":"3 sets of 12 reps","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n\n➡️ Face Pull: 3 sets of 12 reps at a 8 RPE. After each set, rest 60-120 seconds before\nreturning to B1.\n\nALTERNATIVES:\n\n1️⃣ 1DB Seated External Rotation: 3 sets of 12 reps each side at a 8-9 RPE. Face Pulls\n\nare great for general shoulder health and rear delt strength - these External Rotations are\nfantastic for isolating your rotator cuff. Choose the one that best reflects your goals!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups","sets_info":"3 sets of 10-12 reps","notes":"C1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups: 3 sets of\nas many reps as possible. Choose the variation that allows you to get around 6-8 reps or\nso!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ Seated Cable Chest Flye: 3 sets of 10-12 reps at a 8 RPE. If you'd like to work on\nisolating your chest/pecs, feel free to opt for these Chest Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you\nhave access to one! Get 3 sets of 10-12 reps at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"rpe":""},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"1KB Goblet Lateral Lunge","sets_info":"3 sets of 8 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 1KB Goblet Lateral Lunge: 3 sets of 8 reps on each side at a 8 RPE. After each set,\nrest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ Lateral Lunge with KB Clean to Goblet Reverse Lunge: 3 sets of 6 reps on each side at\na 7 RPE. This one is a bit of a doozy to coordinate, but it's a fun multi-planar combination\nmove that really enhances your single leg stability and strength!\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"8"},{"id":"D1","label":"Carry Variations - Day 4","exercise":"2KB Farmer March","sets_info":"3 sets of 30 second marches","notes":"D1) Carry Variations - Day 4\n\n➡️ 2KB Farmer March: 3 sets of 30 second marches at a 8-9 RPE. Superset (alternate\nsets) with the D2 movement down below.\n\nFarmer Carries are incredible at building grip endurance as well as core/back endurance\nstrength. The march adds an element of single leg stability and balance!\nALTERNATIVES:\n\n1️⃣ 2KB Racked March: 3 sets of 30 second marches at a 8-9 RPE. The Racked position\n\nworks less on your grip and more on your upper/mid back strength. Choose these if you're\nlooking to improve your torso strength for squats and deadllifts.\n\n2️⃣ 2KB Overhead March: 3 sets of 20-30 second marches at a 8-9 RPE. The Overhead\nposition works your shoulder stability and upper back strength. Choose these if you're\nlooking to improve your pressing strength and stability!\n\n⭐ Try to add weight or increase by 5 seconds each week!","variations":[],"rpe":"8-9"},{"id":"D2","label":"Core: Flexion","exercise":"Hollow Hold Series","sets_info":"3 sets of As Long As Possible (ALAP)","notes":"D2) Core: Flexion\n\n➡️ Hollow Hold Series: 3 sets of As Long As Possible (ALAP) at a 9-10 RPE. Choose\n\nONE of the options in the series that enables you to perform a hollow hold for 30-40\nseconds total. Do your best to keep your upper back and shoulder blades off of the floor,\nand press your lower back into the ground for maximal core activation.\nAfter each set, rest 60 seconds before returning to D1.\n\n⭐ Try to increase time by 5 seconds each week, or choose a harder level!","variations":[],"rpe":"9-10"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","sets_info":"3 sets of 10-12 reps each","notes":"E) PUMP Segment\n{You can choose between a biceps or a glute pump for this segment. This exercise is NOT part of a\nsuperset!}\n\n💪 For biceps, try this out:\n1️⃣ Bicep Curl \"Run the Rack\": Start at 5-10lbs and curl the weight 5 times. Then, go up in\n\nweight 2.5-5lbs and curl that weight 5 times. Continue going up in weight until you can't\ncurl the weight 5 times. Then, rest for a minute and then go back down the rack curling the\nsame exact weights 5 times until you get to your starting weights. You can use momentum\nhere to get the weights up - prepare to have noodle arms! 1 round should be PLENTY, but\nfeel free to rest for 3 minutes and do another round if you still have a little juice left in the\ntank!\n\n🍑 For glutes, try this out:\n2️⃣ Single Leg Shoulders Elevated Hip Lift - Constant Tension: 3 sets of 10-12 reps each\n\nside at a 9-10 RPE with 60 rest in between sets. Do your best to keep consistent tension\non the glutes and maintain mind-muscle connection with them!\n\n⭐ Each week, add weight, or increase the reps, or add an entire set!\n💡 Feel free to sub in the hip abductor machine (the one where the knees go out) if you\nhave access to one! Get 3 sets of 10-12 reps at a 9-10 RPE :)","variations":[],"rpe":""}]},{"id":"W1D1","week":1,"day":1,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Squat Jump","variations":[],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Squat Jump: 3 sets of 6 reps with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 2DB Squat Jump: 3 sets of 4 reps with 30 seconds rest between sets. If you want to up the ante further, hold onto a pair of light dumbbells or kettlebells by your sides!\n⭐ Progress by adding weight, or an extra repetition each week!"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, decrease weight by about 10-15% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Top End Range Single Leg Calf Pulses","variations":[],"sets_info":"3 sets of AMAP on each side","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Top End Range Single Leg Calf Pulses: 3 sets of AMAP on each side. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on two legs if the single leg version is a bit too challenging at the moment! You don't have to go to \"failure,\" just make sure you build up a good burn in your calves on each side!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform 3 sets of 15 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ BB OR 2DB RDLs: 3 sets of 8 reps at a 8 RPE. Focus on maintaining a neutral spine and engaging your hamstrings and glutes throughout the movement. Keep the weight in close to your body and control the descent. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Single Leg Deadlift with Band RNT: 3 sets of 8 reps each side at a 7 RPE. If you're looking to challenge, your single leg stability and balance, then opt for single leg deadlifts instead! As an option, you can try them with a thin band around the knees to increase glute activat"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Alternating Stepping Arnold Raise","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ 2DB Alternating Stepping Arnold Raise: 3 sets of 8 reps each side at a 6-7 RPE. Rest 60 seconds after each set before returning to C1.\nRarely in life are you every pressing straight overhead with both feet perfectly hip width apart. This move helps to incorporate an element of instability throughout your upper and lower body!\nALTERNATIVES:\n1️⃣ 2DB High Incline Supported Y Raise: 3 sets of 12 reps at a 6 RPE. If you're looking to truly isolate the delts and you want less stability demands, then opt for these bench supported Y Raises instead!\n⭐ Try to add weight or increa"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. Use a band thickness that allows you to get about 10 reps, but only do 8 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Wee"},{"id":"D2","label":"Isolation: Quads","exercise":"Heels Elevated 2DB Suitcase Squat","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"D2) Isolation: Quads\n➡️ Heels Elevated 2DB Suitcase Squat: 3 sets of 10 reps at a 8-9 RPE. Rest 60 seconds after each set before returning to D1.\nDo your best to shift your knees forward for this movement to load the quads!\nALTERNATIVES:\n1️⃣ Goblet DB Heels Elevated Squat to Staggered Stance Squat: 3 sets of 5 reps. Squat, step forward and staggered squat, step back and squat, step forward and staggered squat is 1 rep. Do 5 reps total!\n💡 Feel free to sub in a leg extension machine here if you have access to one! Perform 3 sets of 15 at a 9 RPE :)\n⭐  Try to add weight or increase by one repetit"},{"id":"E","label":"Finisher","exercise":"Band/Cable Anti-Rotation Press with Rotation","variations":["Band/Cable Anti-Rotation Press with Rotation","Band/Cable Staggered Stance Chops"],"sets_info":"4 sets of 8 reps on each side","rpe":"7-8","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 CORE FINISHER:\n➡️ Band/Cable Anti-Rotation Press with Rotation OR Band/Cable Staggered Stance Chops OR KB Staggered Stance Diagonal Lift: Choose ONE and perform 3-4 sets of 8 reps on each side at a 7-8 RPE with 30 seconds rest in between sets. Each week, increase by 1 set, or by 2 reps, or increase the weight!\n💪 TRICEPS FINISHER\n➡️ Seated Overhead KB Triceps Extension OR BB OH Triceps Extensions: Pe"}]},{"id":"W1D2","week":1,"day":2,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Angled BB Rotational Split Jerk","variations":["Angled BB Rotational Split Jerk","DB Rotational Split Jerk"],"sets_info":"3 sets of 5 reps each side","rpe":"6-7","notes":"A) Power Development - Day 2\n➡️ Angled BB Rotational Split Jerk OR DB Rotational Split Jerk: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a landmine attachment, then opt for the dumbbell version!\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest between sets. If the thought of jumping and rotating and pressing is a bit too much for you at the moment, opt for these traditional push press"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 4 at a 8 RPE","rpe":"8","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 4 at a 8 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, start this volume at a working weight about 5% lighter than what you used last week. Increase the weight by 2.5-5lbs weekly for your working sets. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 𝘧𝘪𝘳𝘴𝘵 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flyes","variations":[],"sets_info":"3 sets of 12 reps","rpe":"7","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Bent Over Reverse Flyes: 3 sets of 12 reps at a 7 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps at a 7 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Muscle Clean to Press","variations":["2DB Muscle Clean to Press","2KB Muscle Clean to Press"],"sets_info":"3 sets of 8 reps each","rpe":"6-7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2DB Muscle Clean to Press OR 2KB Muscle Clean to Press: 3 sets of 8 reps each at a 6-7 RPE. Superset (alternate sets) with the C2 movement down below.\nUse a little body english to muscle clean the weights up and then press overhead!\nALTERNATIVE:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Diamond Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 8-10 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in any chest press machine here if you have a"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"1.5 BB Hip Thrust","variations":[],"sets_info":"4 sets of 8-10 reps","rpe":"8","notes":"C2) Lower Body Accessory - Day 2\n➡️ 1.5 BB Hip Thrust: 3-4 sets of 8-10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\nTry to move smoothly rather than bouncing and using momentum!\nALTERNATIVES:\n1️⃣ 1.5 BB Supine Glute Bridge: 3-4 sets of 8-10 reps at a 8 RPE. The BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1.5 KB Straddle Lift: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these Straddle Lifts instead! Focus on mind-muscle connection with "},{"id":"D1","label":"Isolation: Biceps","exercise":"2DB Alternating Curls","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"D1) Isolation: Biceps\n➡️ 2DB Alternating Curls: 3 sets of 8 reps each side at a 8-9 RPE. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ 1KB Goblet Hammer Curls: 3 sets of 10 reps at a 8 RPE. If you'd rather use kettlebells, you can opt for these 1KB Goblet Curls instead!\n⭐  Try to add weight or increase by one repetition each week to progressively overload!"},{"id":"D2","label":"Row Variations - Day 2","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D2) Row Variations - Day 2\n➡️ BB OR DB Yates Row: 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFor these Yates Rows, have a very *slightly* inclined torso position and focus on the rowing the weight towards your hips using your lats. This is different from a traditional bent over row where your torso is nearly parallel to the floor and you're pulling the weight towards the base of your sternum.\n📝 If you were on RISE last month, we're repeating the Yates row as it felt really nice to pull from a lower position and emphasize the lats! This time, we just mo"},{"id":"E","label":"Finisher","exercise":"Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional roun"}]},{"id":"W1D3","week":1,"day":3,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Speed Split Squat From ISO Hold","variations":["Speed Split Squat From ISO Hold","Split Squat Jump","Alternating Split Squat Jumps - Short Stride"],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Speed Split Squat From ISO Hold OR Split Squat Jump OR Alternating Split Squat Jumps - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose from any of the options above - they are ordered from least difficult to most difficult. The short stride is more of an athletic position since most of your weight is closer to your stance leg."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Addcutors","exercise":"Floor Copenhagen Plank - Short","variations":["Floor Copenhagen Plank - Short","Long Lever"],"sets_info":"3 sets of 20-30 second holds on each side","rpe":"9","notes":"B2) Isolation: Addcutors\n➡️ Floor Copenhagen Plank - Short OR Long Lever: 3 sets of 20-30 second holds on each side. The Longer lever is significantly more challenging than the Short Lever position. After each set, rest 60-120 seconds before returning to B1.\nThe Floor Copenhagen can feel a bit awkward for some people - if that's the case for you, you can opt for traditional Copenhagens on a bench instead!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts: 3 sets of 10-15 reps each side at a 9 RPE. If Copenhagens are a bit too much for you at the moment, feel free to opt for these Leg Lifts inste"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Walking Lunge","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Walking Lunge: 3 sets of 8 reps on each side at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB RFE Split Squat: 3 sets of 8 reps on each side at a 8 RPE. If you don't have the space to go walking lunge around, then opt for these stationary Rear Foot Elevated Split Squats instead!\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 4-6 reps on each side at a 8 RPE. If you're working on Pistol Squats specifically, you can opt for this progression instead! It is worth mentioning though that the stronger you are w"},{"id":"C2","label":"Isolation: Delts","exercise":"Incline Bench Single Arm DB Side Lying Lateral Raise","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Incline Bench Single Arm DB Side Lying Lateral Raise: 3 sets of 10 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Single Arm Lateral Raise: 3 sets of 10 reps each side at a 7 RPE. If you don't have access to an incline bench, you can opt for traditional lateral raises with a resistance band or cable machine instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6. Use a band thickness that allows you to get about 8 reps, but only do 6 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 10 reps","rpe":"9","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-6 reps. "},{"id":"E","label":"Finisher","exercise":"Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x)","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x): 4-5 Rounds with 60-90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\nPerform all reps of a given movement before moving on to the next. You can use a dumbbell or kettlebell for this complex.\n⭐ Each week, try to a"}]},{"id":"W1D4","week":1,"day":4,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Foot on Box Single Leg Pogo Hops - Arms Overhead","variations":[],"sets_info":"3 sets of 20-30 seconds on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Foot on Box Single Leg Pogo Hops - Arms Overhead: 3 sets of 20-30 seconds on each side with 30 seconds rest in between sets. Your foot can be on a bench, a plyo box, or any other elevated surface that's stable! 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese pogo hops won't feel terribly challenging, but they're highly beneficial for your feet, ankles, and calves! They're great for building elasticity and resiliency in your lower leg!\nALTERNATIVES:\n1️⃣ Foot on Box Side to Side Single Leg Pogo Hops: 3 sets of 2"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 8 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's work"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye: 3 sets of 10 reps at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8-9 RPE. If you don't have access to a good band/cable set up, opt for these dumbbell flyes instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C1) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups OR 2DB Decline Deficit Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 10 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Seated Cable Chest Press: 3 sets of 10 reps at a 9 RPE. If you'd like to work on isolating your chest/pecs, feel free to opt for these Chest Flyes instead!\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you have access to one! Get 3 sets of 10-12"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"Lateral Lunge Position ISO with Single Arm KB Row","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"C2) Lower Body Accessory - Day 4\n➡️ Lateral Lunge Position ISO with Single Arm KB Row: 3 sets of 8 reps on each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Lateral Lunge to Single Arm DB Row: 3 sets of 6 reps on each side at a 7 RPE. Opt for this version if  you're comfortable with the Lateral Lunge position and want to move more dynamically in and out of position!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D1","label":"Isolation: Delts","exercise":"2DB 3-Way Lateral Raise","variations":[],"sets_info":"3 sets of 4 reps (12 reps total per set)","rpe":"9","notes":"D1) Isolation: Delts\n➡️ 2DB 3-Way Lateral Raise: 3 sets of 4 reps (12 reps total per set) at a 9 RPE. Superset (alternate sets) with the D2 movement down below.\nAs you go through the different angles, try to be aware and \"feel\" the different parts of your delts working!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Stability Ball Front Plank","Stability Ball Rollout","Sliding Bodysaw"],"sets_info":"3 sets of 30-40 seconds","rpe":"9-10","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Stability Ball Front Plank OR Stability Ball Rollout OR Sliding Bodysaw OR Ab Wheel Rollout: 3 sets of 30-40 seconds at a 9-10 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase time by 3-5 seconds each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"2 sets of \"21s\" with 90-120 seconds rest in between sets","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴/𝘵𝘳𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 BICEPS OR TRICEPS:\n1️⃣ 2DB Bicep Curl 21s OR 2DB Lying Tricep Extension 21s: Choose between biceps and triceps and perform 2 sets of \"21s\" with 90-120 seconds rest in between sets. Each week, add another set, or increase weight, or decrease rest period between sets by 10 seconds!\n🍑 For glutes, try this out:\n2️⃣ 2DB Walking Long Stride Lunge: Perform 50-60 total reps in as few sets as possible. Keep mind-muscle connection on the glutes with each stride. Each wee"}]},{"id":"W2D1","week":2,"day":1,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Squat Jump","variations":[],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Squat Jump: 3 sets of 6 reps with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 2DB Squat Jump: 3 sets of 4 reps with 30 seconds rest between sets. If you want to up the ante further, hold onto a pair of light dumbbells or kettlebells by your sides!\n⭐ Progress by adding weight, or an extra repetition each week!"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, decrease weight by about 10-15% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Top End Range Single Leg Calf Pulses","variations":[],"sets_info":"3 sets of AMAP on each side","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Top End Range Single Leg Calf Pulses: 3 sets of AMAP on each side. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on two legs if the single leg version is a bit too challenging at the moment! You don't have to go to \"failure,\" just make sure you build up a good burn in your calves on each side!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform 3 sets of 15 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ BB OR 2DB RDLs: 3 sets of 8 reps at a 8 RPE. Focus on maintaining a neutral spine and engaging your hamstrings and glutes throughout the movement. Keep the weight in close to your body and control the descent. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Single Leg Deadlift with Band RNT: 3 sets of 8 reps each side at a 7 RPE. If you're looking to challenge, your single leg stability and balance, then opt for single leg deadlifts instead! As an option, you can try them with a thin band around the knees to increase glute activat"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Alternating Stepping Arnold Raise","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ 2DB Alternating Stepping Arnold Raise: 3 sets of 8 reps each side at a 6-7 RPE. Rest 60 seconds after each set before returning to C1.\nRarely in life are you every pressing straight overhead with both feet perfectly hip width apart. This move helps to incorporate an element of instability throughout your upper and lower body!\nALTERNATIVES:\n1️⃣ 2DB High Incline Supported Y Raise: 3 sets of 12 reps at a 6 RPE. If you're looking to truly isolate the delts and you want less stability demands, then opt for these bench supported Y Raises instead!\n⭐ Try to add weight or increa"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. Use a band thickness that allows you to get about 10 reps, but only do 8 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Wee"},{"id":"D2","label":"Isolation: Quads","exercise":"Heels Elevated 2DB Suitcase Squat","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"D2) Isolation: Quads\n➡️ Heels Elevated 2DB Suitcase Squat: 3 sets of 10 reps at a 8-9 RPE. Rest 60 seconds after each set before returning to D1.\nDo your best to shift your knees forward for this movement to load the quads!\nALTERNATIVES:\n1️⃣ Goblet DB Heels Elevated Squat to Staggered Stance Squat: 3 sets of 5 reps. Squat, step forward and staggered squat, step back and squat, step forward and staggered squat is 1 rep. Do 5 reps total!\n💡 Feel free to sub in a leg extension machine here if you have access to one! Perform 3 sets of 15 at a 9 RPE :)\n⭐  Try to add weight or increase by one repetit"},{"id":"E","label":"Finisher","exercise":"Band/Cable Anti-Rotation Press with Rotation","variations":["Band/Cable Anti-Rotation Press with Rotation","Band/Cable Staggered Stance Chops"],"sets_info":"4 sets of 8 reps on each side","rpe":"7-8","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 CORE FINISHER:\n➡️ Band/Cable Anti-Rotation Press with Rotation OR Band/Cable Staggered Stance Chops OR KB Staggered Stance Diagonal Lift: Choose ONE and perform 3-4 sets of 8 reps on each side at a 7-8 RPE with 30 seconds rest in between sets. Each week, increase by 1 set, or by 2 reps, or increase the weight!\n💪 TRICEPS FINISHER\n➡️ Seated Overhead KB Triceps Extension OR BB OH Triceps Extensions: Pe"}]},{"id":"W2D2","week":2,"day":2,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Angled BB Rotational Split Jerk","variations":["Angled BB Rotational Split Jerk","DB Rotational Split Jerk"],"sets_info":"3 sets of 5 reps each side","rpe":"6-7","notes":"A) Power Development - Day 2\n➡️ Angled BB Rotational Split Jerk OR DB Rotational Split Jerk: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a landmine attachment, then opt for the dumbbell version!\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest between sets. If the thought of jumping and rotating and pressing is a bit too much for you at the moment, opt for these traditional push press"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 4 at a 8 RPE","rpe":"8","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 4 at a 8 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, start this volume at a working weight about 5% lighter than what you used last week. Increase the weight by 2.5-5lbs weekly for your working sets. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 𝘧𝘪𝘳𝘴𝘵 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flyes","variations":[],"sets_info":"3 sets of 12 reps","rpe":"7","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Bent Over Reverse Flyes: 3 sets of 12 reps at a 7 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps at a 7 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Muscle Clean to Press","variations":["2DB Muscle Clean to Press","2KB Muscle Clean to Press"],"sets_info":"3 sets of 8 reps each","rpe":"6-7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2DB Muscle Clean to Press OR 2KB Muscle Clean to Press: 3 sets of 8 reps each at a 6-7 RPE. Superset (alternate sets) with the C2 movement down below.\nUse a little body momentum to muscle clean the weights up and then press overhead!\nALTERNATIVE:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Diamond Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 8-10 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in any chest press machine here if you have "},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"1.5 BB Hip Thrust","variations":[],"sets_info":"4 sets of 8-10 reps","rpe":"8","notes":"C2) Lower Body Accessory - Day 2\n➡️ 1.5 BB Hip Thrust: 3-4 sets of 8-10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\nTry to move smoothly rather than bouncing and using momentum!\nALTERNATIVES:\n1️⃣ 1.5 BB Supine Glute Bridge: 3-4 sets of 8-10 reps at a 8 RPE. The BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1.5 KB Straddle Lift: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these Straddle Lifts instead! Focus on mind-muscle connection with "},{"id":"D1","label":"Isolation: Biceps","exercise":"2DB Alternating Curls","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"D1) Isolation: Biceps\n➡️ 2DB Alternating Curls: 3 sets of 8 reps each side at a 8-9 RPE. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ 1KB Goblet Hammer Curls: 3 sets of 10 reps at a 8 RPE. If you'd rather use kettlebells, you can opt for these 1KB Goblet Curls instead!\n⭐  Try to add weight or increase by one repetition each week to progressively overload!"},{"id":"D2","label":"Row Variations - Day 2","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D2) Row Variations - Day 2\n➡️ BB OR DB Yates Row: 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFor these Yates Rows, have a very *slightly* inclined torso position and focus on the rowing the weight towards your hips using your lats. This is different from a traditional bent over row where your torso is nearly parallel to the floor and you're pulling the weight towards the base of your sternum.\n📝 If you were on RISE last month, we're repeating the Yates row as it felt really nice to pull from a lower position and emphasize the lats! This time, we just mo"},{"id":"E","label":"Finisher","exercise":"Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional roun"}]},{"id":"W2D3","week":2,"day":3,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Speed Split Squat From ISO Hold","variations":["Speed Split Squat From ISO Hold","Split Squat Jump","Alternating Split Squat Jumps - Short Stride"],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Speed Split Squat From ISO Hold OR Split Squat Jump OR Alternating Split Squat Jumps - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose from any of the options above - they are ordered from least difficult to most difficult. The short stride is more of an athletic position since most of your weight is closer to your stance leg."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Addcutors","exercise":"Floor Copenhagen Plank - Short","variations":["Floor Copenhagen Plank - Short","Long Lever"],"sets_info":"3 sets of 20-30 second holds on each side","rpe":"9","notes":"B2) Isolation: Addcutors\n➡️ Floor Copenhagen Plank - Short OR Long Lever: 3 sets of 20-30 second holds on each side. The Longer lever is significantly more challenging than the Short Lever position. After each set, rest 60-120 seconds before returning to B1.\nThe Floor Copenhagen can feel a bit awkward for some people - if that's the case for you, you can opt for traditional Copenhagens on a bench instead!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts: 3 sets of 10-15 reps each side at a 9 RPE. If Copenhagens are a bit too much for you at the moment, feel free to opt for these Leg Lifts inste"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Walking Lunge","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Walking Lunge: 3 sets of 8 reps on each side at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB RFE Split Squat: 3 sets of 8 reps on each side at a 8 RPE. If you don't have the space to go walking lunge around, then opt for these stationary Rear Foot Elevated Split Squats instead!\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 4-6 reps on each side at a 8 RPE. If you're working on Pistol Squats specifically, you can opt for this progression instead! It is worth mentioning though that the stronger you are w"},{"id":"C2","label":"Isolation: Delts","exercise":"Incline Bench Single Arm DB Side Lying Lateral Raise","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Incline Bench Single Arm DB Side Lying Lateral Raise: 3 sets of 10 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Single Arm Lateral Raise: 3 sets of 10 reps each side at a 7 RPE. If you don't have access to an incline bench, you can opt for traditional lateral raises with a resistance band or cable machine instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6. Use a band thickness that allows you to get about 8 reps, but only do 6 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 10 reps","rpe":"9","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-6 reps. "},{"id":"E","label":"Finisher","exercise":"Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x)","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x): 4-5 Rounds with 60-90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\nPerform all reps of a given movement before moving on to the next. You can use a dumbbell or kettlebell for this complex.\n⭐ Each week, try to a"}]},{"id":"W2D4","week":2,"day":4,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Foot on Box Single Leg Pogo Hops - Arms Overhead","variations":[],"sets_info":"3 sets of 20-30 seconds on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Foot on Box Single Leg Pogo Hops - Arms Overhead: 3 sets of 20-30 seconds on each side with 30 seconds rest in between sets. Your foot can be on a bench, a plyo box, or any other elevated surface that's stable! 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese pogo hops won't feel terribly challenging, but they're highly beneficial for your feet, ankles, and calves! They're great for building elasticity and resiliency in your lower leg!\nALTERNATIVES:\n1️⃣ Foot on Box Side to Side Single Leg Pogo Hops: 3 sets of 2"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 8 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's work"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye: 3 sets of 10 reps at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8-9 RPE. If you don't have access to a good band/cable set up, opt for these dumbbell flyes instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C1) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups OR 2DB Decline Deficit Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 10 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Seated Cable Chest Press: 3 sets of 10 reps at a 9 RPE. If you'd like to work on isolating your chest/pecs, feel free to opt for these Chest Flyes instead!\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you have access to one! Get 3 sets of 10-12"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"Lateral Lunge Position ISO with Single Arm KB Row","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"C2) Lower Body Accessory - Day 4\n➡️ Lateral Lunge Position ISO with Single Arm KB Row: 3 sets of 8 reps on each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Lateral Lunge to Single Arm DB Row: 3 sets of 6 reps on each side at a 7 RPE. Opt for this version if  you're comfortable with the Lateral Lunge position and want to move more dynamically in and out of position!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D1","label":"Isolation: Delts","exercise":"2DB 3-Way Lateral Raise","variations":[],"sets_info":"3 sets of 4 reps (12 reps total per set)","rpe":"9","notes":"D1) Isolation: Delts\n➡️ 2DB 3-Way Lateral Raise: 3 sets of 4 reps (12 reps total per set) at a 9 RPE. Superset (alternate sets) with the D2 movement down below.\nAs you go through the different angles, try to be aware and \"feel\" the different parts of your delts working!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Stability Ball Front Plank","Stability Ball Rollout","Sliding Bodysaw"],"sets_info":"3 sets of 30-40 seconds","rpe":"9-10","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Stability Ball Front Plank OR Stability Ball Rollout OR Sliding Bodysaw OR Ab Wheel Rollout: 3 sets of 30-40 seconds at a 9-10 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase time by 3-5 seconds each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"2 sets of \"21s\" with 90-120 seconds rest in between sets","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴/𝘵𝘳𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 BICEPS OR TRICEPS:\n1️⃣ 2DB Bicep Curl 21s OR 2DB Lying Tricep Extension 21s: Choose between biceps and triceps and perform 2 sets of \"21s\" with 90-120 seconds rest in between sets. Each week, add another set, or increase weight, or decrease rest period between sets by 10 seconds!\n🍑 For glutes, try this out:\n2️⃣ 2DB Walking Long Stride Lunge: Perform 50-60 total reps in as few sets as possible. Keep mind-muscle connection on the glutes with each stride. Each wee"}]},{"id":"W3D1","week":3,"day":1,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Squat Jump","variations":[],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Squat Jump: 3 sets of 6 reps with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 2DB Squat Jump: 3 sets of 4 reps with 30 seconds rest between sets. If you want to up the ante further, hold onto a pair of light dumbbells or kettlebells by your sides!\n⭐ Progress by adding weight, or an extra repetition each week!"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, decrease weight by about 10-15% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Top End Range Single Leg Calf Pulses","variations":[],"sets_info":"3 sets of AMAP on each side","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Top End Range Single Leg Calf Pulses: 3 sets of AMAP on each side. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on two legs if the single leg version is a bit too challenging at the moment! You don't have to go to \"failure,\" just make sure you build up a good burn in your calves on each side!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform 3 sets of 15 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ BB OR 2DB RDLs: 3 sets of 8 reps at a 8 RPE. Focus on maintaining a neutral spine and engaging your hamstrings and glutes throughout the movement. Keep the weight in close to your body and control the descent. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Single Leg Deadlift with Band RNT: 3 sets of 8 reps each side at a 7 RPE. If you're looking to challenge, your single leg stability and balance, then opt for single leg deadlifts instead! As an option, you can try them with a thin band around the knees to increase glute activat"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Alternating Stepping Arnold Raise","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ 2DB Alternating Stepping Arnold Raise: 3 sets of 8 reps each side at a 6-7 RPE. Rest 60 seconds after each set before returning to C1.\nRarely in life are you every pressing straight overhead with both feet perfectly hip width apart. This move helps to incorporate an element of instability throughout your upper and lower body!\nALTERNATIVES:\n1️⃣ 2DB High Incline Supported Y Raise: 3 sets of 12 reps at a 6 RPE. If you're looking to truly isolate the delts and you want less stability demands, then opt for these bench supported Y Raises instead!\n⭐ Try to add weight or increa"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. Use a band thickness that allows you to get about 10 reps, but only do 8 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Wee"},{"id":"D2","label":"Isolation: Quads","exercise":"Heels Elevated 2DB Suitcase Squat","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"D2) Isolation: Quads\n➡️ Heels Elevated 2DB Suitcase Squat: 3 sets of 10 reps at a 8-9 RPE. Rest 60 seconds after each set before returning to D1.\nDo your best to shift your knees forward for this movement to load the quads!\nALTERNATIVES:\n1️⃣ Goblet DB Heels Elevated Squat to Staggered Stance Squat: 3 sets of 5 reps. Squat, step forward and staggered squat, step back and squat, step forward and staggered squat is 1 rep. Do 5 reps total!\n💡 Feel free to sub in a leg extension machine here if you have access to one! Perform 3 sets of 15 at a 9 RPE :)\n⭐  Try to add weight or increase by one repetit"},{"id":"E","label":"Finisher","exercise":"Band/Cable Anti-Rotation Press with Rotation","variations":["Band/Cable Anti-Rotation Press with Rotation","Band/Cable Staggered Stance Chops"],"sets_info":"4 sets of 8 reps on each side","rpe":"7-8","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 CORE FINISHER:\n➡️ Band/Cable Anti-Rotation Press with Rotation OR Band/Cable Staggered Stance Chops OR KB Staggered Stance Diagonal Lift: Choose ONE and perform 3-4 sets of 8 reps on each side at a 7-8 RPE with 30 seconds rest in between sets. Each week, increase by 1 set, or by 2 reps, or increase the weight!\n💪 TRICEPS FINISHER\n➡️ Seated Overhead KB Triceps Extension OR BB OH Triceps Extensions: Pe"}]},{"id":"W3D2","week":3,"day":2,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Angled BB Rotational Split Jerk","variations":["Angled BB Rotational Split Jerk","DB Rotational Split Jerk"],"sets_info":"3 sets of 5 reps each side","rpe":"6-7","notes":"A) Power Development - Day 2\n➡️ Angled BB Rotational Split Jerk OR DB Rotational Split Jerk: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a landmine attachment, then opt for the dumbbell version!\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest between sets. If the thought of jumping and rotating and pressing is a bit too much for you at the moment, opt for these traditional push press"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 4 at a 8 RPE","rpe":"8","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 4 at a 8 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, start this volume at a working weight about 5% lighter than what you used last week. Increase the weight by 2.5-5lbs weekly for your working sets. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 𝘧𝘪𝘳𝘴𝘵 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flyes","variations":[],"sets_info":"3 sets of 12 reps","rpe":"7","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Bent Over Reverse Flyes: 3 sets of 12 reps at a 7 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps at a 7 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Muscle Clean to Press","variations":["2DB Muscle Clean to Press","2KB Muscle Clean to Press"],"sets_info":"3 sets of 8 reps each","rpe":"6-7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2DB Muscle Clean to Press OR 2KB Muscle Clean to Press: 3 sets of 8 reps each at a 6-7 RPE. Superset (alternate sets) with the C2 movement down below.\nUse a little body momentum to muscle clean the weights up and then press overhead!\nALTERNATIVE:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Diamond Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 8-10 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in any chest press machine here if you have "},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"1.5 BB Hip Thrust","variations":[],"sets_info":"4 sets of 8-10 reps","rpe":"8","notes":"C2) Lower Body Accessory - Day 2\n➡️ 1.5 BB Hip Thrust: 3-4 sets of 8-10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\nTry to move smoothly rather than bouncing and using momentum!\nALTERNATIVES:\n1️⃣ 1.5 BB Supine Glute Bridge: 3-4 sets of 8-10 reps at a 8 RPE. The BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1.5 KB Straddle Lift: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these Straddle Lifts instead! Focus on mind-muscle connection with "},{"id":"D1","label":"Isolation: Biceps","exercise":"2DB Alternating Curls","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"D1) Isolation: Biceps\n➡️ 2DB Alternating Curls: 3 sets of 8 reps each side at a 8-9 RPE. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ 1KB Goblet Hammer Curls: 3 sets of 10 reps at a 8 RPE. If you'd rather use kettlebells, you can opt for these 1KB Goblet Curls instead!\n⭐  Try to add weight or increase by one repetition each week to progressively overload!"},{"id":"D2","label":"Row Variations - Day 2","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D2) Row Variations - Day 2\n➡️ BB OR DB Yates Row: 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFor these Yates Rows, have a very *slightly* inclined torso position and focus on the rowing the weight towards your hips using your lats. This is different from a traditional bent over row where your torso is nearly parallel to the floor and you're pulling the weight towards the base of your sternum.\n📝 If you were on RISE last month, we're repeating the Yates row as it felt really nice to pull from a lower position and emphasize the lats! This time, we just mo"},{"id":"E","label":"Finisher","exercise":"Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4
