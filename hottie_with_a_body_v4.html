.mgr{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.mgex{font-size:11px;color:var(--mu)}
.mgsub{font-size:11px;color:var(--ac3);margin:1px 0 4px 2px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ac);color:#111;font-weight:600;font-size:13px;padding:9px 20px;border-radius:30px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.yt-link{display:inline-flex;align-items:center;gap:5px;color:var(--ac3);font-size:11px;text-decoration:none;margin-top:6px;padding:4px 9px;background:rgba(126,184,255,.07);border:1px solid rgba(126,184,255,.2);border-radius:8px}
.yt-link:hover{background:rgba(126,184,255,.12)}
/* Swipe exercise navigator */
.sec-dots{display:flex;gap:5px;justify-content:center;padding:10px 0 6px;flex-wrap:wrap}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(--bd);transition:background .2s}
.sec-dot-on{background:var(--ac)!important;width:18px!important;border-radius:4px!important}
.sec-dot-done{background:#3a9a52!important}
.swc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin:0 10px;overflow:hidden;transition:border-color .2s}
.swc-done{border-color:rgba(105,219,124,.35)}
.swc-head{padding:12px 14px 10px;border-bottom:1px solid var(--bd)}
.sex-swap{color:var(--ac)!important}
.swc-chk-row{margin-top:8px}
.swc-chk{background:var(--sf2);border:1.5px solid var(--bd);border-radius:8px;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer}
.swc-chk-on{background:rgba(105,219,124,.12);border-color:#69db7c;color:#69db7c}
.swc-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;border-top:1px solid var(--bd)}
.swc-chip{font-size:10px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;text-decoration:none;display:inline-block}
.swc-chip-swap{color:var(--ac);border-color:rgba(232,255,90,.25);background:rgba(232,255,90,.06)}
.swc-nav{display:flex;gap:8px;padding:10px;margin-top:2px}
.swc-nav-back{flex:0 0 auto;padding:11px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:11px;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.swc-nav-dim{opacity:.35;pointer-events:none}
.swc-nav-next{flex:1;padding:12px;background:var(--ac);color:#111;border:none;border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
/* CLEAN EXERCISE CARD */
.ex-card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;margin:0 12px;overflow:hidden;transition:border-color .2s}
.ex-card.ex-done{border-color:rgba(65,234,212,.3)}
.ex-head{padding:20px 18px 16px}
.ex-badge-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ex-title{font-size:22px;font-weight:700;color:var(--tx);line-height:1.2;margin-bottom:8px}
.ex-title.sex-swap{color:var(--ac)}
.ex-sets-quick{font-size:11px;color:var(--mu);font-weight:500}
.ex-super-label{font-size:10px;color:var(--ac2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.ex-divider{height:1px;background:var(--bd);margin:0 18px}
.ex-sets{padding:6px 14px 10px}
.ex-set-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ex-set-row:last-child{border-bottom:none}
.ex-set-num{font-size:12px;font-weight:700;color:var(--mu);width:36px;flex-shrink:0;padding-top:14px;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.ex-set-col{flex:1;display:flex;flex-direction:column;align-items:stretch;gap:3px;min-width:0}
.ex-set-unit{font-size:11px;font-weight:600;color:var(--mu);text-align:center;letter-spacing:.5px;text-transform:uppercase;margin-top:-1px}
.ex-set-inp{width:100%;background:var(--sf2);border:1.5px solid var(--bd);border-radius:12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;padding:12px 8px;outline:none;text-align:center;transition:border-color .15s,color .15s;min-width:0;-moz-appearance:textfield}
.ex-set-inp::-webkit-inner-spin-button,.ex-set-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.ex-set-inp:focus{border-color:var(--ac);background:rgba(215,247,91,.05)}
.ex-set-inp:not(:placeholder-shown){color:var(--ac);font-weight:700}
.ex-set-last{font-size:10px;color:var(--mu);text-align:center;padding:1px 0 2px;min-height:14px}
.ex-actions{display:flex;align-items:center;gap:6px;padding:12px 18px;border-top:1px solid var(--bd)}
.ex-act-btn{flex:1;padding:10px 6px;border-radius:11px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.ex-act-btn:active{background:var(--sf2)}
.ex-act-swap{color:var(--ac);border-color:rgba(215,247,91,.25);background:rgba(215,247,91,.05)}
.ex-act-demo{color:#ff6666;border-color:rgba(255,100,100,.2);background:rgba(255,100,100,.04)}
.ex-act-done{background:var(--ac);color:#111;border-color:var(--ac);font-weight:700}
.ex-act-done-on{background:rgba(65,234,212,.15);color:var(--ac4);border-color:rgba(65,234,212,.35)}
.ex-var-pills{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px 14px}
.ex-var-pill{padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:normal;word-break:break-word;line-height:1.3;text-align:left}
.ex-var-pill-on{background:rgba(215,247,91,.12);border-color:var(--ac);color:var(--ac);font-weight:700}
/* Notes + swap sheets */
.notes-ttl{font-size:10px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.notes-body{font-size:12px;color:#bbb;line-height:1.65;margin-bottom:12px}
.swap-sec-label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px}
.swap-alts{font-size:11px;color:#aaa;line-height:1.6;background:var(--sf2);border-radius:8px;padding:9px 11px;margin-bottom:4px}
.swap-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:10px 12px;margin-bottom:10px;outline:none}
.swap-input:focus{border-color:var(--ac)}
.swap-clear{display:block;width:100%;margin-top:8px;padding:9px;background:none;border:1px solid var(--bd);border-radius:9px;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer}

.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.setup-sheet{background:var(--sf);border-radius:20px 20px 0 0;padding:16px 16px 32px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.1,.64,1)}
.setup-sheet.in{transform:translateY(0)}
.setup-overlay.out .setup-sheet{transform:translateY(100%);transition:transform .22s ease-in}
.setup-drag-handle{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px}
.setup-title{font-family:'Syne',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--tx);margin-bottom:3px}
.setup-sub{font-size:11px;color:var(--mu);margin-bottom:16px}
.setup-flags{background:rgba(232,255,90,.04);border:1px solid rgba(232,255,90,.12);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.setup-flag-row{display:flex;gap:8px;align-items:flex-start}
.setup-flag-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.setup-flag-msg{font-size:11px;color:#bbb;line-height:1.5}
.setup-flag-msg strong{color:var(--tx)}
.setup-item{margin-bottom:14px}
.setup-item-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.setup-item-ex{font-size:13px;font-weight:600;color:var(--tx)}
.setup-go{display:block;width:100%;margin-top:8px;padding:14px;background:var(--ac);color:#111;font-family:'Syne',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;border-radius:12px;cursor:pointer}
/* Alternatives toggle */
.alts-sec{margin-top:10px}
.alts-tog{background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:7px;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;display:block;margin-bottom:0}
.alts-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);font-size:12px;color:#aaa;line-height:1.6}
.alts-sec.open .alts-tog{color:var(--ac);border-color:rgba(232,255,90,.3)}
.alts-sec.open .alts-tog::after{content:' ▴'}
.alts-sec.open .alts-body{display:block}
.setup-rebtn{display:block;width:100%;margin-top:8px;padding:10px;background:none;border:1px solid var(--bd);border-radius:10px;color:var(--mu);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer}


.set-tbl{width:100%;border-collapse:collapse;font-family:'Plus Jakarta Sans',sans-serif}
.set-tbl thead th{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;padding:6px 6px 4px;text-align:center;border-bottom:1px solid var(--bd)}
.set-tbl thead th:first-child{text-align:left;padding-left:4px;width:36px}
.set-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
.set-tbl tbody tr:last-child{border-bottom:none}
.set-tbl tbody td{padding:5px 4px;vertical-align:middle;text-align:center}
.set-num{font-size:11px;font-weight:700;color:var(--mu);text-align:left!important;padding-left:4px!important}
.si-inp{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:5px 4px;text-align:center;outline:none;min-width:0}
.si-inp:focus{border-color:var(--ac)}
.si-inp:not(:placeholder-shown){border-color:rgba(232,255,90,.3);color:var(--ac);font-weight:600}
.ss-ex-pair{display:flex;flex-direction:column;gap:6px;margin:6px 0 4px}
.ss-ex-item{display:flex;flex-wrap:wrap;align-items:baseline;gap:5px}
.ss-ex-id{font-size:9px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.ss-ex-name{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3}
.ss-mtags{display:flex;flex-wrap:wrap;gap:3px;width:100%;margin-top:1px}

.ss-hcol{padding:8px 10px}
.ss-hcol:first-child{border-right:1px solid var(--bd)}
.ss-hid{font-size:9px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.ss-hex{font-size:11px;font-weight:600;line-height:1.3;color:var(--tx)}
.ss-badge-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.ss-sep{font-size:10px;color:var(--mu)}
.ss-super-label{font-size:9px;color:var(--ac);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-left:4px}
.sn-sec-label{font-size:9px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.lg-notes-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.yt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}

.var-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.var-btns{display:flex;flex-direction:column;gap:5px}
.var-btn{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);cursor:pointer;transition:all .15s;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;white-space:normal;word-break:break-word;line-height:1.35;overflow:visible;height:auto}
.var-btn:active{transform:scale(.97)}
.var-btn.var-selected{background:rgba(232,255,90,.1);border-color:var(--ac);color:var(--ac);font-weight:600}
.home-wrap{padding:20px 16px 80px;display:flex;flex-direction:column;gap:14px}
.home-week-card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px 14px 14px}
.home-week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.home-week-title{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:.3px}
.home-week-strip{display:flex;justify-content:space-between;gap:4px}
.home-week-day{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.home-week-label{font-size:11px;color:var(--mu);font-weight:600;text-transform:uppercase}
.home-week-num{font-size:14px;color:var(--mu);font-weight:500}
.home-week-label.home-week-today{color:var(--ac)}
.home-week-num.home-week-today{color:var(--ac);font-weight:700}
.home-week-dot{width:6px;height:6px;border-radius:50%;background:transparent;border:1.5px solid var(--bd);margin-top:2px}
.home-week-dot-on{background:var(--ac4)!important;border-color:var(--ac4)!important}
.home-week-dot-cur{border-color:var(--ac)!important}
.home-score-card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:18px 18px 16px;display:flex;flex-direction:column;align-items:center}
.home-score-label{font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.home-score-gauge{display:flex;flex-direction:column;align-items:center;position:relative}
.home-score-num{font-size:32px;font-weight:800;color:var(--tx);font-family:'Syne',sans-serif;line-height:1;margin-top:-12px}
.home-score-sub{font-size:11px;color:var(--mu);margin-top:4px;text-align:center}
.home-greeting{font-size:12px;font-weight:600;color:var(--mu);letter-spacing:2px;text-transform:uppercase}
.home-next-card{background:linear-gradient(135deg,rgba(232,255,90,.07),rgba(232,255,90,.02));border:1px solid rgba(232,255,90,.2);border-radius:18px;padding:22px 18px 18px;position:relative;overflow:hidden}
.home-next-label{font-size:10px;font-weight:700;color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;opacity:.7}
.home-next-day{font-family:'Syne',sans-serif;font-size:44px;letter-spacing:1px;color:var(--ac);line-height:1;margin-bottom:14px}
.home-next-muscles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.home-next-meta{font-size:11px;color:var(--mu);margin-bottom:18px;letter-spacing:.3px}
.home-feel-card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px 16px 12px;display:flex;flex-direction:column;gap:10px}
.home-feel-title{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.hpip-row{display:flex;align-items:center;gap:10px}
.hpip-icon{font-size:16px;width:22px;flex-shrink:0}
.hpip-label{font-size:12px;color:var(--mu);font-weight:600;width:52px;flex-shrink:0}
.hpip-btns{display:flex;gap:6px;flex:1;justify-content:flex-end}
.hpip{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.hpip:active{transform:scale(.9)}
.hpip.hpip-on{background:var(--ac);border-color:var(--ac);color:#111}
.home-muscle-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(232,255,90,.07);color:rgba(232,255,90,.65);border:1px solid rgba(232,255,90,.12)}
.home-start-btn{display:block;width:100%;padding:15px;background:var(--ac);color:#111;font-family:'Syne',sans-serif;font-size:19px;letter-spacing:2px;border:none;border-radius:12px;cursor:pointer}
.home-start-btn:active{opacity:.85}
.home-browse-btn{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;cursor:pointer;width:100%;font-family:'Plus Jakarta Sans',sans-serif;text-align:left}
.home-browse-btn:active{background:var(--sf2)}
.home-browse-left{display:flex;align-items:center;gap:10px}
.home-browse-icon{font-size:17px}
.home-browse-title{font-size:13px;font-weight:600;color:var(--tx)}
.home-browse-arrow{font-size:18px;color:var(--mu)}
.home-all-header{display:flex;align-items:center;gap:12px;padding:14px 16px 4px}
.home-all-back{font-size:22px;color:var(--ac);cursor:pointer;padding:4px 8px 4px 0;line-height:1}
.home-all-title{font-family:'Syne',sans-serif;font-size:18px;letter-spacing:2px;color:var(--tx)}
/* SESSION SETUP PIPS */
.pip-block{display:flex;flex-direction:column;gap:14px;margin:14px 0}
.pip-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.pip-meta{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.pip-icon{font-size:20px;flex-shrink:0}
.pip-label{font-size:13px;font-weight:600;color:var(--tx)}
.pip-sub{font-size:10px;color:var(--mu);margin-top:1px}
.pip-btns{display:flex;gap:5px;flex-shrink:0}
.pip-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bd);background:var(--sf2);color:var(--mu);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.pip-btn:active{transform:scale(.92)}
.pip-btn.pip-on{background:var(--ac);border-color:var(--ac);color:#111}
.pip-hint{font-size:11px;color:var(--ac3);line-height:1.7;min-height:16px;margin-bottom:4px;background:rgba(126,184,255,.06);border-radius:9px;padding:0}
.pip-hint div{padding:5px 10px}
.pip-hint div:not(:last-child){border-bottom:1px solid rgba(126,184,255,.1)}
/* VOLUME SUMMARY CARD */
.vol-summary{margin:10px 10px 0;background:linear-gradient(135deg,rgba(232,255,90,.06),rgba(126,184,255,.04));border:1px solid rgba(232,255,90,.18);border-radius:14px;padding:14px}
.vol-summary-title{font-family:'Syne',sans-serif;font-size:13px;letter-spacing:2px;color:var(--ac);margin-bottom:8px}
.vol-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.vol-stat{background:rgba(0,0,0,.2);border-radius:8px;padding:8px 6px;text-align:center}
.vol-stat-n{font-family:'Syne',sans-serif;font-size:22px;color:var(--ac);line-height:1}
.vol-stat-l{font-size:9px;color:var(--mu);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.cardio-cta{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.cardio-cta-title{font-size:11px;font-weight:700;color:var(--ac3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.cardio-cta-body{font-size:11px;color:#bbb;line-height:1.55}
.cardio-options{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.cardio-opt{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;background:rgba(126,184,255,.08);border:1px solid rgba(126,184,255,.2);color:var(--ac3)}
/* SKIPPED SECTION INDICATOR */
.time-skip-notice{margin:8px 10px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:9px 12px;font-size:11px;color:#e8b07e;line-height:1.5}
/* YOUTUBE SHEET */
.yt-sheet-ex{font-family:'Syne',sans-serif;font-size:24px;letter-spacing:1px;color:var(--tx);line-height:1.2;margin-bottom:4px}
.yt-sheet-sub{font-size:11px;color:var(--mu);margin-bottom:16px}
.yt-thumb-box{width:100%;aspect-ratio:16/9;border-radius:12px;background:var(--sf2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;cursor:pointer;position:relative}
.yt-thumb-box img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.yt-play-btn{position:absolute;width:54px;height:54px;border-radius:50%;background:rgba(0,0,0,.65);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:20px;pointer-events:none}

<body>

<div id="loginScreen">
  <div class="lw">
    <div class="ll">HOTTIE</div>
    <div class="lt2">With A Body 💪</div>
    <div class="lsub">let's get it done</div>
    <div class="lf">
      <input class="linput" type="password" id="pwIn" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="lbtn" onclick="doLogin()">ENTER</button>
      <div class="lerr" id="loginErr"></div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hbk" id="backBtn" onclick="goBack()">←</div>
    <div class="htx"><div class="ht" id="hTitle">RISE</div><div class="hs" id="hSub">Personal Trainer</div></div>
    <button class="hdr-settings-btn" onclick="showSettings()" id="settingsBtn">⚙</button>
  </div>
  <div class="nav" id="navTabs">
    <div class="nt active" onclick="switchTab('browse')">Workouts</div>
    <div class="nt" onclick="switchTab('progress')">Progress</div>
    <div class="nt" onclick="switchTab('calendar')">Schedule</div>
    <div class="nt" onclick="switchTab('muscles')">Muscles</div>
  </div>
  <div class="view active" id="browseView">
    <div id="homeScreen"></div>
    <div id="allWorkoutsScreen" style="display:none">
      <div class="fb" id="filterBar"></div>
      <div id="workoutList"></div>
    </div>
  </div>
  <div class="view" id="workoutView">
    <div class="sl" id="sectionList"></div>
    <button class="dnbtn" id="doneBtn" onclick="markAllDone()" style="display:none">COMPLETE WORKOUT ✓</button>
  </div>
  <div class="view" id="progressView"><div class="psec" id="progressContent"></div></div>
  <div class="view" id="calendarView">
    <div class="ch"><button class="cn" onclick="calNav(-1)">‹</button><div class="cm" id="calMonth"></div><button class="cn" onclick="calNav(1)">›</button></div>
    <div class="cg" id="calGrid"></div>
    <div id="schedPanel"></div>
    <div id="upcomingSection"></div>
  </div>
  <div class="view" id="musclesView"><div class="mgw" id="muscleGuide"></div></div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <div class="modal-title">📤 Export to Claude</div>
    <div class="modal-sub">Paste this into a Claude chat for analysis, progress tips, and personalised coaching.</div>
    <div class="export-text" id="exportText"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-primary" onclick="copyExport()">Copy to Clipboard</button>
      <button class="mbtn mbtn-sec" onclick="downloadExport()">Download File</button>
    </div>
    <button class="mbtn mbtn-close" onclick="closeExport()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PW="hotgirlsummer";
function doLogin(){const v=document.getElementById('pwIn').value;if(v===PW){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';sessionStorage.setItem('ra','1');initApp();}else{document.getElementById('loginErr').textContent='Wrong password — try again';document.getElementById('pwIn').value='';}}
if(sessionStorage.getItem('ra')==='1'){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';}

const WS=[{"id":"W2D2","week":2,"day":2,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"MB Standing Chest Throw OR Standing MB Side Rotation Throw","sets_info":"3 sets of 8 reps (or 5","notes":"A) Power Development - Day 2\n\n➡️ MB Standing Chest Throw OR Standing MB Side Rotation Throw: 3 sets of 8 reps (or 5\nreps on each side for the Side Rotation Throw) at a 10 RPE with 30 seconds rest in\nbetween sets. This exercise is not part of a superset!\n\nIf you're able to toss medicine balls where you work out, then try this stress-relieving and\npower developing option out!\nALTERNATIVES:\n\n1️⃣ Plyo Push-Up Series: 3 sets of 5 reps with 45 seconds rest in between sets. Choose\n\none of the variations shown in this series that meets you where you're at! Remember, it's\nabout power rather than strength so make sure they feel smooth and explosive!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":["MB Standing Chest Throw","Standing MB Side Rotation Throw"],"rpe":"10"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","sets_info":"4 sets of 8 at a 6 RPE","notes":"B1) BB Bench Press\n\n➡️ BB Bench Press: 4 sets of 8 at a 6 RPE. Superset (alternate sets) with the B2\nmovement down below.\n\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a\nmore shoulder-friendly alternative!\n\n📝 If you were on RISE last month, decrease weight by about 10-20% from last week's\n\nweights as your starting weight. Just make sure the RPE is around a 6. Then, increase by","variations":[],"rpe":"6"},{"id":"B2","label":"Row Variations - Day 2","exercise":"Single Arm DB Bench Supported Row","sets_info":"3 sets of 8 reps each side","notes":"B2) Row Variations - Day 2\n\n➡️ Single Arm DB Bench Supported Row: 3 sets of 8 reps each side at a 6-7 RPE. After\neach set, rest 60-120 seconds before returning to B1.\nALTERNATIVE:\n\n1️⃣ 2DB Chest Supported Row: 3 sets of 8 reps at a 6-7 RPE. The chest supported nature\nof this exercise allows you to lift more weight; however, the pressure from the bench can\n\nbe uncomfortable!\n\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one!\nPerform 3 sets of 8 at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Seated Overhead Press","sets_info":"3 sets of 10 reps","notes":"C1) Upper Body Accessory - Day 2\n\n➡️ 2DB Seated Overhead Press: 3 sets of 10 reps at a 5-6 RPE. Superset (alternate sets)\nwith the C2 movement down below.\nALTERNATIVE:\n\n1️⃣ Kneeling/Incline Push Up OR Push Up OR 1.5 Push Up: 3 sets of as many reps as\n\npossible. Choose the variation that allows you to get around 10-12 reps or so! Choose this\noption if you're looking to strengthen your push up game!\n\n💡 Feel free to sub in a chest press machine here if you have access to one! Perform 3\nsets of 12 at a 5-6 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"5-6"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","sets_info":"3 sets of 15 reps","notes":"C2) Lower Body Accessory - Day 2\n\n➡️ BB Shoulders Elevated Hip Lift: 3 sets of 15 reps at a 6-7 RPE. If you're looking for\n\nadditional glute work, feel free to drop the weight by 10% and do a fourth and final set for\nas many reps as possible.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ BB Supine Glute Bridge: 3 sets of 15 reps at a 6-7 RPE. If you're looking for additional\nglute work, feel free to drop the weight by 10% and do a fourth and final set for as many\nreps as possible.\nThis BB Supine Glute Bridge is a great option for those of you having trouble with the\nbalance and set up with the shoulder elevated version!\n\n2️⃣ BB RDL: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for\nthese RDLs instead!\n\n3️⃣ 1DB Supported Suitcase Step Up - Glute Emphasis: 3 sets of 8 reps each side at a 8\nRPE. If you'd like a single leg glute exercise, then choose these Suitcase Step ups\ninstead!\n\n💡 Feel free to sub in a 45 degree back extension machine here if you have access to one!\nPerform 3 sets of 10 reps at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"D1","label":"Isolation: Triceps","exercise":"Band/Cable Triceps Pulldown Dropset","sets_info":"3 sets of 10 reps","notes":"D1) Isolation: Triceps\n\n➡️ Band/Cable Triceps Pulldown Dropset: 3 sets of 10 reps at a 10 RPE (to failure!)\n\nfollowed immediately by a 10-20% reduction in weight for another set to failure. We're\nexpecting around 3-6 reps for the dropset!\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Lying Rollback Triceps Extension: 3 sets of 12 reps at a 8-9 RPE. If you don't have\naccess to a band/cable set up, you can opt for these Rollback Tricep Extensions instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"10"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Wall Marching","sets_info":"3 sets of 8 reps each side","notes":"D2) Core: Anti-Extension\n\n➡️ Wall Marching: 3 sets of 8 reps each side at a 8 RPE. After each set, rest 60 seconds\nbefore returning to D1.\n\nKeep your rib cage down, press firmly into the wall, and reach your heel out as far as you\ncan without letting your lower back arch up off the floor! These are surprisingly difficult they're a move we come back to often in our training!\nALTERNATIVES:\n\n1️⃣ Stability Ball Plank OR Stability Ball Stir the Pot: 3 sets of 20-40 second holds (or 20-\n\n30 seconds each side for the Stir the Pot) at a 8 RPE. If you want to up the ante a bit from\nWall Marching, then opt for one of these Stability Ball Plank variations instead!\n\n2️⃣ Hollow Hold (Level 2) Pullover: 3 sets of 20-30 seconds at a 8 RPE. If you want to up\nthe ante from Wall Marching, but don't have access to a stability ball, then choose these\nHollow Hold Pullovers instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"E","label":"Finisher","exercise":"Thrusters","sets_info":"3 sets of 8-10 reps","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Thrusters: 6 minute EMOM. Every Minute on the Minute, you'll perform 10 thrusters.\nYou can use a barbell or dumbbells or kettlebells here - start with a weight that you can\nstrict press about 10 times.\n\n⭐ Each week, try to add weight, or increase by one repetition each week, or add an\nentire minute!\n\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set:\n\n1️⃣ Standing 2DB Curl Dropset: 3 sets of 8-10 reps at a 10 RPE (to failure!) Immediately\nafter your 10 reps are done, grab dumbbells that are 20% lighter and perform as many\n\nreps as possible.\nThat's one set. Rest 90 seconds in between sets.\n\n⭐ Each week, try to add weight or increase repetitions!","variations":[],"rpe":""}]},{"id":"W2D3","week":2,"day":3,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"2-To-1 Lateral Pogo Hop to Plate","sets_info":"2 sets of 10-15 reps on each side with 30 seconds","notes":"A) Power Development - Day 3\n\n➡️ 2-To-1 Lateral Pogo Hop to Plate: 2 sets of 10-15 reps on each side with 30 seconds\nrest in between sets. This exercise is not part of a superset!\n\nYou can do these on a plate as shown in the video, or just on the floor! Pogo hops are not\nmeant to tire you out or be particularly challenging - it's more about building elasticity and\nresiliency in your calves and achilles!\nALTERNATIVES:\n\n1️⃣ Single Leg Lateral Pogo Hop to Plate: 2 sets of 8-12 reps on each side. Instead of\n\nhopping off of two legs on to one like the move above, this variation has you hopping and\nlanding off of only one foot for signficantly more challenge.\n\n⭐ Try to increase by one repetition or add weight each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB Power Snatch to Overhead Squat: 5 sets of 1 rep starting at a 6 RPE with 60-90\nseconds rest in between sets. Perform these EMOM style - every minute at the top of\neach minute for 5 minutes, do sets of 1 rep. Each week, try to increase by 2.5-5lbs.","variations":[],"rpe":""},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"4 sets of 6 at a 7-8 RPE of ONE of the following","notes":"B1) Deadlift Variations\n4 sets of 6 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Rotation","exercise":"Standing Band/Cable Horizontal Chop OR Bicyles - Single Side OR 1/2 Kneel KB","sets_info":"3 sets of 8-10 reps each side","notes":"B2) Core: Rotation\n\n➡️ Standing Band/Cable Horizontal Chop OR Bicyles - Single Side OR 1/2 Kneel KB\n\nDiagonal Lift: 3 sets of 8-10 reps each side at a 8 RPE. Choose from one of the following\nmoves that incorporate core rotation - each of them use a different implement\n(bands/cable machine, bodyweight, kettlebells/dumbbells) so choose the most convenient\noption for you!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Standing Band/Cable Horizontal Chop","Bicyles - Single Side","1/2 Kneel KB"],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Long Staggered Stance RDL","sets_info":"3 sets of 6 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 2DB Long Staggered Stance RDL: 3 sets of 6 reps on each side at a 8 RPE. Superset\n(alternate sets) with the C2 movement down below:\nALTERNATIVES:\n\n1️⃣ 2DB Single Leg Deadlift: 3 sets of 6-8 reps on each side at a 7-8 RPE. Choose this\noption if you're looking to further challenge your single leg stability and balance!\n\n2️⃣ BB Seated Good Morning OR BB Good Morning: 3 sets of 8 reps on each side at a 7-8\nRPE. Some of you requested Good Mornings - this would be a great spot to slot them in!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Momentum Lateral Raise OR RP Lateral Raise","sets_info":"3 sets of 10-12 reps","notes":"C2) Isolation: Delts\n\n➡️ 2DB Momentum Lateral Raise OR RP Lateral Raise: 3 sets of 10-12 reps at a 8 RPE.\n\nChoose between using momentum (and heavier weight) or using strict form (and lighter\nweight.) Both are fantastic shoulder developers - I'd choose the option that gets you out of\nyour comfort zone the most!\nAfter each set, rest 60 seconds before returning to C1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Momentum Lateral Raise","RP Lateral Raise"],"rpe":"8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 4. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4. Use a band thickness that allows you to\n\nget about 6 reps, but only do 4 so you can conserve energy across the 3 sets. Do 4 sets in\n\nWeeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 14 reps at a 9 RPE. This is a great option if you're not a fan of\n\npull-ups, but still want to mimic the overhead pulling pattern. You can use the lat pulldown\nmachine at your gym or set up a band on a pull-up bar/door frame to perform your\npulldowns. Also, these can be done with one arm at a time.\n\n2️⃣ Seated Cable Row OR 2DB Bent Over Row: 3 sets of 10 reps at a 7-8 RPE. If the\n\nvertical pulling motions above aren't for you, then you can opt for either of these horizontal\nrowing options instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"2DB Lateral Squat OR 2DB Lateral Lunge","sets_info":"3 sets of 8 reps each side","notes":"D2) Multi-Planar Variations\n\n➡️ 2DB Lateral Squat OR 2DB Lateral Lunge: 3 sets of 8 reps each side at a 6-7 RPE.\n\nChoose the Lateral Squat if you're just starting out with lateral work, otherwise opt for the\nLateral Lunge.\nAfter each set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n\n1️⃣ 2DB Slider Lateral Lunge: 3 sets of 6-8 reps on each side at a 6-7 RPE. These Slider\n\nLateral Lunges are extremely difficult! Only choose these if you have a ton of experience\nwith standard Lateral Lunges!\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 5-6 reps on each side at a 6-7 RPE.\n\nSome of you have been working toward a pistol squat - you can insert additional practice\nhere if you'd like!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Lateral Squat","2DB Lateral Lunge"],"rpe":"6-7"},{"id":"E","label":"Finisher","exercise":"Walking Lunge Variations","sets_info":"","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Walking Lunge Variations\nChoose any of the following Walking Lunge variations (2DB Walking Lunge for general\nstrength, 2DB Walking Long Stride Lunge for glute gains, and 2DB Walking Lunge to Knee\nDrive for functional strength and coordination.)\n\nPerform 40 reps on each side in as short amount of time as possible and in as few sets as\npossible. Each week, try to increase by 2 reps on each side, or increase weight, or\nattempt to beat your pace from the previous week!\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set:\n\n1️⃣ Seated Overhead KB Triceps Extension OR Overhead Tricep Extension with Bar: 3 sets\nof 12-15 reps at a 10 RPE. Use a moderate to light weight and go for high reps and a\npump here! Rest 60-90 seconds before moving on to the next set.\n\n⭐ Each week increase by one partial repetition or increase weight!","variations":[],"rpe":""}]},{"id":"W2D4","week":2,"day":4,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"2KB Clean OR 2DB Hang Power Clean","sets_info":"3 sets of 5 reps","notes":"A) Power Development - Day 4\n➡️ 2KB Clean OR 2DB Hang Power Clean: 3 sets of 5 reps at a 6-7 RPE with 60 seconds\nrest in between sets. This exercise is not part of a superset!\n⭐ Try to increase by one repetition or add weight each week!","variations":["2KB Clean","2DB Hang Power Clean"],"rpe":"6-7"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"4 sets of 5 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 4 sets of 5 reps at a 6-7 RPE.\n\nYou can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 4 sets of 5 reps at a 6-7 RPE. If you're experienced with overhead\n\npressing and would like to challenge your overhead strength with more weight than you\ncan handle with a strict press, then opt for these Push Presses instead.\n\n📝 If you were on RISE last month, use the same weight you used last week, and then\n\nincrease by 2.5-5lbs each week thereafter. This note is only relevant for your *first* week on\nVolume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flye OR 2DB Bent Over Reverse Flye","sets_info":"3 sets of 10 reps","notes":"B2) Isolation: Rear Delts\n\n➡️ 2DB Seated Bent Over Reverse Flye OR 2DB Bent Over Reverse Flye: 3 sets of 10 reps\n\nat a 7-8 RPE. Choose either position and focus on your rear delts/back of your shoulders!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Seated Bent Over Reverse Flye","2DB Bent Over Reverse Flye"],"rpe":"7-8"},{"id":"C1","label":"Row Variations - Day 4","exercise":"BB Inverted Row OR TRX Inverted Row","sets_info":"3 sets of 10 reps","notes":"C1) Row Variations - Day 4\n\n➡️ BB Inverted Row OR TRX Inverted Row: 3 sets of 10 reps at a 8 RPE. Superset\n(alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Bent Over Row - Overhand Grip: 3 sets of 8 reps at a 7 RPE. If you don't have a\ngreat option for Inverted Row, opt for these Bent Over Rows instead!\n\n💡 Feel free to sub in a chest supported row machine, T-bar row machine, or a landmine\nrow variation here! Get 3 sets of 8 reps at a 7 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Inverted Row","TRX Inverted Row"],"rpe":"8"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"2DB Step Up","sets_info":"3 sets of 8 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 2DB Step Up: 3 sets of 8 reps on each side at a 7 RPE. Choose this option if you want\nto focus on your hamstrings/glutes in a single leg stance.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 1KB Goblet Staggered Stance Squat: 3 sets of 8 reps on each side at a 7 RPE. Choose\nthis option if you want to focus on your quads in a single leg stance.\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"7"},{"id":"D1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR Band Resisted Push Up","sets_info":"3 sets of 12 reps","notes":"D1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR Band Resisted Push Up: 3 sets\nof as many reps as possible. Choose the variation that allows you to get around 6-8 reps\nor so!\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Bench Press: 3 sets of 12 reps at a 6-7 RPE. Supplement the heavier bench press\nwork we do on Day 2 with lighter, higher rep work on Day 4!\n\n2️⃣ 2DB Bench Flyes: 3 sets of 12 reps at a 6 RPE. If you're looking for more pec isolation,\nopt for the Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if\nyou have access to one! Get 3 sets of 10-12 reps at a 8-9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","Band Resisted Push Up"],"rpe":""},{"id":"D2","label":"Core: Anti-Rotation","exercise":"2DB Renegade Row OR Single Arm Tall Plank OR Standing Anti-Rotation Press","sets_info":"","notes":"D2) Core: Anti-Rotation\n\n➡️ 2DB Renegade Row OR Single Arm Tall Plank OR Standing Anti-Rotation Press: 3 sets\nof 8 reps each side (or 20-30 seconds each side for the Plank) at a 7-8 RPE. After each\nset, rest 60 seconds before returning to D1.\n\nAll of the movements above are \"anti-rotation\" core exercises. Choose one of the options\nand feel free to either stick with the same movement for all four weeks, OR choose a new\noption each week!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Renegade Row","Single Arm Tall Plank","Standing Anti-Rotation Press"],"rpe":"7-8"},{"id":"E","label":"PUMP Segment - Day 4","exercise":"PUMP Segment - Day 4","sets_info":"3 sets of 10 reps","notes":"E) PUMP Segment - Day 4\n\n{You can choose between a biceps or triceps or a glute pump for this segment. This exercise is\nNOT part of a superset!}\n\n💪 For biceps, try this out:\n1️⃣ 2DB Spider Curl OR 2DB Lying Triceps Extension: 3 sets of 10 reps at a 9 RPE.\n\nImmediately after each set, \"rest\" with the weights still in your hands for 10 seconds and\nthen eke out as many \"partial\" reps as you can! We expect around 3-5 additional partial\nreps! Rest 60-90 seconds before moving on to the next set.\n\n⭐ Each week, add weight or reps, or increase by an entire set!\n🍑 For glutes, try this out:\n2️⃣ Foot Elevated Single Leg Glue Bridge OR SL Shoulders Elevated Hip Lift OR Foot\n\nElevated Shoulder Elevated SL Hip Lift: 3 sets of 12 reps each side at a 9 RPE with 60-90\nrest in between sets. These bodyweight glute exercises are ordered from least difficult to\nmost difficult so choose the option that best meets you where you're at! On the last rep of\neach set, hold the top position for as long as you can and squeeze your glute as hard as\nyou can!\n\n💡 Feel free to sub in the hip abductor machine (the one where the knees go out) if you\nhave access to one! Get 3 sets of 12-15 reps at a 8-9 RPE :)\n\n⭐ Each week, add weight, or increase the reps, or add an entire set!","variations":[],"rpe":""}]},{"id":"W3D1","week":3,"day":1,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Staggered Stance Jumps OR Lateral Step Up Jumps - Low Box OR Contact Lateral Step Up Jumps - Low Box","sets_info":"3 sets of 4 reps each side with 30 seconds rest in between sets","notes":"A) Power Development - Day 1\n\n➡️ Staggered Stance Jumps OR Lateral Step Up Jumps - Low Box OR Contact Lateral Step Up Jumps - Low Boxp\nUp Jumps - Low Box: 3 sets of 4 reps each side with 30 seconds rest in between sets. This\nexercise is not part of a superset!\nChoose between one of the three options above that best meets you where you're at! The\nLateral Step Up Jump offers a little more range of motion and isolation. The Contact\nLateral Step Up Jump offers a little more coordination and reactivity and is great for\nathletes.\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you want to incorporate some olympic weightlifting into your routine, you can opt for\nthese oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Clean: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB Clean and Jerk: 5 sets of 1 rep starting at a 6 RPE with 60-90 seconds rest in\n\nbetween sets. Perform these EMOM style - every minute at the top of each minute for 5\nminutes, do sets of 1 rep. Each week, try to increase by 2.5-5lbs.","variations":["Staggered Stance Jumps","Lateral Step Up Jumps - Low Box","Contact Lateral Step Up Jumps - Low Box"],"rpe":""},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB or DB Goblet Squat\n📝 If you were on RISE last month, start off this month 5-10lbs heavier than the same\nweight you used in Week 1 for last volume, and then increase by 5-10lbs each week\nthereafter. This note is only relevant for your *first* week on Volume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB or DB Goblet Squat"],"rpe":"6"},{"id":"B2","label":"Isolation: Calves","exercise":"Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg","sets_info":"3 sets of 12 reps","notes":"B2) Isolation: Calves\n\n➡️ Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg\nCalf Raise Dropset: 3 sets. Perform As Many Reps As Possible (AMRAP) while leaning\nback followed immediately by AMRAP while leaning forward.\nYou're working the calves in a shortened position, followed by working them in a\nlengthened position - it's important to expose your calves to both! After each set, rest 60120 seconds before returning to B1.\n\n💡 Feel free to sub in a standing/reclined calf raise machine here if you have access to\none! Perform 3 sets of 12 reps at a 8-9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Shortened to Lengthened Calf Raise Dropset","Shortened to Lengthened Single Leg"],"rpe":""},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"2DB Rear Foot Elevated Split Squat OR 2DB Deficit Rear Foot Elevated Split Squat","sets_info":"3 sets of 8 reps each side","notes":"C1) Lower Body Accessory - Day 1\n\n➡️ 2DB Rear Foot Elevated Split Squat OR 2DB Deficit Rear Foot Elevated Split Squat: 3\nsets of 8 reps each side at a 7-8 RPE.\n\nChoose the Deficit RFE Split Squat if you'd like to work more on increasing your range of\nmotion! Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Split Squat: 3 sets of 8 reps each side at a 7-8 RPE. If the balance aspect of the\nRFE Split Squat is a bit challenging for you at the moment, simply perform standard split\nsquats instead!\n\n⭐ Try to add weight or increase by one repetition each side each week!","variations":["2DB Rear Foot Elevated Split Squat","2DB Deficit Rear Foot Elevated Split Squat"],"rpe":"7-8"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Front Raise to Lateral Raise Transfers","sets_info":"3 sets of 8 reps","notes":"C2) Isolation: Delts\n\n➡️ 2DB Front Raise to Lateral Raise Transfers: 3 sets of 8 reps at a 5-6 RPE. After each\nset, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 2DB Lateral Raise: 3 sets of 10 reps at a 6 RPE. If you're not a fan of the \"transfer\"\naspect of the option above, you can perform standard lateral raises instead!\n\n2️⃣ TGU to Hand: 3 sets of 5 reps each side at a 6-7 RPE. Want more of a functional lift\nthan the delt bodybuilding moves above? Look no further than the TGU to Hand!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"5-6"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 6. Use a band thickness th","notes":"D1) Pull Variations - Day 1\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6. Use a band thickness that allows you to\nget about 8 reps, but only do 6 reps so you can conserve energy across the 3 sets. Do 4\nsets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 8 reps at a 8-9 RPE. This is a great option if you're not a fan of\npull-ups, but still want to mimic the overhead pulling pattern. You can use the lat pulldown\nmachine at your gym or set up a band on a pull-up bar/door frame to perform your\npulldowns.\n\n2️⃣ 1DB Lat Pullover OR 1DB Lat Pullover - Extended Range: 3 sets of 10 reps at a 8 RPE.\nAs you lower down, try to contract your lats and feel them stretching on the way down.\nPause at the bottom briefly, squeeze your lats to come back up.\n\n⭐ Try to add weight or increase by one repetition each week! Alternate these with the D2\nmovement down below!","variations":[],"rpe":""},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball Hamstring Curl Series","sets_info":"3 sets of 10-15 reps","notes":"D2) Isolation: Hamstrings\n\n➡️ Stability Ball Hamstring Curl Series: 3 sets of 10-15 reps. Choose the option in the\nseries that allows you to get those 10-15 reps.\n\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Slider Hamstring Curl Series: 3 sets of 10-15 reps. Choose from one of the options in\n\nthis series if you don't have access to a stability ball, but still want to do hamstring curls!\nYou can use furniture sliders, Valslides, towel on hardwood floor/tile, etc. for your \"slider!\"\n\n2️⃣ TRX Hamstring Curl: 3 sets of 10-15 reps. If you have access to a TRX and would like\n\nto use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from\nthe anchor point, the tougher the movement will be.\n\n3️⃣ Nordic Hamstring Curl: 3 sets of 3-5 reps. Anchor your feet under something sturdy like\na dumbbell rack, a bench, a partner's hands, etc. and lower yourself down as slowly as\npossible before pushing yourself back up with your arms.\n\n💡 Feel free to sub in a seated or prone hamstring curl machine here if you have access\nto one! Perform 3 sets of 15 at a 9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"E","label":"Cardio OR Arms Finisher","exercise":"Cardio Finisher: Choose any cardio modality of your choice (Sprints, Sled Sprint","sets_info":"","notes":"E) Cardio OR Arms Finisher\n\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Cardio Finisher: Choose any cardio modality of your choice (Sprints, Sled Sprints, Bike\nSprints, Rower Sprints, Burpees, Squat Jumps, etc.) and perform 8 rounds of 15-30\nseconds on followed by 30-60 seconds off. Basically, sprint as fast as you can and then\nmake sure you rest double the amount of time you sprinted for. Each week, try to go\nfaster, go for longer, or add an entire round!\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set:\n\n1️⃣ Ab/Core Finisher: Choose any of the following ab exercises (Crunches - Feet Up, Sit\n\nUps - Feet Anchored, Hanging Knee Raise, etc.) and perform 50 reps in as short amount\nof time as possible and in as few sets as possible. Each week, try to increase by 5 reps\nand attempt to beat your pace from the previous week!","variations":[],"rpe":""}]},{"id":"W3D2","week":3,"day":2,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"MB Standing Chest Throw OR Standing MB Side Rotation Throw","sets_info":"3 sets of 8 reps (or 5","notes":"A) Power Development - Day 2\n\n➡️ MB Standing Chest Throw OR Standing MB Side Rotation Throw: 3 sets of 8 reps (or 5\nreps on each side for the Side Rotation Throw) at a 10 RPE with 30 seconds rest in\nbetween sets. This exercise is not part of a superset!\n\nIf you're able to toss medicine balls where you work out, then try this stress-relieving and\npower developing option out!\nALTERNATIVES:\n\n1️⃣ Plyo Push-Up Series: 3 sets of 5 reps with 45 seconds rest in between sets. Choose\n\none of the variations shown in this series that meets you where you're at! Remember, it's\nabout power rather than strength so make sure they feel smooth and explosive!\n\n⭐ Try to increase by one repetition or add weight each week!","variations":["MB Standing Chest Throw","Standing MB Side Rotation Throw"],"rpe":"10"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","sets_info":"4 sets of 8 at a 6 RPE","notes":"B1) BB Bench Press\n\n➡️ BB Bench Press: 4 sets of 8 at a 6 RPE. Superset (alternate sets) with the B2\nmovement down below.\n\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a\nmore shoulder-friendly alternative!\n\n📝 If you were on RISE last month, decrease weight by about 10-20% from last week's\n\nweights as your starting weight. Just make sure the RPE is around a 6. Then, increase by","variations":[],"rpe":"6"},{"id":"B2","label":"Row Variations - Day 2","exercise":"Single Arm DB Bench Supported Row","sets_info":"3 sets of 8 reps each side","notes":"B2) Row Variations - Day 2\n\n➡️ Single Arm DB Bench Supported Row: 3 sets of 8 reps each side at a 6-7 RPE. After\neach set, rest 60-120 seconds before returning to B1.\nALTERNATIVE:\n\n1️⃣ 2DB Chest Supported Row: 3 sets of 8 reps at a 6-7 RPE. The chest supported nature\nof this exercise allows you to lift more weight; however, the pressure from the bench can\n\nbe uncomfortable!\n\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one!\nPerform 3 sets of 8 at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Seated Overhead Press","sets_info":"3 sets of 10 reps","notes":"C1) Upper Body Accessory - Day 2\n\n➡️ 2DB Seated Overhead Press: 3 sets of 10 reps at a 5-6 RPE. Superset (alternate sets)\nwith the C2 movement down below.\nALTERNATIVE:\n\n1️⃣ Kneeling/Incline Push Up OR Push Up OR 1.5 Push Up: 3 sets of as many reps as\n\npossible. Choose the variation that allows you to get around 10-12 reps or so! Choose this\noption if you're looking to strengthen your push up game!\n\n💡 Feel free to sub in a chest press machine here if you have access to one! Perform 3\nsets of 12 at a 5-6 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"5-6"},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","sets_info":"3 sets of 15 reps","notes":"C2) Lower Body Accessory - Day 2\n\n➡️ BB Shoulders Elevated Hip Lift: 3 sets of 15 reps at a 6-7 RPE. If you're looking for\n\nadditional glute work, feel free to drop the weight by 10% and do a fourth and final set for\nas many reps as possible.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ BB Supine Glute Bridge: 3 sets of 15 reps at a 6-7 RPE. If you're looking for additional\nglute work, feel free to drop the weight by 10% and do a fourth and final set for as many\nreps as possible.\nThis BB Supine Glute Bridge is a great option for those of you having trouble with the\nbalance and set up with the shoulder elevated version!\n\n2️⃣ BB RDL: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for\nthese RDLs instead!\n\n3️⃣ 1DB Supported Suitcase Step Up - Glute Emphasis: 3 sets of 8 reps each side at a 8\nRPE. If you'd like a single leg glute exercise, then choose these Suitcase Step ups\ninstead!\n\n💡 Feel free to sub in a 45 degree back extension machine here if you have access to one!\nPerform 3 sets of 10 reps at a 8 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"D1","label":"Isolation: Triceps","exercise":"Band/Cable Triceps Pulldown Dropset","sets_info":"3 sets of 10 reps","notes":"D1) Isolation: Triceps\n\n➡️ Band/Cable Triceps Pulldown Dropset: 3 sets of 10 reps at a 10 RPE (to failure!)\n\nfollowed immediately by a 10-20% reduction in weight for another set to failure. We're\nexpecting around 3-6 reps for the dropset!\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Lying Rollback Triceps Extension: 3 sets of 12 reps at a 8-9 RPE. If you don't have\naccess to a band/cable set up, you can opt for these Rollback Tricep Extensions instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"10"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Wall Marching","sets_info":"3 sets of 8 reps each side","notes":"D2) Core: Anti-Extension\n\n➡️ Wall Marching: 3 sets of 8 reps each side at a 8 RPE. After each set, rest 60 seconds\nbefore returning to D1.\n\nKeep your rib cage down, press firmly into the wall, and reach your heel out as far as you\ncan without letting your lower back arch up off the floor! These are surprisingly difficult they're a move we come back to often in our training!\nALTERNATIVES:\n\n1️⃣ Stability Ball Plank OR Stability Ball Stir the Pot: 3 sets of 20-40 second holds (or 20-\n\n30 seconds each side for the Stir the Pot) at a 8 RPE. If you want to up the ante a bit from\nWall Marching, then opt for one of these Stability Ball Plank variations instead!\n\n2️⃣ Hollow Hold (Level 2) Pullover: 3 sets of 20-30 seconds at a 8 RPE. If you want to up\nthe ante from Wall Marching, but don't have access to a stability ball, then choose these\nHollow Hold Pullovers instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"E","label":"Finisher","exercise":"Thrusters","sets_info":"3 sets of 8-10 reps","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Thrusters: 6 minute EMOM. Every Minute on the Minute, you'll perform 10 thrusters.\nYou can use a barbell or dumbbells or kettlebells here - start with a weight that you can\nstrict press about 10 times.\n\n⭐ Each week, try to add weight, or increase by one repetition each week, or add an\nentire minute!\n\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set:\n\n1️⃣ Standing 2DB Curl Dropset: 3 sets of 8-10 reps at a 10 RPE (to failure!) Immediately\nafter your 10 reps are done, grab dumbbells that are 20% lighter and perform as many\n\nreps as possible.\nThat's one set. Rest 90 seconds in between sets.\n\n⭐ Each week, try to add weight or increase repetitions!","variations":[],"rpe":""}]},{"id":"W3D3","week":3,"day":3,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"2-To-1 Lateral Pogo Hop to Plate","sets_info":"2 sets of 10-15 reps on each side with 30 seconds","notes":"A) Power Development - Day 3\n\n➡️ 2-To-1 Lateral Pogo Hop to Plate: 2 sets of 10-15 reps on each side with 30 seconds\nrest in between sets. This exercise is not part of a superset!\n\nYou can do these on a plate as shown in the video, or just on the floor! Pogo hops are not\nmeant to tire you out or be particularly challenging - it's more about building elasticity and\nresiliency in your calves and achilles!\nALTERNATIVES:\n\n1️⃣ Single Leg Lateral Pogo Hop to Plate: 2 sets of 8-12 reps on each side. Instead of\n\nhopping off of two legs on to one like the move above, this variation has you hopping and\nlanding off of only one foot for signficantly more challenge.\n\n⭐ Try to increase by one repetition or add weight each week!\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you who want to incorporate some olympic weightlifting into your routine, you can\nopt for these oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Snatch: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB Power Snatch to Overhead Squat: 5 sets of 1 rep starting at a 6 RPE with 60-90\nseconds rest in between sets. Perform these EMOM style - every minute at the top of\neach minute for 5 minutes, do sets of 1 rep. Each week, try to increase by 2.5-5lbs.","variations":[],"rpe":""},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","sets_info":"4 sets of 6 at a 7-8 RPE of ONE of the following","notes":"B1) Deadlift Variations\n4 sets of 6 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's\n\nweights, and then increase by 5-10lbs each week thereafter. This note is only relevant for\nyour *first* week on Volume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"rpe":"7-8"},{"id":"B2","label":"Core: Rotation","exercise":"Standing Band/Cable Horizontal Chop OR Bicyles - Single Side OR 1/2 Kneel KB","sets_info":"3 sets of 8-10 reps each side","notes":"B2) Core: Rotation\n\n➡️ Standing Band/Cable Horizontal Chop OR Bicyles - Single Side OR 1/2 Kneel KB\n\nDiagonal Lift: 3 sets of 8-10 reps each side at a 8 RPE. Choose from one of the following\nmoves that incorporate core rotation - each of them use a different implement\n(bands/cable machine, bodyweight, kettlebells/dumbbells) so choose the most convenient\noption for you!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Standing Band/Cable Horizontal Chop","Bicyles - Single Side","1/2 Kneel KB"],"rpe":"8"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Long Staggered Stance RDL","sets_info":"3 sets of 6 reps on each side","notes":"C1) Lower Body Accessory - Day 3\n\n➡️ 2DB Long Staggered Stance RDL: 3 sets of 6 reps on each side at a 8 RPE. Superset\n(alternate sets) with the C2 movement down below:\nALTERNATIVES:\n\n1️⃣ 2DB Single Leg Deadlift: 3 sets of 6-8 reps on each side at a 7-8 RPE. Choose this\noption if you're looking to further challenge your single leg stability and balance!\n\n2️⃣ BB Seated Good Morning OR BB Good Morning: 3 sets of 8 reps on each side at a 7-8\nRPE. Some of you requested Good Mornings - this would be a great spot to slot them in!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"8"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Momentum Lateral Raise OR RP Lateral Raise","sets_info":"3 sets of 10-12 reps","notes":"C2) Isolation: Delts\n\n➡️ 2DB Momentum Lateral Raise OR RP Lateral Raise: 3 sets of 10-12 reps at a 8 RPE.\n\nChoose between using momentum (and heavier weight) or using strict form (and lighter\nweight.) Both are fantastic shoulder developers - I'd choose the option that gets you out of\nyour comfort zone the most!\nAfter each set, rest 60 seconds before returning to C1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Momentum Lateral Raise","RP Lateral Raise"],"rpe":"8"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","sets_info":"3 sets of 4. Use a band thickness th","notes":"D1) Pull Variations - Day 3\n[If you're looking to work on your back without doing pull-ups, scroll down to the \"alternatives\"\nsection in this segment!]\n\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4. Use a band thickness that allows you to\n\nget about 6 reps, but only do 4 so you can conserve energy across the 3 sets. Do 4 sets in\n\nWeeks 2 and 3, and then deload back down to 3 sets in Week 4.\n\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two\nreps short of failure during each set. You can even add weight if you'd like! Remember to\ndo 3 sets in Week 1, 4 sets in Weeks 2 and 3, and back down to 3 sets in Week 4.\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ Lat Pulldown: 3 sets of 14 reps at a 9 RPE. This is a great option if you're not a fan of\n\npull-ups, but still want to mimic the overhead pulling pattern. You can use the lat pulldown\nmachine at your gym or set up a band on a pull-up bar/door frame to perform your\npulldowns. Also, these can be done with one arm at a time.\n\n2️⃣ Seated Cable Row OR 2DB Bent Over Row: 3 sets of 10 reps at a 7-8 RPE. If the\n\nvertical pulling motions above aren't for you, then you can opt for either of these horizontal\nrowing options instead!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":""},{"id":"D2","label":"Multi-Planar Variations","exercise":"2DB Lateral Squat OR 2DB Lateral Lunge","sets_info":"3 sets of 8 reps each side","notes":"D2) Multi-Planar Variations\n\n➡️ 2DB Lateral Squat OR 2DB Lateral Lunge: 3 sets of 8 reps each side at a 6-7 RPE.\n\nChoose the Lateral Squat if you're just starting out with lateral work, otherwise opt for the\nLateral Lunge.\nAfter each set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n\n1️⃣ 2DB Slider Lateral Lunge: 3 sets of 6-8 reps on each side at a 6-7 RPE. These Slider\n\nLateral Lunges are extremely difficult! Only choose these if you have a ton of experience\nwith standard Lateral Lunges!\n\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 5-6 reps on each side at a 6-7 RPE.\n\nSome of you have been working toward a pistol squat - you can insert additional practice\nhere if you'd like!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Lateral Squat","2DB Lateral Lunge"],"rpe":"6-7"},{"id":"E","label":"Finisher","exercise":"Walking Lunge Variations","sets_info":"","notes":"E) Finisher\n[The E segment is a \"finisher.\" It is optional - do these if you have time and energy to cap off your\nworkout with a cherry on top!]\n\n➡️ Walking Lunge Variations\nChoose any of the following Walking Lunge variations (2DB Walking Lunge for general\nstrength, 2DB Walking Long Stride Lunge for glute gains, and 2DB Walking Lunge to Knee\nDrive for functional strength and coordination.)\n\nPerform 40 reps on each side in as short amount of time as possible and in as few sets as\npossible. Each week, try to increase by 2 reps on each side, or increase weight, or\nattempt to beat your pace from the previous week!\nALTERNATIVES:\nIf you're looking for more of a muscle building stimulus, then try out this burnout set:\n\n1️⃣ Seated Overhead KB Triceps Extension OR Overhead Tricep Extension with Bar: 3 sets\nof 12-15 reps at a 10 RPE. Use a moderate to light weight and go for high reps and a\npump here! Rest 60-90 seconds before moving on to the next set.\n\n⭐ Each week increase by one partial repetition or increase weight!","variations":[],"rpe":""}]},{"id":"W3D4","week":3,"day":4,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"2KB Clean OR 2DB Hang Power Clean","sets_info":"3 sets of 5 reps","notes":"A) Power Development - Day 4\n➡️ 2KB Clean OR 2DB Hang Power Clean: 3 sets of 5 reps at a 6-7 RPE with 60 seconds\nrest in between sets. This exercise is not part of a superset!\n⭐ Try to increase by one repetition or add weight each week!","variations":["2KB Clean","2DB Hang Power Clean"],"rpe":"6-7"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","sets_info":"4 sets of 5 reps","notes":"B1) Overhead Press Variations\n\n➡️ BB Military Press: 4 sets of 5 reps at a 6-7 RPE.\n\nYou can perform these with a barbell or dumbbells/kettlebells!\nSuperset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Push Press: 4 sets of 5 reps at a 6-7 RPE. If you're experienced with overhead\n\npressing and would like to challenge your overhead strength with more weight than you\ncan handle with a strict press, then opt for these Push Presses instead.\n\n📝 If you were on RISE last month, use the same weight you used last week, and then\n\nincrease by 2.5-5lbs each week thereafter. This note is only relevant for your *first* week on\nVolume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":[],"rpe":"6-7"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flye OR 2DB Bent Over Reverse Flye","sets_info":"3 sets of 10 reps","notes":"B2) Isolation: Rear Delts\n\n➡️ 2DB Seated Bent Over Reverse Flye OR 2DB Bent Over Reverse Flye: 3 sets of 10 reps\n\nat a 7-8 RPE. Choose either position and focus on your rear delts/back of your shoulders!\nAfter each set, rest 60-120 seconds before returning to B1.\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Seated Bent Over Reverse Flye","2DB Bent Over Reverse Flye"],"rpe":"7-8"},{"id":"C1","label":"Row Variations - Day 4","exercise":"BB Inverted Row OR TRX Inverted Row","sets_info":"3 sets of 10 reps","notes":"C1) Row Variations - Day 4\n\n➡️ BB Inverted Row OR TRX Inverted Row: 3 sets of 10 reps at a 8 RPE. Superset\n(alternate sets) with the C2 movement down below.\nALTERNATIVES:\n\n1️⃣ BB Bent Over Row - Overhand Grip: 3 sets of 8 reps at a 7 RPE. If you don't have a\ngreat option for Inverted Row, opt for these Bent Over Rows instead!\n\n💡 Feel free to sub in a chest supported row machine, T-bar row machine, or a landmine\nrow variation here! Get 3 sets of 8 reps at a 7 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB Inverted Row","TRX Inverted Row"],"rpe":"8"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"2DB Step Up","sets_info":"3 sets of 8 reps on each side","notes":"C2) Lower Body Accessory - Day 4\n\n➡️ 2DB Step Up: 3 sets of 8 reps on each side at a 7 RPE. Choose this option if you want\nto focus on your hamstrings/glutes in a single leg stance.\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n\n1️⃣ 1KB Goblet Staggered Stance Squat: 3 sets of 8 reps on each side at a 7 RPE. Choose\nthis option if you want to focus on your quads in a single leg stance.\n\n⭐ Try to add weight or increase by one repetition per week!","variations":[],"rpe":"7"},{"id":"D1","label":"Push Variations - Day 4","exercise":"Incline Push Up OR Push Up OR Weighted Push Up OR Band Resisted Push Up","sets_info":"3 sets of 12 reps","notes":"D1) Push Variations - Day 4\n\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR Band Resisted Push Up: 3 sets\nof as many reps as possible. Choose the variation that allows you to get around 6-8 reps\nor so!\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n\n1️⃣ 2DB Bench Press: 3 sets of 12 reps at a 6-7 RPE. Supplement the heavier bench press\nwork we do on Day 2 with lighter, higher rep work on Day 4!\n\n2️⃣ 2DB Bench Flyes: 3 sets of 12 reps at a 6 RPE. If you're looking for more pec isolation,\nopt for the Flyes instead!\n\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if\nyou have access to one! Get 3 sets of 10-12 reps at a 8-9 RPE :)\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["Incline Push Up","Push Up","Weighted Push Up","Band Resisted Push Up"],"rpe":""},{"id":"D2","label":"Core: Anti-Rotation","exercise":"2DB Renegade Row OR Single Arm Tall Plank OR Standing Anti-Rotation Press","sets_info":"","notes":"D2) Core: Anti-Rotation\n\n➡️ 2DB Renegade Row OR Single Arm Tall Plank OR Standing Anti-Rotation Press: 3 sets\nof 8 reps each side (or 20-30 seconds each side for the Plank) at a 7-8 RPE. After each\nset, rest 60 seconds before returning to D1.\n\nAll of the movements above are \"anti-rotation\" core exercises. Choose one of the options\nand feel free to either stick with the same movement for all four weeks, OR choose a new\noption each week!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["2DB Renegade Row","Single Arm Tall Plank","Standing Anti-Rotation Press"],"rpe":"7-8"},{"id":"E","label":"PUMP Segment - Day 4","exercise":"PUMP Segment - Day 4","sets_info":"3 sets of 10 reps","notes":"E) PUMP Segment - Day 4\n\n{You can choose between a biceps or triceps or a glute pump for this segment. This exercise is\nNOT part of a superset!}\n\n💪 For biceps, try this out:\n1️⃣ 2DB Spider Curl OR 2DB Lying Triceps Extension: 3 sets of 10 reps at a 9 RPE.\n\nImmediately after each set, \"rest\" with the weights still in your hands for 10 seconds and\nthen eke out as many \"partial\" reps as you can! We expect around 3-5 additional partial\nreps! Rest 60-90 seconds before moving on to the next set.\n\n⭐ Each week, add weight or reps, or increase by an entire set!\n🍑 For glutes, try this out:\n2️⃣ Foot Elevated Single Leg Glue Bridge OR SL Shoulders Elevated Hip Lift OR Foot\n\nElevated Shoulder Elevated SL Hip Lift: 3 sets of 12 reps each side at a 9 RPE with 60-90\nrest in between sets. These bodyweight glute exercises are ordered from least difficult to\nmost difficult so choose the option that best meets you where you're at! On the last rep of\neach set, hold the top position for as long as you can and squeeze your glute as hard as\nyou can!\n\n💡 Feel free to sub in the hip abductor machine (the one where the knees go out) if you\nhave access to one! Get 3 sets of 12-15 reps at a 8-9 RPE :)\n\n⭐ Each week, add weight, or increase the reps, or add an entire set!","variations":[],"rpe":""}]},{"id":"W4D1","week":4,"day":1,"vol":66,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Staggered Stance Jumps OR Lateral Step Up Jumps - Low Box OR Contact Lateral Step Up Jumps - Low Box","sets_info":"3 sets of 4 reps each side with 30 seconds rest in between sets","notes":"A) Power Development - Day 1\n\n➡️ Staggered Stance Jumps OR Lateral Step Up Jumps - Low Box OR Contact Lateral Step Up Jumps - Low Boxp\nUp Jumps - Low Box: 3 sets of 4 reps each side with 30 seconds rest in between sets. This\nexercise is not part of a superset!\nChoose between one of the three options above that best meets you where you're at! The\nLateral Step Up Jump offers a little more range of motion and isolation. The Contact\nLateral Step Up Jump offers a little more coordination and reactivity and is great for\nathletes.\nOLYMPIC LIFTING ALTERNATIVES:\n\nFor those of you want to incorporate some olympic weightlifting into your routine, you can opt for\nthese oly lifts instead of the other power development moves above!\nChoose from one of the options below:\n\n1️⃣ BB High Hang Power Clean: 3 sets of 5 at a 6-7 RPE with 60 seconds rest between\nsets. Choose this option if you're newer to Olympic lifts.\n\n2️⃣ BB Clean and Jerk: 5 sets of 1 rep starting at a 6 RPE with 60-90 seconds rest in\n\nbetween sets. Perform these EMOM style - every minute at the top of each minute for 5\nminutes, do sets of 1 rep. Each week, try to increase by 2.5-5lbs.","variations":["Staggered Stance Jumps","Lateral Step Up Jumps - Low Box","Contact Lateral Step Up Jumps - Low Box"],"rpe":""},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2\nmovement down below:\n\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB or DB Goblet Squat\n📝 If you were on RISE last month, start off this month 5-10lbs heavier than the same\nweight you used in Week 1 for last volume, and then increase by 5-10lbs each week\nthereafter. This note is only relevant for your *first* week on Volume 66!\n\n⭐ Try to add weight or increase by one repetition each week!","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB or DB Goblet Squat"],"rpe":"6"},{"id":"B2","label":"Isolation: Calves","exercise":"Shortened to Lengthened Calf Raise Dropset OR Shortened to Lengthened Single Leg","sets_info":"3 sets of 12 reps","notes":"B2) Isolation: Calves\n\n➡️ Shortened to Lengthened Cal
