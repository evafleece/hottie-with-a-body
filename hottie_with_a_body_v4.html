Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional roun"}]},{"id":"W3D3","week":3,"day":3,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Speed Split Squat From ISO Hold","variations":["Speed Split Squat From ISO Hold","Split Squat Jump","Alternating Split Squat Jumps - Short Stride"],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Speed Split Squat From ISO Hold OR Split Squat Jump OR Alternating Split Squat Jumps - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose from any of the options above - they are ordered from least difficult to most difficult. The short stride is more of an athletic position since most of your weight is closer to your stance leg."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Addcutors","exercise":"Floor Copenhagen Plank - Short","variations":["Floor Copenhagen Plank - Short","Long Lever"],"sets_info":"3 sets of 20-30 second holds on each side","rpe":"9","notes":"B2) Isolation: Addcutors\n➡️ Floor Copenhagen Plank - Short OR Long Lever: 3 sets of 20-30 second holds on each side. The Longer lever is significantly more challenging than the Short Lever position. After each set, rest 60-120 seconds before returning to B1.\nThe Floor Copenhagen can feel a bit awkward for some people - if that's the case for you, you can opt for traditional Copenhagens on a bench instead!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts: 3 sets of 10-15 reps each side at a 9 RPE. If Copenhagens are a bit too much for you at the moment, feel free to opt for these Leg Lifts inste"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Walking Lunge","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Walking Lunge: 3 sets of 8 reps on each side at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB RFE Split Squat: 3 sets of 8 reps on each side at a 8 RPE. If you don't have the space to go walking lunge around, then opt for these stationary Rear Foot Elevated Split Squats instead!\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 4-6 reps on each side at a 8 RPE. If you're working on Pistol Squats specifically, you can opt for this progression instead! It is worth mentioning though that the stronger you are w"},{"id":"C2","label":"Isolation: Delts","exercise":"Incline Bench Single Arm DB Side Lying Lateral Raise","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Incline Bench Single Arm DB Side Lying Lateral Raise: 3 sets of 10 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Single Arm Lateral Raise: 3 sets of 10 reps each side at a 7 RPE. If you don't have access to an incline bench, you can opt for traditional lateral raises with a resistance band or cable machine instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6. Use a band thickness that allows you to get about 8 reps, but only do 6 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 10 reps","rpe":"9","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-6 reps. "},{"id":"E","label":"Finisher","exercise":"Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x)","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x): 4-5 Rounds with 60-90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\nPerform all reps of a given movement before moving on to the next. You can use a dumbbell or kettlebell for this complex.\n⭐ Each week, try to a"}]},{"id":"W3D4","week":3,"day":4,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Foot on Box Single Leg Pogo Hops - Arms Overhead","variations":[],"sets_info":"3 sets of 20-30 seconds on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Foot on Box Single Leg Pogo Hops - Arms Overhead: 3 sets of 20-30 seconds on each side with 30 seconds rest in between sets. Your foot can be on a bench, a plyo box, or any other elevated surface that's stable! 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese pogo hops won't feel terribly challenging, but they're highly beneficial for your feet, ankles, and calves! They're great for building elasticity and resiliency in your lower leg!\nALTERNATIVES:\n1️⃣ Foot on Box Side to Side Single Leg Pogo Hops: 3 sets of 2"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 8 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's work"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye: 3 sets of 10 reps at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8-9 RPE. If you don't have access to a good band/cable set up, opt for these dumbbell flyes instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C1) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups OR 2DB Decline Deficit Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 10 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Seated Cable Chest Press: 3 sets of 10 reps at a 9 RPE. If you'd like to work on isolating your chest/pecs, feel free to opt for these Chest Flyes instead!\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you have access to one! Get 3 sets of 10-12"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"Lateral Lunge Position ISO with Single Arm KB Row","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"C2) Lower Body Accessory - Day 4\n➡️ Lateral Lunge Position ISO with Single Arm KB Row: 3 sets of 8 reps on each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Lateral Lunge to Single Arm DB Row: 3 sets of 6 reps on each side at a 7 RPE. Opt for this version if  you're comfortable with the Lateral Lunge position and want to move more dynamically in and out of position!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D1","label":"Isolation: Delts","exercise":"2DB 3-Way Lateral Raise","variations":[],"sets_info":"3 sets of 4 reps (12 reps total per set)","rpe":"9","notes":"D1) Isolation: Delts\n➡️ 2DB 3-Way Lateral Raise: 3 sets of 4 reps (12 reps total per set) at a 9 RPE. Superset (alternate sets) with the D2 movement down below.\nAs you go through the different angles, try to be aware and \"feel\" the different parts of your delts working!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Stability Ball Front Plank","Stability Ball Rollout","Sliding Bodysaw"],"sets_info":"3 sets of 30-40 seconds","rpe":"9-10","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Stability Ball Front Plank OR Stability Ball Rollout OR Sliding Bodysaw OR Ab Wheel Rollout: 3 sets of 30-40 seconds at a 9-10 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase time by 3-5 seconds each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"2 sets of \"21s\" with 90-120 seconds rest in between sets","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴/𝘵𝘳𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 BICEPS OR TRICEPS:\n1️⃣ 2DB Bicep Curl 21s OR 2DB Lying Tricep Extension 21s: Choose between biceps and triceps and perform 2 sets of \"21s\" with 90-120 seconds rest in between sets. Each week, add another set, or increase weight, or decrease rest period between sets by 10 seconds!\n🍑 For glutes, try this out:\n2️⃣ 2DB Walking Long Stride Lunge: Perform 50-60 total reps in as few sets as possible. Keep mind-muscle connection on the glutes with each stride. Each wee"}]},{"id":"W4D1","week":4,"day":1,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Squat Jump","variations":[],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Squat Jump: 3 sets of 6 reps with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 2DB Squat Jump: 3 sets of 4 reps with 30 seconds rest between sets. If you want to up the ante further, hold onto a pair of light dumbbells or kettlebells by your sides!\n⭐ Progress by adding weight, or an extra repetition each week!"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Squat Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, decrease weight by about 10-15% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Top End Range Single Leg Calf Pulses","variations":[],"sets_info":"3 sets of AMAP on each side","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Top End Range Single Leg Calf Pulses: 3 sets of AMAP on each side. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on two legs if the single leg version is a bit too challenging at the moment! You don't have to go to \"failure,\" just make sure you build up a good burn in your calves on each side!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform 3 sets of 15 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ BB OR 2DB RDLs: 3 sets of 8 reps at a 8 RPE. Focus on maintaining a neutral spine and engaging your hamstrings and glutes throughout the movement. Keep the weight in close to your body and control the descent. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Single Leg Deadlift with Band RNT: 3 sets of 8 reps each side at a 7 RPE. If you're looking to challenge, your single leg stability and balance, then opt for single leg deadlifts instead! As an option, you can try them with a thin band around the knees to increase glute activat"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Alternating Stepping Arnold Raise","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ 2DB Alternating Stepping Arnold Raise: 3 sets of 8 reps each side at a 6-7 RPE. Rest 60 seconds after each set before returning to C1.\nRarely in life are you every pressing straight overhead with both feet perfectly hip width apart. This move helps to incorporate an element of instability throughout your upper and lower body!\nALTERNATIVES:\n1️⃣ 2DB High Incline Supported Y Raise: 3 sets of 12 reps at a 6 RPE. If you're looking to truly isolate the delts and you want less stability demands, then opt for these bench supported Y Raises instead!\n⭐ Try to add weight or increa"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. Use a band thickness that allows you to get about 10 reps, but only do 8 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Wee"},{"id":"D2","label":"Isolation: Quads","exercise":"Heels Elevated 2DB Suitcase Squat","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"D2) Isolation: Quads\n➡️ Heels Elevated 2DB Suitcase Squat: 3 sets of 10 reps at a 8-9 RPE. Rest 60 seconds after each set before returning to D1.\nDo your best to shift your knees forward for this movement to load the quads!\nALTERNATIVES:\n1️⃣ Goblet DB Heels Elevated Squat to Staggered Stance Squat: 3 sets of 5 reps. Squat, step forward and staggered squat, step back and squat, step forward and staggered squat is 1 rep. Do 5 reps total!\n💡 Feel free to sub in a leg extension machine here if you have access to one! Perform 3 sets of 15 at a 9 RPE :)\n⭐  Try to add weight or increase by one repetit"},{"id":"E","label":"Finisher","exercise":"Band/Cable Anti-Rotation Press with Rotation","variations":["Band/Cable Anti-Rotation Press with Rotation","Band/Cable Staggered Stance Chops"],"sets_info":"4 sets of 8 reps on each side","rpe":"7-8","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 CORE FINISHER:\n➡️ Band/Cable Anti-Rotation Press with Rotation OR Band/Cable Staggered Stance Chops OR KB Staggered Stance Diagonal Lift: Choose ONE and perform 3-4 sets of 8 reps on each side at a 7-8 RPE with 30 seconds rest in between sets. Each week, increase by 1 set, or by 2 reps, or increase the weight!\n💪 TRICEPS FINISHER\n➡️ Seated Overhead KB Triceps Extension OR BB OH Triceps Extensions: Pe"}]},{"id":"W4D2","week":4,"day":2,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Angled BB Rotational Split Jerk","variations":["Angled BB Rotational Split Jerk","DB Rotational Split Jerk"],"sets_info":"3 sets of 5 reps each side","rpe":"6-7","notes":"A) Power Development - Day 2\n➡️ Angled BB Rotational Split Jerk OR DB Rotational Split Jerk: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a landmine attachment, then opt for the dumbbell version!\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press: 3 sets of 5 reps each side at a 6-7 RPE with 45 seconds rest between sets. If the thought of jumping and rotating and pressing is a bit too much for you at the moment, opt for these traditional push press"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 4 at a 8 RPE","rpe":"8","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 4 at a 8 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, start this volume at a working weight about 5% lighter than what you used last week. Increase the weight by 2.5-5lbs weekly for your working sets. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 𝘧𝘪𝘳𝘴𝘵 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Bent Over Reverse Flyes","variations":[],"sets_info":"3 sets of 12 reps","rpe":"7","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Bent Over Reverse Flyes: 3 sets of 12 reps at a 7 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps at a 7 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Muscle Clean to Press","variations":["2DB Muscle Clean to Press","2KB Muscle Clean to Press"],"sets_info":"3 sets of 8 reps each","rpe":"6-7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2DB Muscle Clean to Press OR 2KB Muscle Clean to Press: 3 sets of 8 reps each at a 6-7 RPE. Superset (alternate sets) with the C2 movement down below.\nUse a little body momentum to muscle clean the weights up and then press overhead!\nALTERNATIVE:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Diamond Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 8-10 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in any chest press machine here if you have "},{"id":"C2","label":"Lower Body Accessory - Day 2","exercise":"1.5 BB Hip Thrust","variations":[],"sets_info":"4 sets of 8-10 reps","rpe":"8","notes":"C2) Lower Body Accessory - Day 2\n➡️ 1.5 BB Hip Thrust: 3-4 sets of 8-10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\nTry to move smoothly rather than bouncing and using momentum!\nALTERNATIVES:\n1️⃣ 1.5 BB Supine Glute Bridge: 3-4 sets of 8-10 reps at a 8 RPE. The BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1.5 KB Straddle Lift: 3 sets of 8 at a 8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for these Straddle Lifts instead! Focus on mind-muscle connection with "},{"id":"D1","label":"Isolation: Biceps","exercise":"2DB Alternating Curls","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"D1) Isolation: Biceps\n➡️ 2DB Alternating Curls: 3 sets of 8 reps each side at a 8-9 RPE. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ 1KB Goblet Hammer Curls: 3 sets of 10 reps at a 8 RPE. If you'd rather use kettlebells, you can opt for these 1KB Goblet Curls instead!\n⭐  Try to add weight or increase by one repetition each week to progressively overload!"},{"id":"D2","label":"Row Variations - Day 2","exercise":"BB","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"D2) Row Variations - Day 2\n➡️ BB OR DB Yates Row: 3 sets of 8 reps at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFor these Yates Rows, have a very *slightly* inclined torso position and focus on the rowing the weight towards your hips using your lats. This is different from a traditional bent over row where your torso is nearly parallel to the floor and you're pulling the weight towards the base of your sternum.\n📝 If you were on RISE last month, we're repeating the Yates row as it felt really nice to pull from a lower position and emphasize the lats! This time, we just mo"},{"id":"E","label":"Finisher","exercise":"Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Front Rack Reverse Lunge (3 each side), Push Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional roun"}]},{"id":"W4D3","week":4,"day":3,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Speed Split Squat From ISO Hold","variations":["Speed Split Squat From ISO Hold","Split Squat Jump","Alternating Split Squat Jumps - Short Stride"],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Speed Split Squat From ISO Hold OR Split Squat Jump OR Alternating Split Squat Jumps - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose from any of the options above - they are ordered from least difficult to most difficult. The short stride is more of an athletic position since most of your weight is closer to your stance leg."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 8 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 8 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 69!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Addcutors","exercise":"Floor Copenhagen Plank - Short","variations":["Floor Copenhagen Plank - Short","Long Lever"],"sets_info":"3 sets of 20-30 second holds on each side","rpe":"9","notes":"B2) Isolation: Addcutors\n➡️ Floor Copenhagen Plank - Short OR Long Lever: 3 sets of 20-30 second holds on each side. The Longer lever is significantly more challenging than the Short Lever position. After each set, rest 60-120 seconds before returning to B1.\nThe Floor Copenhagen can feel a bit awkward for some people - if that's the case for you, you can opt for traditional Copenhagens on a bench instead!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts: 3 sets of 10-15 reps each side at a 9 RPE. If Copenhagens are a bit too much for you at the moment, feel free to opt for these Leg Lifts inste"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Walking Lunge","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Walking Lunge: 3 sets of 8 reps on each side at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB RFE Split Squat: 3 sets of 8 reps on each side at a 8 RPE. If you don't have the space to go walking lunge around, then opt for these stationary Rear Foot Elevated Split Squats instead!\n2️⃣ Foot Elevated Pistol Squat Progression: 3 sets of 4-6 reps on each side at a 8 RPE. If you're working on Pistol Squats specifically, you can opt for this progression instead! It is worth mentioning though that the stronger you are w"},{"id":"C2","label":"Isolation: Delts","exercise":"Incline Bench Single Arm DB Side Lying Lateral Raise","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Incline Bench Single Arm DB Side Lying Lateral Raise: 3 sets of 10 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Single Arm Lateral Raise: 3 sets of 10 reps each side at a 7 RPE. If you don't have access to an incline bench, you can opt for traditional lateral raises with a resistance band or cable machine instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6. Use a band thickness that allows you to get about 8 reps, but only do 6 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 10 reps","rpe":"9","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-6 reps. "},{"id":"E","label":"Finisher","exercise":"Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x)","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ Complex: Squat (4x), Press (4x), Reverse Lunge with Twist (2 reps each side), Swing (8x): 4-5 Rounds with 60-90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\nPerform all reps of a given movement before moving on to the next. You can use a dumbbell or kettlebell for this complex.\n⭐ Each week, try to a"}]},{"id":"W4D4","week":4,"day":4,"vol":69,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Foot on Box Single Leg Pogo Hops - Arms Overhead","variations":[],"sets_info":"3 sets of 20-30 seconds on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Foot on Box Single Leg Pogo Hops - Arms Overhead: 3 sets of 20-30 seconds on each side with 30 seconds rest in between sets. Your foot can be on a bench, a plyo box, or any other elevated surface that's stable! 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese pogo hops won't feel terribly challenging, but they're highly beneficial for your feet, ankles, and calves! They're great for building elasticity and resiliency in your lower leg!\nALTERNATIVES:\n1️⃣ Foot on Box Side to Side Single Leg Pogo Hops: 3 sets of 2"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 8 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 8 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight by about 20-25% from last week's work"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye: 3 sets of 10 reps at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8-9 RPE. If you don't have access to a good band/cable set up, opt for these dumbbell flyes instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C1) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups OR 2DB Decline Deficit Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 10 reps or so!\nSuperset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Seated Cable Chest Press: 3 sets of 10 reps at a 9 RPE. If you'd like to work on isolating your chest/pecs, feel free to opt for these Chest Flyes instead!\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you have access to one! Get 3 sets of 10-12"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"Lateral Lunge Position ISO with Single Arm KB Row","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"C2) Lower Body Accessory - Day 4\n➡️ Lateral Lunge Position ISO with Single Arm KB Row: 3 sets of 8 reps on each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Lateral Lunge to Single Arm DB Row: 3 sets of 6 reps on each side at a 7 RPE. Opt for this version if  you're comfortable with the Lateral Lunge position and want to move more dynamically in and out of position!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D1","label":"Isolation: Delts","exercise":"2DB 3-Way Lateral Raise","variations":[],"sets_info":"3 sets of 4 reps (12 reps total per set)","rpe":"9","notes":"D1) Isolation: Delts\n➡️ 2DB 3-Way Lateral Raise: 3 sets of 4 reps (12 reps total per set) at a 9 RPE. Superset (alternate sets) with the D2 movement down below.\nAs you go through the different angles, try to be aware and \"feel\" the different parts of your delts working!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Stability Ball Front Plank","Stability Ball Rollout","Sliding Bodysaw"],"sets_info":"3 sets of 30-40 seconds","rpe":"9-10","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Stability Ball Front Plank OR Stability Ball Rollout OR Sliding Bodysaw OR Ab Wheel Rollout: 3 sets of 30-40 seconds at a 9-10 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase time by 3-5 seconds each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"2 sets of \"21s\" with 90-120 seconds rest in between sets","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴/𝘵𝘳𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 BICEPS OR TRICEPS:\n1️⃣ 2DB Bicep Curl 21s OR 2DB Lying Tricep Extension 21s: Choose between biceps and triceps and perform 2 sets of \"21s\" with 90-120 seconds rest in between sets. Each week, add another set, or increase weight, or decrease rest period between sets by 10 seconds!\n🍑 For glutes, try this out:\n2️⃣ 2DB Walking Long Stride Lunge: Perform 50-60 total reps in as few sets as possible. Keep mind-muscle connection on the glutes with each stride. Each wee"}]},{"id":"W1D1","week":1,"day":1,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Box Jump","variations":["Box Jump","Single Leg Box Jump"],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Box Jump OR Single Leg Box Jump: 3 sets of 5 reps (on each side if performing the Single Leg version!) with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ Consecutive 1/4 Squat Jumps - Hands on Hips: 3 sets of 6 reps with 30 seconds rest between sets. These jumps are more impactful on the knees, and require more force and elasticity so make sure you're proficient with Box Jumps before attempting these!\n⭐ Progress by adding an extra repetition each week, or by adding a"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 6 at a 7 RPE of ONE of the following","rpe":"7","notes":"B1) Squat Variations\n4 sets of 6 at a 7 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, increase weight  by about 5-10lbs from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 70!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Suitcase DB SL Calf Raise to SL Eccentric","variations":["Suitcase DB SL Calf Raise to SL Eccentric","Suitcase DB Single Leg Calf Raise to SL Eccentric"],"sets_info":"3 sets of 10 reps on each side with a 4 second slow lower down","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Suitcase DB SL Calf Raise to SL Eccentric OR Suitcase DB Single Leg Calf Raise to SL Eccentric: 3 sets of 10 reps on each side with a 4 second slow lower down at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on one or two legs—just maintain a mind-muscle connection with the way down!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform single leg raises for 3 sets of 10 reps on each side with a 4 second slow lower down at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repet"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"2DB Reverse Lunge","variations":["2DB Reverse Lunge","2DB Deficit Reverse Lunge"],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"C1) Lower Body Accessory - Day 1\n➡️ 2DB Reverse Lunge OR 2DB Deficit Reverse Lunge: 3 sets of 8 reps each side at a 8-9 RPE. If you'd like, add in a 2-4\" Deficit for increased range of motion! Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Deficit Reverse Lunge with Band RNT: 3 sets of 8 reps on each side at a 8-9 RPE. If you'd like to work on your hip stability/glute medius strength, then try adding in a band while you perform your Reverse Lunges!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Lateral Raise","variations":[],"sets_info":"3 sets of 12 reps","rpe":"6","notes":"C2) Isolation: Delts\n➡️ 2DB Lateral Raise: 3 sets of 12 reps at a 6 RPE. Rest 60 seconds after each set before returning to C1.\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press to Slow Eccentric OR Single Arm DB Split Jerk to Slow Eccentric: 3 sets of 6 reps each side with a 3 second slow lower at a 7-8 RPE. If you're looking for a more functional shoulder option, then choose one of these overhead pressing variations with a slow lower!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6 reps. Use a band thickness that allows you to get about 8 reps, but only do 6 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week"},{"id":"D2","label":"Isolation: Glutes/Hamstrings","exercise":"SL Supported Skater Squat","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"D2) Isolation: Glutes/Hamstrings\n➡️ SL Supported Skater Squat: 3 sets of 8 reps each side at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFeel free to hold on to a light weight with your free hand to load the weight further!\nALTERNATIVES:\n1️⃣ SL Supported Skater Curtsy Squat: 3 sets of 8 reps each side at a 8 RPE. The Skater Curtsy requires more multiplanar strength and knee resiliency but increases glute engagement - try it out if you have proficiency with the traditional Skater Squat!\n2️⃣ Suitcase 1KB Supported SL Deadlift: 3 sets of 8 reps each at a 8 RPE. If Skater vari"},{"id":"E","label":"Finisher","exercise":"Tuck Up Off Bench AND 2DB Alternating Hammer Grip Curls","variations":[],"sets_info":"","rpe":"8-9","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 ABS & BICEPS FINISHER:\n➡️ Tuck Up Off Bench AND 2DB Alternating Hammer Grip Curls: 3 rounds. Go to muscular failure for the Tuck Ups and follow them up immediately with Alternating Hammer Grip Curls for 8 reps on each side at a 8-9 RPE. Rest as little as possible in between rounds (15-30 seconds total!)\nEach week, increase by 1 set, or by 1 rep, or increase the weight on the curls!\n💪 CARDIO FINISHER"}]},{"id":"W1D2","week":1,"day":2,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"2DB","variations":[],"sets_info":"3 sets of 5 reps","rpe":"6","notes":"A) Power Development - Day 2\n➡️ 2DB OR 2KB Hang Clean: 3 sets of 5 reps at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nKeep the weights moderately challenging and explosively use your legs to drive them up.\nALTERNATIVES:\n1️⃣ BB OR 2DB OR 2KB Hang Clean with Box Step: 3 sets of 4 reps each side at a 6 RPE with 45 seconds rest between sets. This is taking the traditional Hang Clean to the next level by landing in a split position on a box/bench/elevated surface. It's less stable, requires more horizo"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 10","rpe":"5-6","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 10 at a 5-6 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"3 Point Single Arm Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"8","notes":"B2) Isolation: Rear Delts\n➡️ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX High Row to Reverse Flye Eccentric: 3 sets of 8 reps with a 3 second slow lower at a 8 RPE. If you have access to a TRX and would like to use it, you can opt for these High Row to Reverse Flyes Eccentrics instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 10 at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"1/2 Kneel Floating Heel Single Arm Overhead Press","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 1/2 Kneel Floating Heel Single Arm Overhead Press: 3 sets of 8 reps each side at a 7 RPE. Superset (alternate sets) with the C2 movement down below.\nThe lean forward and floating heel combo lengthens your hip flexors and promotes knee/ankle/hip stability as you press overhead! You can do these with dumbbells or kettlebells.\nALTERNATIVE:\n1️⃣ Open 1/2 Kneel Single Arm Overhead Press: 3 sets of 8 reps each side at a 7 RPE. If you'd like to work on your adductor mobility, you can opt for these Open 1/2 Kneel Presses instead! You can do these with dumbbells or ke"},{"id":"C2","label":"Row Variations - Day 2","exercise":"2DB Bent Over Row","variations":["2DB Bent Over Row","Seated Cable Row"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C2) Row Variations - Day 2\n➡️ 2DB Bent Over Row OR Seated Cable Row: 3 sets of 10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one! Perform 3 sets of 10 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":[],"sets_info":"4 sets of 8 reps with a 2 second isometric hold at the top","rpe":"8","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift: 3-4 sets of 8 reps with a 2 second isometric hold at the top at a 8 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ BB Supine Glute Bridge: 3-4 sets of 8 reps with a 2 second isometric hold at the top at a 8 RPE. Opt for 4 sets if you're looking for additional glute volume!\nThe BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1DB Supported Suit"},{"id":"D2","label":"Isolation: Triceps","exercise":"BB","variations":[],"sets_info":"3 sets of 12 reps","rpe":"6-7","notes":"D2) Isolation: Triceps\n➡️ BB OR 2DB Skull Crusher: 3 sets of 12 reps at a 6-7 RPE. After each set, rest 60 seconds before returning to D1.\nThe bar should come down to about your eye level with your elbows pointing slightly inwards to maximize the bend in your elbows. Keep the weights on the lighter side and focus on mind-muscle connection with your triceps!\nALTERNATIVES:\n1️⃣ BB OR 2DB JM Press: 3 sets of 12 reps at a 6-7 RPE. You can up the ante even more by bringing the bar down to about neck level. This increases the amount of elbow bend and places additional stretch on the triceps.\n⭐  Try t"},{"id":"E","label":"Finisher","exercise":"Complex: Clean to Reverse Lunge (3x each side), Press (3x), Front Squat (3x), RDL (3x)","variations":[],"sets_info":"3 sets of 8 reps each side with 10-15 seconds rest in between sets","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Clean to Reverse Lunge (3x each side), Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex. Feel free to turn the Military Press into a Push Press if you need to!\n⭐ Each week, try to add weight, i"}]},{"id":"W1D3","week":1,"day":3,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Double Leg Ankle Hops to Plate","variations":["Double Leg Ankle Hops to Plate","Double to Single Leg Ankle Hops to Plate"],"sets_info":"","rpe":"","notes":"A) Power Development - Day 3\n➡️ Double Leg Ankle Hops to Plate OR Double to Single Leg Ankle Hops to Plate: 3 sets of 15-20 reps (10-12 reps on each side if doing the Single Leg version) with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf jumping onto a plate or step is a bit too much for you at the moment, feel free to simply perform them on the floor."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 6 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 6 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 70!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Abdcutors","exercise":"Side Plank","variations":[],"sets_info":"3 sets of 20-40 second holds on each side","rpe":"8","notes":"B2) Isolation: Abdcutors\n➡️ Side Plank: 3 sets of 20-40 second holds on each side at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nReally focus on your bottom shoulder, bottom glute, and obliques to help keep your hips up high!\nALTERNATIVES:\n1️⃣ Side Plank with Top Knee Flexed OR Side Plank with Leg Raise ISO Hold: 3 sets of 20-40 second holds on each side at a 8 RPE. The top leg being in a flexed/raised position significantly increase the demands on your core and glutes!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB RFE Split Squat","variations":["2DB RFE Split Squat","2DB Deficit RFE Split Squat"],"sets_info":"3 sets of 10 reps on each side","rpe":"8-9","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB RFE Split Squat OR 2DB Deficit RFE Split Squat: 3 sets of 10 reps on each side at a 8-9 RPE. Superset (alternate sets) with the C2 movement down below.\nIf you want to increase the range of motion and stretch on your quads, opt for the Deficit RFE Split Squat off of a 2-4\" elevation!\nALTERNATIVES:\n1️⃣ Goblet Athletic Reverse Lunge with Twist to Lateral Lunge: 3 sets of 6 reps on each side at a 6-7 RPE. This is a multi-planar lower body exercise that you can choose to do if you're looking for a hightly \"functional\" alternative!\n⭐  Try to add weight or incr"},{"id":"C2","label":"Isolation: Delts","exercise":"Single Arm DB","variations":["Single Arm DB","Band/Cable Leaning Away Lateral Raise"],"sets_info":"3 sets of 10-12 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Single Arm DB OR Band/Cable Leaning Away Lateral Raise: 3 sets of 10-12 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nThe lean away places increases tension at the top of the movement and is a nice change of pace from standard lateral raises.\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 4. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4. Use a band thickness that allows you to get about 6 reps, but only do 4 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 12-15 reps","rpe":"7-8","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 12-15 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 12-15 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 4-6 "},{"id":"E","label":"Finisher","exercise":"KB Swings AND Goblet Squats","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ KB Swings AND Goblet Squats: 4 rounds of 10 reps each. Perform the Swings and Squats without rest, and then break for 30 seconds before starting your next round. Keep the weights light since the rest is so minimal and the reps are high!\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional round!\n💪 BICEPS FINISHER\n1️⃣ Bicep"}]},{"id":"W1D4","week":1,"day":4,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Lateral Bound & Stick","variations":[],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Lateral Bound & Stick: 3 sets of 5 reps on each side with 30 seconds rest in between sets. Hold the bottom position for 1-2 seconds before walking back to the start position. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ Depth Lateral Bound & Stick: 3 sets of 5 reps on each side with 30 seconds rest in between sets. Bound off of a 4-12\" elevation to increase the amount of impact your legs have to absorb. Only attempt these if you're extremely proficient with standard lateral bounds!\n⭐ Try to incr"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 6 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 6 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 6 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, increase weight by about 2.5-5lbs from last week's wo"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","variations":[],"sets_info":"3 sets of 12 reps","rpe":"8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Face Pull: 3 sets of 12 reps at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 2DB Bent Over High Row: 3 sets of 12 reps at a 8 RPE. If you don't have access to a good cable set up, opt for these High Rows instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"2DB Chest Supported Row","variations":["2DB Chest Supported Row","TRX Inverted Row","BB Inverted Row"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C1) Row Variations\n➡️ 2DB Chest Supported Row OR TRX Inverted Row OR BB Inverted Row: 3 sets of 10 reps at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nChoose from any of the rowing variations above - be sure to maintain mind-muscle connection with your back muscles!\n💡 Feel free to sub in the chest supported row machine if you have access to one! Get 3 sets of 10 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Lower Body Accessory - Day 4","exercise":"1KB Goblet Lateral Lunge","variations":[],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"C2) Lower Body Accessory - Day 4\n➡️ 1KB Goblet Lateral Lunge: 3 sets of 8 reps on each side at a 8 RPE. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ 1DB Goblet Sliding Lateral Lunge: 3 sets of 6 reps on each side at a 8 RPE. Opt for this version if  you're comfortable with the Lateral Lunges and want to challenge yourself further!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D1","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","2DB Deficit Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"D1) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR 2DB Deficit Push Ups OR 2DB Decline Deficit Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 6 reps or so!\nSuperset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ Band/Cable Single Arm Lateral Raise: 3 sets of 10-12 reps at a 9 RPE. If you'd rather skip pushups and work on your delts, opt for these lateral raises instead!\n💡 Feel free to sub in the pec deck machine or a cable crossover on a cable machine if you have access to one! Get 3 sets of 1"},{"id":"D2","label":"Core: Anti-Extension","exercise":"Reverse Crunch Off Bench","variations":["Reverse Crunch Off Bench","Bench Pike Up","Bench Pike Up to Hollow Hold","Hanging Knee Raise"],"sets_info":"3 sets of 8-12 reps","rpe":"9-10","notes":"D2) Core: Anti-Extension\n➡️ Reverse Crunch Off Bench OR Bench Pike Up OR Bench Pike Up to Hollow Hold OR Hanging Knee Raise OR Hanging Straight Leg Raise: 3 sets of 8-12 reps at a 9-10 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 10 reps each side with 10-15 seconds rest in between sets","rpe":"","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 BICEPS OR TRICEPS:\n1️⃣ Band/Cable Triceps Pulldown Dropset: Do a set of 10-12 pulldowns to failure. Immediately after, drop the weight about 20% and perform another set to failure. Rest 90 seconds and perform 2 more rounds.\n⭐ Try to increase by 1 repetition each week, or increase weight!\n🍑 For glutes, try this out:\n2️⃣ Band/Cable 45 Degree Glute Kickbacks OR Quadruped Single Leg Band/Cable Hip Abductions: 3 sets of 10 reps each side with 10-15 seconds rest in between s"}]},{"id":"W2D1","week":2,"day":1,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Box Jump","variations":["Box Jump","Single Leg Box Jump"],"sets_info":"3 sets of 6 reps with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Box Jump OR Single Leg Box Jump: 3 sets of 5 reps (on each side if performing the Single Leg version!) with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ Consecutive 1/4 Squat Jumps - Hands on Hips: 3 sets of 6 reps with 30 seconds rest between sets. These jumps are more impactful on the knees, and require more force and elasticity so make sure you're proficient with Box Jumps before attempting these!\n⭐ Progress by adding an extra repetition each week, or by adding a"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 6 at a 7 RPE of ONE of the following","rpe":"7","notes":"B1) Squat Variations\n4 sets of 6 at a 7 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, increase weight  by about 5-10lbs from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 70!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Calves","exercise":"Suitcase DB SL Calf Raise to SL Eccentric","variations":["Suitcase DB SL Calf Raise to SL Eccentric","Suitcase DB Single Leg Calf Raise to SL Eccentric"],"sets_info":"3 sets of 10 reps on each side with a 4 second slow lower down","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Suitcase DB SL Calf Raise to SL Eccentric OR Suitcase DB Single Leg Calf Raise to SL Eccentric: 3 sets of 10 reps on each side with a 4 second slow lower down at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nYou can also do these on one or two legs—just maintain a mind-muscle connection with the way down!\n💡 Feel free to sub in a calf raise machine of your choice here if you have access to one! Perform single leg raises for 3 sets of 10 reps on each side with a 4 second slow lower down at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repet"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"2DB Reverse Lunge","variations":["2DB Reverse Lunge","2DB Deficit Reverse Lunge"],"sets_info":"3 sets of 8 reps each side","rpe":"8-9","notes":"C1) Lower Body Accessory - Day 1\n➡️ 2DB Reverse Lunge OR 2DB Deficit Reverse Lunge: 3 sets of 8 reps each side at a 8-9 RPE. If you'd like, add in a 2-4\" Deficit for increased range of motion! Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Deficit Reverse Lunge with Band RNT: 3 sets of 8 reps on each side at a 8-9 RPE. If you'd like to work on your hip stability/glute medius strength, then try adding in a band while you perform your Reverse Lunges!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Isolation: Delts","exercise":"2DB Lateral Raise","variations":[],"sets_info":"3 sets of 12 reps","rpe":"6","notes":"C2) Isolation: Delts\n➡️ 2DB Lateral Raise: 3 sets of 12 reps at a 6 RPE. Rest 60 seconds after each set before returning to C1.\nALTERNATIVES:\n1️⃣ Single Arm DB Push Press to Slow Eccentric OR Single Arm DB Split Jerk to Slow Eccentric: 3 sets of 6 reps each side with a 3 second slow lower at a 7-8 RPE. If you're looking for a more functional shoulder option, then choose one of these overhead pressing variations with a slow lower!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 6 reps","rpe":"8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 6 reps. Use a band thickness that allows you to get about 8 reps, but only do 6 reps so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week"},{"id":"D2","label":"Isolation: Glutes/Hamstrings","exercise":"SL Supported Skater Squat","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"D2) Isolation: Glutes/Hamstrings\n➡️ SL Supported Skater Squat: 3 sets of 8 reps each side at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nFeel free to hold on to a light weight with your free hand to load the weight further!\nALTERNATIVES:\n1️⃣ SL Supported Skater Curtsy Squat: 3 sets of 8 reps each side at a 8 RPE. The Skater Curtsy requires more multiplanar strength and knee resiliency but increases glute engagement - try it out if you have proficiency with the traditional Skater Squat!\n2️⃣ Suitcase 1KB Supported SL Deadlift: 3 sets of 8 reps each at a 8 RPE. If Skater vari"},{"id":"E","label":"Finisher","exercise":"Tuck Up Off Bench AND 2DB Alternating Hammer Grip Curls","variations":[],"sets_info":"","rpe":"8-9","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a core or triceps finisher:\n🔥 ABS & BICEPS FINISHER:\n➡️ Tuck Up Off Bench AND 2DB Alternating Hammer Grip Curls: 3 rounds. Go to muscular failure for the Tuck Ups and follow them up immediately with Alternating Hammer Grip Curls for 8 reps on each side at a 8-9 RPE. Rest as little as possible in between rounds (15-30 seconds total!)\nEach week, increase by 1 set, or by 1 rep, or increase the weight on the curls!\n💪 CARDIO FINISHER"}]},{"id":"W2D2","week":2,"day":2,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"2DB","variations":[],"sets_info":"3 sets of 5 reps","rpe":"6","notes":"A) Power Development - Day 2\n➡️ 2DB OR 2KB Hang Clean: 3 sets of 5 reps at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nKeep the weights moderately challenging and explosively use your legs to drive them up.\nALTERNATIVES:\n1️⃣ BB OR 2DB OR 2KB Hang Clean with Box Step: 3 sets of 4 reps each side at a 6 RPE with 45 seconds rest between sets. This is taking the traditional Hang Clean to the next level by landing in a split position on a box/bench/elevated surface. It's less stable, requires more horizo"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 10","rpe":"5-6","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 10 at a 5-6 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"3 Point Single Arm Reverse Flye","variations":[],"sets_info":"3 sets of 10 reps each side","rpe":"8","notes":"B2) Isolation: Rear Delts\n➡️ 3 Point Single Arm Reverse Flye: 3 sets of 10 reps each side at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX High Row to Reverse Flye Eccentric: 3 sets of 8 reps with a 3 second slow lower at a 8 RPE. If you have access to a TRX and would like to use it, you can opt for these High Row to Reverse Flyes Eccentrics instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 10 at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"1/2 Kneel Floating Heel Single Arm Overhead Press","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 1/2 Kneel Floating Heel Single Arm Overhead Press: 3 sets of 8 reps each side at a 7 RPE. Superset (alternate sets) with the C2 movement down below.\nThe lean forward and floating heel combo lengthens your hip flexors and promotes knee/ankle/hip stability as you press overhead! You can do these with dumbbells or kettlebells.\nALTERNATIVE:\n1️⃣ Open 1/2 Kneel Single Arm Overhead Press: 3 sets of 8 reps each side at a 7 RPE. If you'd like to work on your adductor mobility, you can opt for these Open 1/2 Kneel Presses instead! You can do these with dumbbells or ke"},{"id":"C2","label":"Row Variations - Day 2","exercise":"2DB Bent Over Row","variations":["2DB Bent Over Row","Seated Cable Row"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C2) Row Variations - Day 2\n➡️ 2DB Bent Over Row OR Seated Cable Row: 3 sets of 10 reps at a 8 RPE. After each set, rest 60 seconds before returning to C1.\n💡 Feel free to sub in a chest supported rowing machine here if you have access to one! Perform 3 sets of 10 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":[],"sets_info":"4 sets of 8 reps with a 2 second isometric hold at the top","rpe":"8","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift: 3-4 sets of 8 reps with a 2 second isometric hold at the top at a 8 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ BB Supine Glute Bridge: 3-4 sets of 8 reps with a 2 second isometric hold at the top at a 8 RPE. Opt for 4 sets if you're looking for additional glute volume!\nThe BB Supine Glute Bridge is a great option for those of you having trouble with the balance and set up of the shoulder elevated version!\n2️⃣ 1DB Supported Suit"},{"id":"D2","label":"Isolation: Triceps","exercise":"BB","variations":[],"sets_info":"3 sets of 12 reps","rpe":"6-7","notes":"D2) Isolation: Triceps\n➡️ BB OR 2DB Skull Crusher: 3 sets of 12 reps at a 6-7 RPE. After each set, rest 60 seconds before returning to D1.\nThe bar should come down to about your eye level with your elbows pointing slightly inwards to maximize the bend in your elbows. Keep the weights on the lighter side and focus on mind-muscle connection with your triceps!\nALTERNATIVES:\n1️⃣ BB OR 2DB JM Press: 3 sets of 12 reps at a 6-7 RPE. You can up the ante even more by bringing the bar down to about neck level. This increases the amount of elbow bend and places additional stretch on the triceps.\n⭐  Try t"},{"id":"E","label":"Finisher","exercise":"Complex: Clean to Reverse Lunge (3x each side), Press (3x), Front Squat (3x), RDL (3x)","variations":[],"sets_info":"3 sets of 8 reps each side with 10-15 seconds rest in between sets","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n4 Rounds with 90 seconds rest between rounds. Start with a weight you can strict press for around 5 reps and adjust as needed.\n➡️ Complex: Clean to Reverse Lunge (3x each side), Press (3x), Front Squat (3x), RDL (3x)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells, or kettlebells for this complex. Feel free to turn the Military Press into a Push Press if you need to!\n⭐ Each week, try to add weight, i"}]},{"id":"W2D3","week":2,"day":3,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Double Leg Ankle Hops to Plate","variations":["Double Leg Ankle Hops to Plate","Double to Single Leg Ankle Hops to Plate"],"sets_info":"","rpe":"","notes":"A) Power Development - Day 3\n➡️ Double Leg Ankle Hops to Plate OR Double to Single Leg Ankle Hops to Plate: 3 sets of 15-20 reps (10-12 reps on each side if doing the Single Leg version) with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf jumping onto a plate or step is a bit too much for you at the moment, feel free to simply perform them on the floor."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 6 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 6 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, increase weight by about 5-10lbs from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 70!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Abdcutors","exercise":"Side Plank","variations":[],"sets_info":"3 sets of 20-40 second holds on each side","rpe":"8","notes":"B2) Isolation: Abdcutors\n➡️ Side Plank: 3 sets of 20-40 second holds on each side at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nReally focus on your bottom shoulder, bottom glute, and obliques to help keep your hips up high!\nALTERNATIVES:\n1️⃣ Side Plank with Top Knee Flexed OR Side Plank with Leg Raise ISO Hold: 3 sets of 20-40 second holds on each side at a 8 RPE. The top leg being in a flexed/raised position significantly increase the demands on your core and glutes!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB RFE Split Squat","variations":["2DB RFE Split Squat","2DB Deficit RFE Split Squat"],"sets_info":"3 sets of 10 reps on each side","rpe":"8-9","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB RFE Split Squat OR 2DB Deficit RFE Split Squat: 3 sets of 10 reps on each side at a 8-9 RPE. Superset (alternate sets) with the C2 movement down below.\nIf you want to increase the range of motion and stretch on your quads, opt for the Deficit RFE Split Squat off of a 2-4\" elevation!\nALTERNATIVES:\n1️⃣ Goblet Athletic Reverse Lunge with Twist to Lateral Lunge: 3 sets of 6 reps on each side at a 6-7 RPE. This is a multi-planar lower body exercise that you can choose to do if you're looking for a hightly \"functional\" alternative!\n⭐  Try to add weight or incr"},{"id":"C2","label":"Isolation: Delts","exercise":"Single Arm DB","variations":["Single Arm DB","Band/Cable Leaning Away Lateral Raise"],"sets_info":"3 sets of 10-12 reps each side","rpe":"6-7","notes":"C2) Isolation: Delts\n➡️ Single Arm DB OR Band/Cable Leaning Away Lateral Raise: 3 sets of 10-12 reps each side at a 6-7 RPE. After each set, rest 60 seconds before returning to C1.\nThe lean away places increases tension at the top of the movement and is a nice change of pace from standard lateral raises.\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 4. Use a band thickness th","rpe":"8","notes":"D1) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4. Use a band thickness that allows you to get about 6 reps, but only do 4 so you can conserve energy across the 3 sets. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\n💡 If you can perform unassisted pull-ups, then do as many reps as you can but stop two reps short of failure during each set. You can even add weight if you'd like! Remember to do 3 sets in Week 1, 4 sets"},{"id":"D2","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 12-15 reps","rpe":"7-8","notes":"D2) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 12-15 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Rest 60 seconds after each set before returning to D1.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 12-15 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 4-6 "},{"id":"E","label":"Finisher","exercise":"KB Swings AND Goblet Squats","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a total body complex or biceps finisher:\n🔥 TOTAL BODY FINISHER:\n➡️ KB Swings AND Goblet Squats: 4 rounds of 10 reps each. Perform the Swings and Squats without rest, and then break for 30 seconds before starting your next round. Keep the weights light since the rest is so minimal and the reps are high!\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an additional round!\n💪 BICEPS FINISHER\n1️⃣ Bicep"}]},{"id":"W2D4","week":2,"day":4,"vol":70,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Lateral Bound & Stick","variations":[],"sets_info":"3 sets of 5 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Lateral Bound & Stick: 3 sets of 5 reps on each side with 30 seconds rest in between sets. Hold the bottom position for 1-2 seconds before walking back to the start position. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ Depth Lateral Bound & Stick: 3 sets of 5 reps on each side with 30 seconds rest in between sets. Bound off of a 4-12\" elevation to increase the amount of impact your legs have to absorb. Only attempt these if you're extremely proficient with standard lateral bounds!\n⭐ Try to incr"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 6 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 6 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 6 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, increase weight by about 2.5-5lbs from last week's wo"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","variations":[],"sets_info":"3 sets of 12 reps","rpe":"8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Face Pull: 3 sets of 12 reps at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ 2DB Bent Over High Row: 3 sets of 12 reps at a 8 RPE. If you don't have access to a good cable set up, opt for these High Rows instead!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"2DB Chest Supported Row","variations":["2DB Chest Supported Row","TRX Inverted Row",
