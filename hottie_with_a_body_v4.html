rcise":"Staggered Stance Pogo Hops","variations":["Staggered Stance Pogo Hops","Foot on Box SL High Pogo Hops"],"sets_info":"3 sets of 10-12 reps on each with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Staggered Stance Pogo Hops OR Foot on Box SL High Pogo Hops: 3 sets of 10-12 reps on each with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThe Foot on Box variation is a step up (no pun intended!) from the Staggered Stance Pogo Hops in terms of difficulty and impact."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 5 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 5 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Upper Body Accessory - Day 3","exercise":"2DB Incline Bench Press","variations":[],"sets_info":"4 sets of 10 reps 7  RPE","rpe":"7","notes":"B2) Upper Body Accessory - Day 3\n➡️ 2DB Incline Bench Press: 3-4 sets of 10 reps 7  RPE. After each set, rest 60-120 seconds before returning to B1.\nObviously this is a tough superset in a busy gym, so feel free to split B1 and B2 up as straight sets for each movement!\n💡 Feel free to sub in a incline press machine here if you have access to one! Perform 3-4 sets of 10 reps at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"Single Leg Squat to Box","variations":[],"sets_info":"3 sets of 6-8 reps on each side","rpe":"7-8","notes":"C1) Lower Body Accessory - Day 3\n➡️ Single Leg Squat to Box: 3 sets of 6-8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Supported Pistol Squat - Heel Elevated: 3 sets of 6-8 reps on each side at a 8 RPE. For increase range of motion, you can opt for this Pistol Squat variation!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C2) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Bent Over Single Arm"},{"id":"D1","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 8-10 reps","rpe":"8-9","notes":"D1) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 8-10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 8-10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-"},{"id":"D2","label":"Core: Anti-Rotation","exercise":"Deadbug with Anti-Rotation","variations":["Deadbug with Anti-Rotation","Standing Anti-Rotation Press","Angled Barbell Arcs"],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"D2) Core: Anti-Rotation\n➡️ Deadbug with Anti-Rotation OR Standing Anti-Rotation Press OR Angled Barbell Arcs: 3 sets of 8 reps each side at a 8 RPE. Rest 60 seconds after each set before returning to D1.\nChoose from any of the Core movements above - they're technically ranked from least difficult to most difficult, but they're all fantastic options at developing anti-rotation strength.\n⭐  Try to add weight/band resistance or increase by one repetition each week!"},{"id":"E","label":"Finisher","exercise":"Single Arm DB Preacher Curl","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or cardio finisher:\n💪 BICEPS FINISHER:\n➡️ Single Arm DB Preacher Curl OR 1DB Concentration Curl: Perform a set of 8-10 reps at a 10 RPE (to failure!) Then, continue the set by performing as many assisted curls as possible where you use your free hand to help complete 3-5 more curls on the arm that just went to failure. Do 3 total rounds with 60-90 seconds rest in between sets.\nEach week, increase by 1 set, or by 1 rep, "}]},{"id":"W2D4","week":2,"day":4,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Weighted Forward","variations":["Weighted Forward","Diagonal Box Step with Rotation"],"sets_info":"3 sets of 6 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Weighted Forward OR Diagonal Box Step with Rotation: 3 sets of 6 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a box, you can simply stride forward on the floor powerfully! The main purpose is to drive forward and create a strong rotational force.\n⭐ Try to increase by 1 repetition each week, or add weight!"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 5 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, keep the weight the same from last week's working set"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","variations":["Face Pull","2DB Bent Over Face Pull","TRX Face Pull"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Face Pull OR 2DB Bent Over Face Pull OR TRX Face Pull: 3 sets of 10 reps at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nThese are all great face pull variations - choose any of these options!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"BB Inverted Row","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8-9","notes":"C1) Row Variations\n➡️ BB Inverted Row: 3 sets of 8 reps at a 8-9 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB Renegade Row: 3 sets of 8 reps on each side at a 8 RPE. Choose this option if you'd like a little more core emphasis with your rows!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","Pushup Slow Lower to Hand Release ISO"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C2) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR Pushup Slow Lower to Hand Release ISO: 3 sets of as many reps as possible. Choose the variation that allows you to get around 5 reps or so!\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Crossover: 3 sets of 10 reps at a 9 RPE. If you'd rather skip pushups and do a pec isolation movement, opt for these Crossovers!\n💡 Feel free to sub in the pec deck machine if you have access to one! Get 3 sets of 10 reps at a 9 RPE :)\n⭐ Try to add weight or increase by one repetition each wee"},{"id":"D1","label":"Lower Body Accessory - Day 4","exercise":"1DB Goblet Curtsy Lunge","variations":["1DB Goblet Curtsy Lunge","Angled BB (Landmine) Leaning Curtsy Lunge"],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"D1) Lower Body Accessory - Day 4\n➡️ 1DB Goblet Curtsy Lunge OR Angled BB (Landmine) Leaning Curtsy Lunge: 3 sets of 8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the D2 movement down below.\nThe Landmine version is a bit trickier to coordinate, but both are great Curtsy options!\nALTERNATIVES:\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Rotation","exercise":"Twisting Reverse Crunch Off Bench","variations":["Twisting Reverse Crunch Off Bench","Standing Horizontal Chops","Angled BB Rotations"],"sets_info":"3 sets of 6-8 reps each side","rpe":"8-9","notes":"D2) Core: Rotation\n➡️ Twisting Reverse Crunch Off Bench OR Standing Horizontal Chops OR Angled BB Rotations: 3 sets of 6-8 reps each side at a 8-9 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 15 reps","rpe":"7-8","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 DELTS AND TRICEPS:\n1️⃣ 2DB Seated Lateral Raise AND 2DB Lying Triceps Extension: Do a set of 10 Lateral Raises at a 7-8 RPE. Immediately after, drop down onto the bench/floor and perform another set of 10 Triceps Extensions. Rest 90 seconds and perform 2 more rounds. If there is a bit of a weight discrepancy between the two exercises, feel free to either grab two different sets of weights or perform more reps with the exercise that feels easier!\n⭐ Try to increase by 1-"}]},{"id":"W3D1","week":3,"day":1,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Step Up with Explosive Knee Drive","variations":[],"sets_info":"3 sets of 4 reps on each side with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Step Up with Explosive Knee Drive: 3 sets of 5 reps on each side off a low plyo box with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 1/2 Kneeling Deadstart Jump: 3 sets of 4 reps on each side with 30 seconds rest between sets. These jumps require a little more force since you're starting off in a kneeling position.\n2️⃣ Speed Split Squat from ISO Hold - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest between sets. If jumping bothers your knees, thes"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 5 at a 7 RPE of ONE of the following","rpe":"7","notes":"B1) Squat Variations\n4 sets of 5 at a 7 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Adductors","exercise":"Copenhagen Hip Dips - Short","variations":["Copenhagen Hip Dips - Short","Long Lever"],"sets_info":"3 sets of 8-10 reps on each side","rpe":"8-9","notes":"B2) Isolation: Adductors\n➡️ Copenhagen Hip Dips - Short OR Long Lever: 2-3 sets of 8-10 reps on each side at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nThe Long Lever is significantly more challenging than the Short Lever variation so only attempt them if you're extremely proficient with the short lever position!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts - Unweighted OR Weighted: 2-3 sets of 10-12 reps on each side at a 8-9 RPE. Copenhagens are extremely difficult so feel free to opt for these Side Lying Adductor Leg Lifts instead to work up to them!\n💡 Feel fr"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"DB Goblet Step Up with Knee Drive","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ DB Goblet Step Up with Knee Drive: 3 sets of 8 reps each side at a 8 RPE. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ KB Goblet Reverse Lunge to Knee Drive: 3 sets of 8 reps on each side at a 8 RPE. If you don't have access to a plyo box or would rather not do Step Ups, you can simply opt for these Reverse Lunge to Knee Drives instead! You can do these with a kettlebell or a dumbbell!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Isolation: Hamstrings","exercise":"2DB Romanian Deadlift","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C2) Isolation: Hamstrings\n➡️ 2DB Romanian Deadlift: 3 sets of 8 reps at a 8 RPE. Rest 60 seconds after each set before returning to C1.\nThis C1 and C2 superset hits both the front and backside of the legs - it'll lead to quite the cumulative effect!\n💡 Feel free to sub in a leg curl machine OR a hack squat/leg press machine (with your feet positioned higher to bias the hamstrings more) here if you have access to them! Perform 3 sets of 10 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 5 reps","rpe":"7","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 5 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ Glute Bridge ISO D"},{"id":"D2","label":"Core: Flexion","exercise":"Reverse Crunch off Bench","variations":["Reverse Crunch off Bench","Bench Pike Up","Bench Pike Up to Hollow Hold"],"sets_info":"3 sets of As Many Reps as Possible","rpe":"","notes":"D2) Core: Flexion\n➡️ Reverse Crunch off Bench OR Bench Pike Up OR Bench Pike Up to Hollow Hold: 3 sets of As Many Reps as Possible. Choose the variation that allows you to get around 8 reps or so! After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1-2 repetitions each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"2DB Seated Bicep Curl: Perform a set of 10 reps at a 10 RPE (to failure!) Hold on to the w","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or a lower-body finisher:\n💪 BICEPS FINISHER:\n➡️ 2DB Seated Bicep Curl: Perform a set of 10 reps at a 10 RPE (to failure!) Hold on to the weights for 10-15 seconds and try to eke out 3-5 additional partial reps under control. Do 3 total rounds with 60-90 seconds rest in between sets.\nEach week, increase by 1 set, or by 1 rep, or increase the weight on the curls!\n🔥 LOWER BODY FINISHER\n➡️ Walking Lunges OR Seated Leg Exten"}]},{"id":"W3D2","week":3,"day":2,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Plyo Push-Up Series","variations":[],"sets_info":"3 sets of 6 reps","rpe":"6","notes":"A) Power Development - Day 2\n➡️ Plyo Push-Up Series: 3 sets of 6 reps at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose the option in the series that meets you where you're at! If your speed slows down  significantly by the end of 6 reps, it probably means that the variation is a bit too challenging for you!\nALTERNATIVES:\n1️⃣ MB Side Rotation Throw with Step OR MB Rebound Side Rotation Throw: 3 sets of 5 reps each side at a 5-6 RPE with 30 seconds rest between sets. If you have access to a soft"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 8 at a 6-7 RPE","rpe":"6-7","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 8 at a 6-7 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month and did NOT max out, add about 2.5-5lbs to last week's weights, and up by 2.5-5lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n📝 If you were on RISE and DID max out, then take about 60-65% of your max weight and start there. We want this weight to feel approximately like a 7 R"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Reverse Flye - Pronated","variations":["2DB Seated Reverse Flye - Pronated","Single Arm DB Rear Delt Flye - Pronated"],"sets_info":"3 sets of 10 reps (each side for the Single Arm version)","rpe":"8","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Reverse Flye - Pronated OR Single Arm DB Rear Delt Flye - Pronated: 3 sets of 10 reps (each side for the Single Arm version) at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 10 reps a 8 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2KB Z Press","variations":[],"sets_info":"3 sets of 8 reps","rpe":"7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2KB Z Press: 3 sets of 8 reps at a 7 RPE. Superset (alternate sets) with the C2 movement down below.\nSitting down with your legs out significantly increases the stability demands on your core and spine! Bend your knees if hamstring flexibility is holding your back! You can use kettlebells or dumbbells for this movement.\nALTERNATIVE:\n1️⃣ 2DB Seated Overhead Press: 3 sets of 10 reps  at a 8 RPE. Unlike the Z Press, this move signficantly reduces the stability demands on your core and spine, which allows you to use more weight. Neither version is \"better\" than "},{"id":"C2","label":"Row Variations - Day 2","exercise":"2KB","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C2) Row Variations - Day 2\n➡️ 2KB OR 2DB Sumo Alternating Deadstart Row with Rotation: 3 sets of 8 reps each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\n⭐ Try to add weight or increase by one repetition on each side each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":["BB Shoulders Elevated Hip Lift","BB Supine Glute Bridge"],"sets_info":"4 sets of 5 reps with a 1 second hold at the top","rpe":"8-9","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift OR BB Supine Glute Bridge: 3-4 sets of 5 reps with a 1 second hold at the top at a 8-9 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nLoad these up and get after it!\nALTERNATIVES:\n1️⃣ 1KB Straddle Lift OR 1.5 1KB Straddle Lift: 3 sets of 10 reps at a 7-8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for either of these Straddle Lifts instead! Focus on mind-muscle connection with the glutes as you perform this movement!\n💡 Feel free to sub "},{"id":"D2","label":"Core: Anti-Lateral Flexion","exercise":"Side Plank Series","variations":[],"sets_info":"3 sets of 30 second holds on each side","rpe":"8-9","notes":"D2) Core: Anti-Lateral Flexion\n➡️ Side Plank Series: 3 sets of 30 second holds on each side at a 8-9 RPE. Choose the variation that meets you where you're at! After each set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n1️⃣ Suitcase Carry: 3 sets of 30 second carries on each side at a 8-9 RPE. You can hold onto a dumbbell or kettlebell and perform these Suitcase Carries, which are more of a dynamic stability exercise!\n⭐  Try to increade duration by 5 seconds/increase weight each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"Complex: Overhead Press, Front Squat, Row, RDL","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n➡️ Complex: Overhead Press, Front Squat, Row, RDL\n6-5-4-3-2-1 reverse ladder of this complex using barbells, dumbbells, or kettlebells.\nSo, perform 6 overhead presses, followed by 6 front squats, followed by 6 rows, and finish with 6 RDLs. Rest 30 seconds and perform the complex with 5 reps per movement and so on and so forth. Do the ladder ONE time through.\n⭐ Each week, try to add weight or add another rung to the ladder (start at 7 instead of 6!)\nAL"}]},{"id":"W3D3","week":3,"day":3,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Staggered Stance Pogo Hops","variations":["Staggered Stance Pogo Hops","Foot on Box SL High Pogo Hops"],"sets_info":"3 sets of 10-12 reps on each with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Staggered Stance Pogo Hops OR Foot on Box SL High Pogo Hops: 3 sets of 10-12 reps on each with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThe Foot on Box variation is a step up (no pun intended!) from the Staggered Stance Pogo Hops in terms of difficulty and impact."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 5 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 5 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Upper Body Accessory - Day 3","exercise":"2DB Incline Bench Press","variations":[],"sets_info":"4 sets of 10 reps 7  RPE","rpe":"7","notes":"B2) Upper Body Accessory - Day 3\n➡️ 2DB Incline Bench Press: 3-4 sets of 10 reps 7  RPE. After each set, rest 60-120 seconds before returning to B1.\nObviously this is a tough superset in a busy gym, so feel free to split B1 and B2 up as straight sets for each movement!\n💡 Feel free to sub in a incline press machine here if you have access to one! Perform 3-4 sets of 10 reps at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"Single Leg Squat to Box","variations":[],"sets_info":"3 sets of 6-8 reps on each side","rpe":"7-8","notes":"C1) Lower Body Accessory - Day 3\n➡️ Single Leg Squat to Box: 3 sets of 6-8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Supported Pistol Squat - Heel Elevated: 3 sets of 6-8 reps on each side at a 8 RPE. For increase range of motion, you can opt for this Pistol Squat variation!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C2) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Bent Over Single Arm"},{"id":"D1","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 8-10 reps","rpe":"8-9","notes":"D1) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 8-10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 8-10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-"},{"id":"D2","label":"Core: Anti-Rotation","exercise":"Deadbug with Anti-Rotation","variations":["Deadbug with Anti-Rotation","Standing Anti-Rotation Press","Angled Barbell Arcs"],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"D2) Core: Anti-Rotation\n➡️ Deadbug with Anti-Rotation OR Standing Anti-Rotation Press OR Angled Barbell Arcs: 3 sets of 8 reps each side at a 8 RPE. Rest 60 seconds after each set before returning to D1.\nChoose from any of the Core movements above - they're technically ranked from least difficult to most difficult, but they're all fantastic options at developing anti-rotation strength.\n⭐  Try to add weight/band resistance or increase by one repetition each week!"},{"id":"E","label":"Finisher","exercise":"Single Arm DB Preacher Curl","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or cardio finisher:\n💪 BICEPS FINISHER:\n➡️ Single Arm DB Preacher Curl OR 1DB Concentration Curl: Perform a set of 8-10 reps at a 10 RPE (to failure!) Then, continue the set by performing as many assisted curls as possible where you use your free hand to help complete 3-5 more curls on the arm that just went to failure. Do 3 total rounds with 60-90 seconds rest in between sets.\nEach week, increase by 1 set, or by 1 rep, "}]},{"id":"W3D4","week":3,"day":4,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Weighted Forward","variations":["Weighted Forward","Diagonal Box Step with Rotation"],"sets_info":"3 sets of 6 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Weighted Forward OR Diagonal Box Step with Rotation: 3 sets of 6 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a box, you can simply stride forward on the floor powerfully! The main purpose is to drive forward and create a strong rotational force.\n⭐ Try to increase by 1 repetition each week, or add weight!"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 5 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, keep the weight the same from last week's working set"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","variations":["Face Pull","2DB Bent Over Face Pull","TRX Face Pull"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Face Pull OR 2DB Bent Over Face Pull OR TRX Face Pull: 3 sets of 10 reps at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nThese are all great face pull variations - choose any of these options!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"BB Inverted Row","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8-9","notes":"C1) Row Variations\n➡️ BB Inverted Row: 3 sets of 8 reps at a 8-9 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB Renegade Row: 3 sets of 8 reps on each side at a 8 RPE. Choose this option if you'd like a little more core emphasis with your rows!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","Pushup Slow Lower to Hand Release ISO"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C2) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR Pushup Slow Lower to Hand Release ISO: 3 sets of as many reps as possible. Choose the variation that allows you to get around 5 reps or so!\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Crossover: 3 sets of 10 reps at a 9 RPE. If you'd rather skip pushups and do a pec isolation movement, opt for these Crossovers!\n💡 Feel free to sub in the pec deck machine if you have access to one! Get 3 sets of 10 reps at a 9 RPE :)\n⭐ Try to add weight or increase by one repetition each wee"},{"id":"D1","label":"Lower Body Accessory - Day 4","exercise":"1DB Goblet Curtsy Lunge","variations":["1DB Goblet Curtsy Lunge","Angled BB (Landmine) Leaning Curtsy Lunge"],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"D1) Lower Body Accessory - Day 4\n➡️ 1DB Goblet Curtsy Lunge OR Angled BB (Landmine) Leaning Curtsy Lunge: 3 sets of 8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the D2 movement down below.\nThe Landmine version is a bit trickier to coordinate, but both are great Curtsy options!\nALTERNATIVES:\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Rotation","exercise":"Twisting Reverse Crunch Off Bench","variations":["Twisting Reverse Crunch Off Bench","Standing Horizontal Chops","Angled BB Rotations"],"sets_info":"3 sets of 6-8 reps each side","rpe":"8-9","notes":"D2) Core: Rotation\n➡️ Twisting Reverse Crunch Off Bench OR Standing Horizontal Chops OR Angled BB Rotations: 3 sets of 6-8 reps each side at a 8-9 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 15 reps","rpe":"7-8","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 DELTS AND TRICEPS:\n1️⃣ 2DB Seated Lateral Raise AND 2DB Lying Triceps Extension: Do a set of 10 Lateral Raises at a 7-8 RPE. Immediately after, drop down onto the bench/floor and perform another set of 10 Triceps Extensions. Rest 90 seconds and perform 2 more rounds. If there is a bit of a weight discrepancy between the two exercises, feel free to either grab two different sets of weights or perform more reps with the exercise that feels easier!\n⭐ Try to increase by 1-"}]},{"id":"W4D1","week":4,"day":1,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Step Up with Explosive Knee Drive","variations":[],"sets_info":"3 sets of 4 reps on each side with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Step Up with Explosive Knee Drive: 3 sets of 5 reps on each side off a low plyo box with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nALTERNATIVES:\n1️⃣ 1/2 Kneeling Deadstart Jump: 3 sets of 4 reps on each side with 30 seconds rest between sets. These jumps require a little more force since you're starting off in a kneeling position.\n2️⃣ Speed Split Squat from ISO Hold - Short Stride: 3 sets of 5 reps on each side with 30 seconds rest between sets. If jumping bothers your knees, thes"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 5 at a 7 RPE of ONE of the following","rpe":"7","notes":"B1) Squat Variations\n4 sets of 5 at a 7 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Adductors","exercise":"Copenhagen Hip Dips - Short","variations":["Copenhagen Hip Dips - Short","Long Lever"],"sets_info":"3 sets of 8-10 reps on each side","rpe":"8-9","notes":"B2) Isolation: Adductors\n➡️ Copenhagen Hip Dips - Short OR Long Lever: 2-3 sets of 8-10 reps on each side at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nThe Long Lever is significantly more challenging than the Short Lever variation so only attempt them if you're extremely proficient with the short lever position!\nALTERNATIVES:\n1️⃣ Side Lying Adductor Leg Lifts - Unweighted OR Weighted: 2-3 sets of 10-12 reps on each side at a 8-9 RPE. Copenhagens are extremely difficult so feel free to opt for these Side Lying Adductor Leg Lifts instead to work up to them!\n💡 Feel fr"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"DB Goblet Step Up with Knee Drive","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"C1) Lower Body Accessory - Day 1\n➡️ DB Goblet Step Up with Knee Drive: 3 sets of 8 reps each side at a 8 RPE. Superset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ KB Goblet Reverse Lunge to Knee Drive: 3 sets of 8 reps on each side at a 8 RPE. If you don't have access to a plyo box or would rather not do Step Ups, you can simply opt for these Reverse Lunge to Knee Drives instead! You can do these with a kettlebell or a dumbbell!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Isolation: Hamstrings","exercise":"2DB Romanian Deadlift","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C2) Isolation: Hamstrings\n➡️ 2DB Romanian Deadlift: 3 sets of 8 reps at a 8 RPE. Rest 60 seconds after each set before returning to C1.\nThis C1 and C2 superset hits both the front and backside of the legs - it'll lead to quite the cumulative effect!\n💡 Feel free to sub in a leg curl machine OR a hack squat/leg press machine (with your feet positioned higher to bias the hamstrings more) here if you have access to them! Perform 3 sets of 10 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 5 reps","rpe":"7","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 5 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ Glute Bridge ISO D"},{"id":"D2","label":"Core: Flexion","exercise":"Reverse Crunch off Bench","variations":["Reverse Crunch off Bench","Bench Pike Up","Bench Pike Up to Hollow Hold"],"sets_info":"3 sets of As Many Reps as Possible","rpe":"","notes":"D2) Core: Flexion\n➡️ Reverse Crunch off Bench OR Bench Pike Up OR Bench Pike Up to Hollow Hold: 3 sets of As Many Reps as Possible. Choose the variation that allows you to get around 8 reps or so! After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1-2 repetitions each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"2DB Seated Bicep Curl: Perform a set of 10 reps at a 10 RPE (to failure!) Hold on to the w","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or a lower-body finisher:\n💪 BICEPS FINISHER:\n➡️ 2DB Seated Bicep Curl: Perform a set of 10 reps at a 10 RPE (to failure!) Hold on to the weights for 10-15 seconds and try to eke out 3-5 additional partial reps under control. Do 3 total rounds with 60-90 seconds rest in between sets.\nEach week, increase by 1 set, or by 1 rep, or increase the weight on the curls!\n🔥 LOWER BODY FINISHER\n➡️ Walking Lunges OR Seated Leg Exten"}]},{"id":"W4D2","week":4,"day":2,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Plyo Push-Up Series","variations":[],"sets_info":"3 sets of 6 reps","rpe":"6","notes":"A) Power Development - Day 2\n➡️ Plyo Push-Up Series: 3 sets of 6 reps at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nChoose the option in the series that meets you where you're at! If your speed slows down  significantly by the end of 6 reps, it probably means that the variation is a bit too challenging for you!\nALTERNATIVES:\n1️⃣ MB Side Rotation Throw with Step OR MB Rebound Side Rotation Throw: 3 sets of 5 reps each side at a 5-6 RPE with 30 seconds rest between sets. If you have access to a soft"},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 8 at a 6-7 RPE","rpe":"6-7","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 8 at a 6-7 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month and did NOT max out, add about 2.5-5lbs to last week's weights, and up by 2.5-5lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n📝 If you were on RISE and DID max out, then take about 60-65% of your max weight and start there. We want this weight to feel approximately like a 7 R"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Seated Reverse Flye - Pronated","variations":["2DB Seated Reverse Flye - Pronated","Single Arm DB Rear Delt Flye - Pronated"],"sets_info":"3 sets of 10 reps (each side for the Single Arm version)","rpe":"8","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Seated Reverse Flye - Pronated OR Single Arm DB Rear Delt Flye - Pronated: 3 sets of 10 reps (each side for the Single Arm version) at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 10 reps a 8 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets of 12 at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2KB Z Press","variations":[],"sets_info":"3 sets of 8 reps","rpe":"7","notes":"C1) Upper Body Accessory - Day 2\n➡️ 2KB Z Press: 3 sets of 8 reps at a 7 RPE. Superset (alternate sets) with the C2 movement down below.\nSitting down with your legs out significantly increases the stability demands on your core and spine! Bend your knees if hamstring flexibility is holding your back! You can use kettlebells or dumbbells for this movement.\nALTERNATIVE:\n1️⃣ 2DB Seated Overhead Press: 3 sets of 10 reps  at a 8 RPE. Unlike the Z Press, this move signficantly reduces the stability demands on your core and spine, which allows you to use more weight. Neither version is \"better\" than "},{"id":"C2","label":"Row Variations - Day 2","exercise":"2KB","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C2) Row Variations - Day 2\n➡️ 2KB OR 2DB Sumo Alternating Deadstart Row with Rotation: 3 sets of 8 reps each side at a 7-8 RPE. After each set, rest 60 seconds before returning to C1.\n⭐ Try to add weight or increase by one repetition on each side each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":["BB Shoulders Elevated Hip Lift","BB Supine Glute Bridge"],"sets_info":"4 sets of 5 reps with a 1 second hold at the top","rpe":"8-9","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift OR BB Supine Glute Bridge: 3-4 sets of 5 reps with a 1 second hold at the top at a 8-9 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nLoad these up and get after it!\nALTERNATIVES:\n1️⃣ 1KB Straddle Lift OR 1.5 1KB Straddle Lift: 3 sets of 10 reps at a 7-8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for either of these Straddle Lifts instead! Focus on mind-muscle connection with the glutes as you perform this movement!\n💡 Feel free to sub "},{"id":"D2","label":"Core: Anti-Lateral Flexion","exercise":"Side Plank Series","variations":[],"sets_info":"3 sets of 30 second holds on each side","rpe":"8-9","notes":"D2) Core: Anti-Lateral Flexion\n➡️ Side Plank Series: 3 sets of 30 second holds on each side at a 8-9 RPE. Choose the variation that meets you where you're at! After each set, rest 60 seconds before returning to D1.\nALTERNATIVES:\n1️⃣ Suitcase Carry: 3 sets of 30 second carries on each side at a 8-9 RPE. You can hold onto a dumbbell or kettlebell and perform these Suitcase Carries, which are more of a dynamic stability exercise!\n⭐  Try to increade duration by 5 seconds/increase weight each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"Complex: Overhead Press, Front Squat, Row, RDL","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n➡️ Complex: Overhead Press, Front Squat, Row, RDL\n6-5-4-3-2-1 reverse ladder of this complex using barbells, dumbbells, or kettlebells.\nSo, perform 6 overhead presses, followed by 6 front squats, followed by 6 rows, and finish with 6 RDLs. Rest 30 seconds and perform the complex with 5 reps per movement and so on and so forth. Do the ladder ONE time through.\n⭐ Each week, try to add weight or add another rung to the ladder (start at 7 instead of 6!)\nAL"}]},{"id":"W4D3","week":4,"day":3,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Staggered Stance Pogo Hops","variations":["Staggered Stance Pogo Hops","Foot on Box SL High Pogo Hops"],"sets_info":"3 sets of 10-12 reps on each with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Staggered Stance Pogo Hops OR Foot on Box SL High Pogo Hops: 3 sets of 10-12 reps on each with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThe Foot on Box variation is a step up (no pun intended!) from the Staggered Stance Pogo Hops in terms of difficulty and impact."},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 5 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 5 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 71!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Upper Body Accessory - Day 3","exercise":"2DB Incline Bench Press","variations":[],"sets_info":"4 sets of 10 reps 7  RPE","rpe":"7","notes":"B2) Upper Body Accessory - Day 3\n➡️ 2DB Incline Bench Press: 3-4 sets of 10 reps 7  RPE. After each set, rest 60-120 seconds before returning to B1.\nObviously this is a tough superset in a busy gym, so feel free to split B1 and B2 up as straight sets for each movement!\n💡 Feel free to sub in a incline press machine here if you have access to one! Perform 3-4 sets of 10 reps at a 7 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"Single Leg Squat to Box","variations":[],"sets_info":"3 sets of 6-8 reps on each side","rpe":"7-8","notes":"C1) Lower Body Accessory - Day 3\n➡️ Single Leg Squat to Box: 3 sets of 6-8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ Supported Pistol Squat - Heel Elevated: 3 sets of 6-8 reps on each side at a 8 RPE. For increase range of motion, you can opt for this Pistol Squat variation!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"C2) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 10 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Bent Over Single Arm"},{"id":"D1","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 8-10 reps","rpe":"8-9","notes":"D1) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 8-10 reps. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 8-10 reps. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement will be.\n2️⃣ Nordic Hamstring Curl: 3 sets of 3-"},{"id":"D2","label":"Core: Anti-Rotation","exercise":"Deadbug with Anti-Rotation","variations":["Deadbug with Anti-Rotation","Standing Anti-Rotation Press","Angled Barbell Arcs"],"sets_info":"3 sets of 8 reps each side","rpe":"8","notes":"D2) Core: Anti-Rotation\n➡️ Deadbug with Anti-Rotation OR Standing Anti-Rotation Press OR Angled Barbell Arcs: 3 sets of 8 reps each side at a 8 RPE. Rest 60 seconds after each set before returning to D1.\nChoose from any of the Core movements above - they're technically ranked from least difficult to most difficult, but they're all fantastic options at developing anti-rotation strength.\n⭐  Try to add weight/band resistance or increase by one repetition each week!"},{"id":"E","label":"Finisher","exercise":"Single Arm DB Preacher Curl","variations":[],"sets_info":"","rpe":"10","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or cardio finisher:\n💪 BICEPS FINISHER:\n➡️ Single Arm DB Preacher Curl OR 1DB Concentration Curl: Perform a set of 8-10 reps at a 10 RPE (to failure!) Then, continue the set by performing as many assisted curls as possible where you use your free hand to help complete 3-5 more curls on the arm that just went to failure. Do 3 total rounds with 60-90 seconds rest in between sets.\nEach week, increase by 1 set, or by 1 rep, "}]},{"id":"W4D4","week":4,"day":4,"vol":71,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"Weighted Forward","variations":["Weighted Forward","Diagonal Box Step with Rotation"],"sets_info":"3 sets of 6 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 4\n➡️ Weighted Forward OR Diagonal Box Step with Rotation: 3 sets of 6 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you don't have access to a box, you can simply stride forward on the floor powerfully! The main purpose is to drive forward and create a strong rotational force.\n⭐ Try to increase by 1 repetition each week, or add weight!"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 5 at a 6 RPE","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 5 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, keep the weight the same from last week's working set"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Face Pull","variations":["Face Pull","2DB Bent Over Face Pull","TRX Face Pull"],"sets_info":"3 sets of 10 reps","rpe":"8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Face Pull OR 2DB Bent Over Face Pull OR TRX Face Pull: 3 sets of 10 reps at a 8 RPE. After each set, rest 60-120 seconds before returning to B1.\nThese are all great face pull variations - choose any of these options!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"BB Inverted Row","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8-9","notes":"C1) Row Variations\n➡️ BB Inverted Row: 3 sets of 8 reps at a 8-9 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB Renegade Row: 3 sets of 8 reps on each side at a 8 RPE. Choose this option if you'd like a little more core emphasis with your rows!\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","Pushup Slow Lower to Hand Release ISO"],"sets_info":"3 sets of as many reps as possible","rpe":"9","notes":"C2) Push Variations - Day 4\n➡️  Incline Push Up OR Push Up OR Weighted Push Up OR Pushup Slow Lower to Hand Release ISO: 3 sets of as many reps as possible. Choose the variation that allows you to get around 5 reps or so!\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ Band/Cable Crossover: 3 sets of 10 reps at a 9 RPE. If you'd rather skip pushups and do a pec isolation movement, opt for these Crossovers!\n💡 Feel free to sub in the pec deck machine if you have access to one! Get 3 sets of 10 reps at a 9 RPE :)\n⭐ Try to add weight or increase by one repetition each wee"},{"id":"D1","label":"Lower Body Accessory - Day 4","exercise":"1DB Goblet Curtsy Lunge","variations":["1DB Goblet Curtsy Lunge","Angled BB (Landmine) Leaning Curtsy Lunge"],"sets_info":"3 sets of 8 reps on each side","rpe":"7-8","notes":"D1) Lower Body Accessory - Day 4\n➡️ 1DB Goblet Curtsy Lunge OR Angled BB (Landmine) Leaning Curtsy Lunge: 3 sets of 8 reps on each side at a 7-8 RPE. Superset (alternate sets) with the D2 movement down below.\nThe Landmine version is a bit trickier to coordinate, but both are great Curtsy options!\nALTERNATIVES:\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Rotation","exercise":"Twisting Reverse Crunch Off Bench","variations":["Twisting Reverse Crunch Off Bench","Standing Horizontal Chops","Angled BB Rotations"],"sets_info":"3 sets of 6-8 reps each side","rpe":"8-9","notes":"D2) Core: Rotation\n➡️ Twisting Reverse Crunch Off Bench OR Standing Horizontal Chops OR Angled BB Rotations: 3 sets of 6-8 reps each side at a 8-9 RPE. Choose the variation that meets you where you're at - they're ordered from least difficult to most difficult!\nAfter each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 15 reps","rpe":"7-8","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 𝘣𝘪𝘤𝘦𝘱𝘴 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 DELTS AND TRICEPS:\n1️⃣ 2DB Seated Lateral Raise AND 2DB Lying Triceps Extension: Do a set of 10 Lateral Raises at a 7-8 RPE. Immediately after, drop down onto the bench/floor and perform another set of 10 Triceps Extensions. Rest 90 seconds and perform 2 more rounds. If there is a bit of a weight discrepancy between the two exercises, feel free to either grab two different sets of weights or perform more reps with the exercise that feels easier!\n⭐ Try to increase by 1-"}]},{"id":"W1D1","week":1,"day":1,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Pogo Hops","variations":[],"sets_info":"3 sets of 30-45 seconds with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Pogo Hops: 3 sets of 30-45 seconds with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nPogo hops aren't particularly challenging, but you should start to feel the calves start to burn after a while with these long duration sets! Pogos are unbelievable at building resiliency and elasticity thoughout your lower leg and are an invaluable addition to a plyometric and power program!\nALTERNATIVES:\n1️⃣ Foot on Box SL Pogo Hops: 3 sets of 30-45 seconds on each side with 30 seconds rest between"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 4 at a 7-8 RPE of ONE of the following","rpe":"7-8","notes":"B1) Squat Variations\n4 sets of 4 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. If you'd like an even greater deload, you can reduce the weight by 5-10lbs inititally, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭"},{"id":"B2","label":"Isolation: Calves","exercise":"Double or Single Leg Calf Raise off Bumper Plate","variations":[],"sets_info":"3 sets of 12 reps (8-12 reps each side if doing the single leg version)","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Double or Single Leg Calf Raise off Bumper Plate: 3 sets of 12 reps (8-12 reps each side if doing the single leg version) at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nYou can do them off one or two legs, and you can hold a weight in one hand if you'd like! Also, you can do these on bumper plates, a plyo box, an aerobic step, etc. - anything sturdy works!\n💡 Feel free to sub in a seated or standing calf raise machine here if you have access to one! Perform 3 sets of 12 at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each wee"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"2KB Rear Foot Elevated Split Squat Alt. Pick Ups","variations":["2KB Rear Foot Elevated Split Squat Alt. Pick Ups","2KB Split Squat Alt. Pick Ups"],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C1) Lower Body Accessory - Day 1\n➡️ 2KB Rear Foot Elevated Split Squat Alt. Pick Ups OR 2KB Split Squat Alt. Pick Ups: 3 sets of 8 reps each side at a 7-8 RPE. If the Rear Foot Elevated version is a bit too challenging at the moment, simply drop your back foot down and perform traditional Split Squat Alt. Pick Ups instead!\nSuperset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Rear Foot Elevated Split Squat: 3 sets of 8 reps on each side at a 7-8 RPE. If you'd rather not deal with the Alt. Pick Ups, opt for standard Rear Foot Elevated Split Squats instead!\n⭐  Try to add we"},{"id":"C2","label":"Isolation: Hamstrings","exercise":"Stability Ball Hamstring Curl Series","variations":[],"sets_info":"3 sets of 8-10 reps (on each side if opting for Single Leg versions)","rpe":"8","notes":"C2) Isolation: Hamstrings\n➡️ Stability Ball Hamstring Curl Series: 3 sets of 8-10 reps (on each side if opting for Single Leg versions) at a 8 RPE. Rest 60 seconds after each set before returning to C1.\nThis C1 and C2 superset hits both the front and backside of the legs - it'll lead to quite the cumulative effect!\nALTERNATIVES:\n1️⃣ Landmine RDL: 3 sets of 10 reps at a 8 RPE. If you have access to a Landmine attachment, you can opt for this posterior chain builder instead!\n2️⃣ 2DB Romanian Deadlift: 3 sets of 8 reps at a 8 RPE. If you'd rather opt for standard RDLs, you can choose these!\n💡 Fee"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 4 reps with a 2 second isometric hold","rpe":"7-8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4 reps with a 2 second isometric hold. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. Superset (alternate sets) with the D2 movement down below.\nALTER"},{"id":"D2","label":"Core: Flexion","exercise":"Straight Leg Sit Ups","variations":["Straight Leg Sit Ups","Hollow Hold Pullover","DB Supine Toe Touch"],"sets_info":"3 sets of 10-12 reps","rpe":"9-10","notes":"D2) Core: Flexion\n➡️ Straight Leg Sit Ups OR Hollow Hold Pullover OR DB Supine Toe Touch: 3 sets of 10-12 reps at a 9-10 RPE. Start with the variation that works best for you today. These are listed from more accessible to more advanced options. After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1-2 repetitions each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"2DB Bicep Curls - \"Myo-Reps\": Grab a pair of weights that you can curl 12-15x. Curl the we","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or a lower-body finisher:\n💪 BICEPS FINISHER:\n➡️ 2DB Bicep Curls - \"Myo-Reps\": Grab a pair of weights that you can curl 12-15x. Curl the weight close to failure, but leave 1-2 reps in the tank.\nRest 15 seconds and then perform 3-5 more full curls (you can use momentum!) Rest 15 seconds and go again. Keep doing more of these mini-sets until you can no longer complete 3 full curls (usually around 3-4 rounds.)\nYou can place"}]},{"id":"W1D2","week":1,"day":2,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Single Arm DB","variations":["Single Arm DB","KB Snatch"],"sets_info":"3 sets of 5 reps each side","rpe":"6","notes":"A) Power Development - Day 2\n➡️ Single Arm DB OR KB Snatch: 3 sets of 5 reps each side at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you're new to DB/KB Snatches, start on the lighter side and progress slowly! Even if you are experienced with them, we still want to conserve energy for the pressing coming up later in the workout!\nALTERNATIVES:\n1️⃣ MB Chest Pass Floor Slams: 3 sets of 6 reps at a 7 RPE with 30 seconds rest between sets. If you have access to a soft medicine ball, you can try out "},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 6 at a 6-7 RPE","rpe":"6-7","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 6 at a 6-7 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 2.5-5lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 72!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Bent Over","variations":["2DB Bent Over","Incline Bench Supported 45 Degree Reverse Flyes"],"sets_info":"3 sets of 12 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Bent Over OR Incline Bench Supported 45 Degree Reverse Flyes: 3 sets of 12 reps at a 8-9 RPE. Both of these work the same muscle groups, except the Incline Bench version obviously offers more support and therefore offers less stability benefits.\nAfter each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps a 8-9 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets o"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Seated Alternating Overhead Press","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C1) Upper Body Accessory - Day 2\n➡️  2DB Seated Alternating Overhead Press: 3 sets of 8 reps each side at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVE:\n1️⃣ Open 1/2 Kneel KB Press to Windmill: 3 sets of 6 reps each side at a 7-8 RPE. If you're looking for more of a functional shoulder movement, look no further than these Press to Windmills! You can use kettlebells or dumbbells for this maneuver.\n💡 Feel free to sub in any shoulder press machine here if you have access to one! Perform 3 sets of 8 at a 7-8 RPE :)\n⭐ Try to add weight or increase by one repetiti"},{"id":"C2","label":"Row Variations - Day 2","exercise":"Single Arm DB Meadows Row","variations":["Single Arm DB Meadows Row","Angled BB Meadows Row"],"sets_info":"3 sets of 10 reps each side","rpe":"7","notes":"C2) Row Variations - Day 2\n➡️ Single Arm DB Meadows Row OR Angled BB Meadows Row: 3 sets of 10 reps each side at a 7 RPE. After each set, rest 60 seconds before returning to C1.\nThe Meadows Row offers a lot of range of motion in a very wide stable position. It's excellent for developing back strength!\n⭐ Try to add weight or increase by one repetition on each side each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":["BB Shoulders Elevated Hip Lift","BB Supine Glute Bridge"],"sets_info":"4 sets of 10 reps","rpe":"7-8","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift OR BB Supine Glute Bridge: 3-4 sets of 10 reps at a 7-8 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nLoad these up and get after it!\nALTERNATIVES:\n1️⃣ 2DB Slider Reverse Lunge OR 2DB Long Staggered Stance RDL: 3 sets of 8 reps on each side at a 7-8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for either of these hip dominant single leg movements instead! Focus on mind-muscle connection with the glutes as you perform these movements!\n💡 "},{"id":"D2","label":"Core: Anti-Rotation","exercise":"Stability Ball Stir the Pot","variations":["Stability Ball Stir the Pot","Band/Cable Anti-Rotation Press with Rotation","Tall Plank KB Drag"],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"D2) Core: Anti-Rotation\n➡️ Stability Ball Stir the Pot OR Band/Cable Anti-Rotation Press with Rotation OR Tall Plank KB Drag: 3 sets of 8 reps on each side at a 8 RPE. Choose the option that feels best for you today!\nThey're not in any particular order so we'd recommend trying them all out in your first week! After each set, rest 60 seconds before returning to D1.\n⭐ Try to add increase by one repetition per side each week!"},{"id":"E","label":"Finisher","exercise":"Complex: Deadlift (3x), Hang Clean (3x), Thruster (3x), Front Rack Alt. Reverse Lunge (2 e","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n3 Rounds with 90 seconds rest in between rounds. Start with a weight you can strict press 5 times and adjust accordingly as needed.\n➡️ Complex: Deadlift (3x), Hang Clean (3x), Thruster (3x), Front Rack Alt. Reverse Lunge (2 each side)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an addi"}]},{"id":"W1D3","week":1,"day":3,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Weighted Pop Out to Lunge","variations":["Weighted Pop Out to Lunge","Weighted Split Squat Drop Downs"],"sets_info":"3 sets of 6 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Weighted Pop Out to Lunge OR Weighted Split Squat Drop Downs: 3 sets of 6 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThe Pop Out to Lunge creates more impact on the knees since you're leaving the floor. Whichever one you choose, make sure you drop down as quickly as you can in order to ehance your ability to decelerate, which is crucial for injury prevention and athleticism!\n⭐ Progress by adding an extra repetition per side each week!"},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 4 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 4 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. If you'd like an even greater deload, you can reduce the weight by 5-10lbs inititally, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 72!\n⭐ Try to add weight or increase by one repetitio"},{"id":"B2","label":"Upper Body Accessory - Day 3","exercise":"2DB Incline Bench Press","variations":[],"sets_info":"4 sets of 8 reps on each side","rpe":"8","notes":"B2) Upper Body Accessory - Day 3\n➡️ 2DB Incline Bench Press: 3-4 sets of 8 reps on each side at a 7  RPE. After each set, rest 60-120 seconds before returning to B1.\nObviously this is a tough superset in a busy gym, so feel free to split B1 and B2 up as straight sets for each movement!\nALTERNATIVES:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Elevator Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 5 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in a incline press machine h"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Split Squat ISO","variations":[],"sets_info":"3 sets of 6 reps on each side with a 5 second hold","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Split Squat ISO: 3 sets of 6 reps on each side with a 5 second hold at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nThe shorter the stride, the more quad - feel free to adjust your stance accordingly. These will burn!\nALTERNATIVES:\n1️⃣ Supported Pistol Squat - Heel Elevated: 3 sets of 6 reps on each side at a 8 RPE. If you're looking to improve your Pistol Squat game, opt for these instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C2) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ 1/2 Kneeling Band/Cab"},{"id":"D1","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 8 reps with a 5 second slow lower","rpe":"8-9","notes":"D1) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 8 reps with a 5 second slow lower. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 8 reps with a 5 second slow lower. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement "},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Weighted Front Plank","Stability Ball Rollout","Ab Wheel Rollout"],"sets_info":"","rpe":"","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Weighted Front Plank OR Stability Ball Rollout OR Ab Wheel Rollout: 3 sets of 30-40 seconds for the Plank variations or 8-10 reps for the Rollout variations. Rest 60 seconds after each set before returning to D1.\nChoose from any of the Core movements above - they're technically ranked from least difficult to most difficult, but they're all fantastic options at developing anti-extension strength.\n⭐  Try to add weight/band resistance or increase by one repetition each week!"},{"id":"E","label":"Finisher","exercise":"Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill (1","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a kettlebell chain or biceps finisher:\n🔥 KB/DB CHAIN FINISHER:\n➡️ Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill (1x)\nThat's one rep on one side.\nPerform 3 reps in a row without setting the weight down. Then switch sides for an additional 3 reps.\nThat's one set.\nPerform 3 total sets with 60 seconds rest in between sets.\nYou can choose between kettlebells or dumbbells!\n⭐ Each week, try to "}]},{"id":"W1D4","week":1,"day":4,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"KB Swing","variations":["KB Swing","1KB Sidestep Swing","Single Arm KB Lateral Step Out Swing"],"sets_info":"","rpe":"","notes":"A) Power Development - Day 4\n➡️ KB Swing OR 1KB Sidestep Swing OR Single Arm KB Lateral Step Out Swing: 3 sets of 8 reps (6 on each side for the Sidestep and Step Out variations) with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese exercises are ordered from least complex to most complex so choose the option that meets you where you're at!\n⭐ Try to increase by 1 repetition each week, or add weight!"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 10","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 10 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 10 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight from last week's working set weight"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":["Single Arm Band/Cable Reverse Flye","3 Point Single Arm Reverse Flye"],"sets_info":"3 sets of 12 reps on each side","rpe":"7-8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye OR 3 Point Single Arm Reverse Flye: 3 sets of 12 reps on each side at a 7-8 RPE. After each set, rest 60-120 seconds before returning to B1.\nIf you don't have access to a solid band/cable setup, then simply opt for the 3 Point version!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"BB Deadstart Row","variations":[],"sets_info":"3 sets of 8 reps","rpe":"7-8","notes":"C1) Row Variations\n➡️ BB Deadstart Row: 3 sets of 8 reps at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB Bent Over Row: 3 sets of 8 reps at a 7-8 RPE. If the start-stop nature of the Deadstart Row isn't your jam, you can perform standard Bent Over Rows instead!\n💡 Feel free to sub in a chest supported row machine if you have access to one! Get 3 sets of 8 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","1.5 Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"8-9","notes":"C2) Push Variations - Day 4\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR 1.5 Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 12 reps or so!\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ 2DB Bench Flyes: 3 sets of 12 reps at a 8-9 RPE. If you'd rather skip pushups and do a pec isolation movement, opt for these Flyes instead!\n💡 Feel free to sub in the pec deck machine if you have access to one! Get 3 sets of 12 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Lower Body Accessory - Day 4","exercise":"1KB Goblet Lateral Lunge","variations":["1KB Goblet Lateral Lunge","1DB Goblet Sliding Lateral Lunge"],"sets_info":"3 sets of 8 reps on each side","rpe":"7","notes":"D1) Lower Body Accessory - Day 4\n➡️ 1KB Goblet Lateral Lunge OR 1DB Goblet Sliding Lateral Lunge: 3 sets of 8 reps on each side at a 7 RPE. Superset (alternate sets) with the D2 movement down below.\nThe Sliding Lateral Lunge is a more advanced variation compared to the standard version, so choose the option that feels best for your current strength and control!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Lateral Flexion","exercise":"Side Plank Series","variations":["Side Plank Series","Suitcase/Overhead Carry","Fulcrum Deadlift"],"sets_info":"3 sets of 30 seconds on each side (6 reps per side for the Fulcrum Deadlifts)","rpe":"8","notes":"D2) Core: Anti-Lateral Flexion\n➡️ Side Plank Series OR Suitcase/Overhead Carry OR Fulcrum
