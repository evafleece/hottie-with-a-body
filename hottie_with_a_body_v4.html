 Deadlift: 3 sets of 30 seconds on each side (6 reps per side for the Fulcrum Deadlifts) at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nThey're not in any particular order so we'd recommend trying them all out in your first week! After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 12 reps","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 triceps 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 TRICEPS:\n1️⃣ Standing Single Arm Band/Cable Upright Triceps Kickback OR Single Arm DB Triceps Kickback: Do a set of 12 reps on each side at a 9-10 RPE. Then, rest 60 seconds and perform a set to failure. Rest 60 seconds again, and perform another set to failure. By the third set, it's okay if you're only getting 6-8 reps!\n⭐ Try to increase by repetitions or increase weight each week!\n🍑 For glutes, try this out:\n2️⃣ Band/Cable 45 Degree Glute Kickbacks OR Quadruped Sin"}]},{"id":"W2D1","week":2,"day":1,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 1","exercise":"Pogo Hops","variations":[],"sets_info":"3 sets of 30-45 seconds with 30 seconds rest between sets","rpe":"","notes":"A) Power Development - Day 1\n➡️ Pogo Hops: 3 sets of 30-45 seconds with 30 seconds rest between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nPogo hops aren't particularly challenging, but you should start to feel the calves start to burn after a while with these long duration sets! Pogos are unbelievable at building resiliency and elasticity thoughout your lower leg and are an invaluable addition to a plyometric and power program!\nALTERNATIVES:\n1️⃣ Foot on Box SL Pogo Hops: 3 sets of 30-45 seconds on each side with 30 seconds rest between"},{"id":"B1","label":"Squat Variations","exercise":"Squat Variations","variations":["BB High Bar/Low Bar Back Squat","BB Front Squat","KB OR DB Goblet Squat","BB Reverse Lunge"],"sets_info":"4 sets of 4 at a 7-8 RPE of ONE of the following","rpe":"7-8","notes":"B1) Squat Variations\n4 sets of 4 at a 7-8 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB High Bar/Low Bar Back Squat\n2️⃣ BB Front Squat\n3️⃣ KB OR DB Goblet Squat\n4️⃣ BB Reverse Lunge (perform the prescribed number of sets and reps on each side)\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. If you'd like an even greater deload, you can reduce the weight by 5-10lbs inititally, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭"},{"id":"B2","label":"Isolation: Calves","exercise":"Double or Single Leg Calf Raise off Bumper Plate","variations":[],"sets_info":"3 sets of 12 reps (8-12 reps each side if doing the single leg version)","rpe":"8-9","notes":"B2) Isolation: Calves\n➡️ Double or Single Leg Calf Raise off Bumper Plate: 3 sets of 12 reps (8-12 reps each side if doing the single leg version) at a 8-9 RPE. After each set, rest 60-120 seconds before returning to B1.\nYou can do them off one or two legs, and you can hold a weight in one hand if you'd like! Also, you can do these on bumper plates, a plyo box, an aerobic step, etc. - anything sturdy works!\n💡 Feel free to sub in a seated or standing calf raise machine here if you have access to one! Perform 3 sets of 12 at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each wee"},{"id":"C1","label":"Lower Body Accessory - Day 1","exercise":"2KB Rear Foot Elevated Split Squat Alt. Pick Ups","variations":["2KB Rear Foot Elevated Split Squat Alt. Pick Ups","2KB Split Squat Alt. Pick Ups"],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C1) Lower Body Accessory - Day 1\n➡️ 2KB Rear Foot Elevated Split Squat Alt. Pick Ups OR 2KB Split Squat Alt. Pick Ups: 3 sets of 8 reps each side at a 7-8 RPE. If the Rear Foot Elevated version is a bit too challenging at the moment, simply drop your back foot down and perform traditional Split Squat Alt. Pick Ups instead!\nSuperset (alternate sets) with the C2 movement below.\nALTERNATIVES:\n1️⃣ 2DB Rear Foot Elevated Split Squat: 3 sets of 8 reps on each side at a 7-8 RPE. If you'd rather not deal with the Alt. Pick Ups, opt for standard Rear Foot Elevated Split Squats instead!\n⭐  Try to add we"},{"id":"C2","label":"Isolation: Hamstrings","exercise":"Stability Ball Hamstring Curl Series","variations":[],"sets_info":"3 sets of 8-10 reps (on each side if opting for Single Leg versions)","rpe":"8","notes":"C2) Isolation: Hamstrings\n➡️ Stability Ball Hamstring Curl Series: 3 sets of 8-10 reps (on each side if opting for Single Leg versions) at a 8 RPE. Rest 60 seconds after each set before returning to C1.\nThis C1 and C2 superset hits both the front and backside of the legs - it'll lead to quite the cumulative effect!\nALTERNATIVES:\n1️⃣ Landmine RDL: 3 sets of 10 reps at a 8 RPE. If you have access to a Landmine attachment, you can opt for this posterior chain builder instead!\n2️⃣ 2DB Romanian Deadlift: 3 sets of 8 reps at a 8 RPE. If you'd rather opt for standard RDLs, you can choose these!\n💡 Fee"},{"id":"D1","label":"Pull Variations - Day 1","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 4 reps with a 2 second isometric hold","rpe":"7-8","notes":"D1) Pull Variations - Day 1\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 4 reps with a 2 second isometric hold. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. Superset (alternate sets) with the D2 movement down below.\nALTER"},{"id":"D2","label":"Core: Flexion","exercise":"Straight Leg Sit Ups","variations":["Straight Leg Sit Ups","Hollow Hold Pullover","DB Supine Toe Touch"],"sets_info":"3 sets of 10-12 reps","rpe":"9-10","notes":"D2) Core: Flexion\n➡️ Straight Leg Sit Ups OR Hollow Hold Pullover OR DB Supine Toe Touch: 3 sets of 10-12 reps at a 9-10 RPE. Start with the variation that works best for you today. These are listed from more accessible to more advanced options. After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1-2 repetitions each week to progressively overload!"},{"id":"E","label":"Finisher","exercise":"2DB Bicep Curls - \"Myo-Reps\": Grab a pair of weights that you can curl 12-15x. Curl the we","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a biceps or a lower-body finisher:\n💪 BICEPS FINISHER:\n➡️ 2DB Bicep Curls - \"Myo-Reps\": Grab a pair of weights that you can curl 12-15x. Curl the weight close to failure, but leave 1-2 reps in the tank.\nRest 15 seconds and then perform 3-5 more full curls (you can use momentum!) Rest 15 seconds and go again. Keep doing more of these mini-sets until you can no longer complete 3 full curls (usually around 3-4 rounds.)\nYou can place"}]},{"id":"W2D2","week":2,"day":2,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 2","exercise":"Single Arm DB","variations":["Single Arm DB","KB Snatch"],"sets_info":"3 sets of 5 reps each side","rpe":"6","notes":"A) Power Development - Day 2\n➡️ Single Arm DB OR KB Snatch: 3 sets of 5 reps each side at a 6 RPE with 45 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nIf you're new to DB/KB Snatches, start on the lighter side and progress slowly! Even if you are experienced with them, we still want to conserve energy for the pressing coming up later in the workout!\nALTERNATIVES:\n1️⃣ MB Chest Pass Floor Slams: 3 sets of 6 reps at a 7 RPE with 30 seconds rest between sets. If you have access to a soft medicine ball, you can try out "},{"id":"B1","label":"BB Bench Press","exercise":"BB Bench Press","variations":[],"sets_info":"4 sets of 6 at a 6-7 RPE","rpe":"6-7","notes":"B1) BB Bench Press\n➡️ BB Bench Press: 4 sets of 6 at a 6-7 RPE. Superset (alternate sets) with the B2 movement down below.\nIf barbell bench presses bother your shoulders, then do them with dumbbells instead for a more shoulder-friendly alternative!\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 2.5-5lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 72!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"B2","label":"Isolation: Rear Delts","exercise":"2DB Bent Over","variations":["2DB Bent Over","Incline Bench Supported 45 Degree Reverse Flyes"],"sets_info":"3 sets of 12 reps","rpe":"8-9","notes":"B2) Isolation: Rear Delts\n➡️ 2DB Bent Over OR Incline Bench Supported 45 Degree Reverse Flyes: 3 sets of 12 reps at a 8-9 RPE. Both of these work the same muscle groups, except the Incline Bench version obviously offers more support and therefore offers less stability benefits.\nAfter each set, rest 60-120 seconds before returning to B1.\nALTERNATIVES:\n1️⃣ TRX Reverse Flye: 3 sets of 12 reps a 8-9 RPE. If you have access to a TRX and would like to use it, you can opt for these Reverse Flyes instead!\n💡 Feel free to sub in a reverse pec deck machine here if you have access to one! Perform 3 sets o"},{"id":"C1","label":"Upper Body Accessory - Day 2","exercise":"2DB Seated Alternating Overhead Press","variations":[],"sets_info":"3 sets of 8 reps each side","rpe":"7-8","notes":"C1) Upper Body Accessory - Day 2\n➡️  2DB Seated Alternating Overhead Press: 3 sets of 8 reps each side at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVE:\n1️⃣ Open 1/2 Kneel KB Press to Windmill: 3 sets of 6 reps each side at a 7-8 RPE. If you're looking for more of a functional shoulder movement, look no further than these Press to Windmills! You can use kettlebells or dumbbells for this maneuver.\n💡 Feel free to sub in any shoulder press machine here if you have access to one! Perform 3 sets of 8 at a 7-8 RPE :)\n⭐ Try to add weight or increase by one repetiti"},{"id":"C2","label":"Row Variations - Day 2","exercise":"Single Arm DB Meadows Row","variations":["Single Arm DB Meadows Row","Angled BB Meadows Row"],"sets_info":"3 sets of 10 reps each side","rpe":"7","notes":"C2) Row Variations - Day 2\n➡️ Single Arm DB Meadows Row OR Angled BB Meadows Row: 3 sets of 10 reps each side at a 7 RPE. After each set, rest 60 seconds before returning to C1.\nThe Meadows Row offers a lot of range of motion in a very wide stable position. It's excellent for developing back strength!\n⭐ Try to add weight or increase by one repetition on each side each week!"},{"id":"D1","label":"Lower Body Accessory - Day 2","exercise":"BB Shoulders Elevated Hip Lift","variations":["BB Shoulders Elevated Hip Lift","BB Supine Glute Bridge"],"sets_info":"4 sets of 10 reps","rpe":"7-8","notes":"D1) Lower Body Accessory - Day 2\n➡️ BB Shoulders Elevated Hip Lift OR BB Supine Glute Bridge: 3-4 sets of 10 reps at a 7-8 RPE. Opt for 4 sets if you're looking for additional glute volume! Superset (alternate sets) with the D2 movement down below.\nLoad these up and get after it!\nALTERNATIVES:\n1️⃣ 2DB Slider Reverse Lunge OR 2DB Long Staggered Stance RDL: 3 sets of 8 reps on each side at a 7-8 RPE. If Hip Lifts/Glute Bridges aren't your jam, then opt for either of these hip dominant single leg movements instead! Focus on mind-muscle connection with the glutes as you perform these movements!\n💡 "},{"id":"D2","label":"Core: Anti-Rotation","exercise":"Stability Ball Stir the Pot","variations":["Stability Ball Stir the Pot","Band/Cable Anti-Rotation Press with Rotation","Tall Plank KB Drag"],"sets_info":"3 sets of 8 reps on each side","rpe":"8","notes":"D2) Core: Anti-Rotation\n➡️ Stability Ball Stir the Pot OR Band/Cable Anti-Rotation Press with Rotation OR Tall Plank KB Drag: 3 sets of 8 reps on each side at a 8 RPE. Choose the option that feels best for you today!\nThey're not in any particular order so we'd recommend trying them all out in your first week! After each set, rest 60 seconds before returning to D1.\n⭐ Try to add increase by one repetition per side each week!"},{"id":"E","label":"Finisher","exercise":"Complex: Deadlift (3x), Hang Clean (3x), Thruster (3x), Front Rack Alt. Reverse Lunge (2 e","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\n3 Rounds with 90 seconds rest in between rounds. Start with a weight you can strict press 5 times and adjust accordingly as needed.\n➡️ Complex: Deadlift (3x), Hang Clean (3x), Thruster (3x), Front Rack Alt. Reverse Lunge (2 each side)\nPerform all reps of a given movement before moving on to the next. You can use a barbell, dumbbells or kettlebells for this complex.\n⭐ Each week, try to add weight, increase by one repetition per movement, or add an addi"}]},{"id":"W2D3","week":2,"day":3,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 3","exercise":"Weighted Pop Out to Lunge","variations":["Weighted Pop Out to Lunge","Weighted Split Squat Drop Downs"],"sets_info":"3 sets of 6 reps on each side with 30 seconds rest in between sets","rpe":"","notes":"A) Power Development - Day 3\n➡️ Weighted Pop Out to Lunge OR Weighted Split Squat Drop Downs: 3 sets of 6 reps on each side with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThe Pop Out to Lunge creates more impact on the knees since you're leaving the floor. Whichever one you choose, make sure you drop down as quickly as you can in order to ehance your ability to decelerate, which is crucial for injury prevention and athleticism!\n⭐ Progress by adding an extra repetition per side each week!"},{"id":"B1","label":"Deadlift Variations","exercise":"Deadlift Variations","variations":["BB Conventional Deadlift","BB Sumo Deadlift","Trap Bar Deadlift"],"sets_info":"4 sets of 4 at a 6 RPE of ONE of the following","rpe":"6","notes":"B1) Deadlift Variations\n4 sets of 4 at a 6 RPE of ONE of the following. Superset (alternate sets) with the B2 movement down below:\n1️⃣ BB Conventional Deadlift\n2️⃣ BB Sumo Deadlift\n3️⃣ Trap Bar Deadlift\n📝 If you were on RISE last month, keep the weight the same from last week's working set weights, and then increase by 5-10lbs each week thereafter. If you'd like an even greater deload, you can reduce the weight by 5-10lbs inititally, and then increase by 5-10lbs each week thereafter. 𝘛𝘩𝘪𝘴 𝘯𝘰𝘵𝘦 𝘪𝘴 𝘰𝘯𝘭𝘺 𝘳𝘦𝘭𝘦𝘷𝘢𝘯𝘵 𝘧𝘰𝘳 𝘺𝘰𝘶𝘳 *𝘧𝘪𝘳𝘴𝘵* 𝘸𝘦𝘦𝘬 𝘰𝘯 𝘝𝘰𝘭𝘶𝘮𝘦 72!\n⭐ Try to add weight or increase by one repetitio"},{"id":"B2","label":"Upper Body Accessory - Day 3","exercise":"2DB Incline Bench Press","variations":[],"sets_info":"4 sets of 8 reps on each side","rpe":"8","notes":"B2) Upper Body Accessory - Day 3\n➡️ 2DB Incline Bench Press: 3-4 sets of 8 reps on each side at a 7  RPE. After each set, rest 60-120 seconds before returning to B1.\nObviously this is a tough superset in a busy gym, so feel free to split B1 and B2 up as straight sets for each movement!\nALTERNATIVES:\n1️⃣ Kneeling/Incline Push Up OR Push Up OR Weighted Push Up OR Elevator Push Up: 3 sets of as many reps as possible. Choose the variation that allows you to get around 5 reps or so! Choose this option if you're looking to strengthen your push up game!\n💡 Feel free to sub in a incline press machine h"},{"id":"C1","label":"Lower Body Accessory - Day 3","exercise":"2DB Split Squat ISO","variations":[],"sets_info":"3 sets of 6 reps on each side with a 5 second hold","rpe":"8","notes":"C1) Lower Body Accessory - Day 3\n➡️ 2DB Split Squat ISO: 3 sets of 6 reps on each side with a 5 second hold at a 8 RPE. Superset (alternate sets) with the C2 movement down below.\nThe shorter the stride, the more quad - feel free to adjust your stance accordingly. These will burn!\nALTERNATIVES:\n1️⃣ Supported Pistol Squat - Heel Elevated: 3 sets of 6 reps on each side at a 8 RPE. If you're looking to improve your Pistol Squat game, opt for these instead!\n⭐  Try to add weight or increase by one repetition each week!"},{"id":"C2","label":"Pull Variations - Day 3","exercise":"Band Assisted/Unassisted Pull-Ups","variations":[],"sets_info":"3 sets of 8 reps","rpe":"8","notes":"C2) Pull Variations - Day 3\n[𝘐𝘧 𝘺𝘰𝘶'𝘳𝘦 𝘭𝘰𝘰𝘬𝘪𝘯𝘨 𝘵𝘰 𝘸𝘰𝘳𝘬 𝘰𝘯 𝘺𝘰𝘶𝘳 𝘣𝘢𝘤𝘬 𝘸𝘪𝘵𝘩𝘰𝘶𝘵 𝘥𝘰𝘪𝘯𝘨 𝘱𝘶𝘭𝘭-𝘶𝘱𝘴, 𝘴𝘤𝘳𝘰𝘭𝘭 𝘥𝘰𝘸𝘯 𝘵𝘰 𝘵𝘩𝘦 \"𝘢𝘭𝘵𝘦𝘳𝘯𝘢𝘵𝘪𝘷𝘦𝘴\" 𝘴𝘦𝘤𝘵𝘪𝘰𝘯 𝘪𝘯 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵!]\n➡️ Band Assisted/Unassisted Pull-Ups: 3 sets of 8 reps. If using band assistance, use an appropriately sized band so that you're always leaving 2 reps in the tank at the end of each set. Do 4 sets in Weeks 2 and 3, and then deload back down to 3 sets in Week 4.\nYou can also do these with a weight if you're able to add additional load to your pullups. After each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ 1/2 Kneeling Band/Cab"},{"id":"D1","label":"Isolation: Hamstrings","exercise":"Stability Ball","variations":["Stability Ball","Slider Hamstring Curl Series"],"sets_info":"3 sets of 8 reps with a 5 second slow lower","rpe":"8-9","notes":"D1) Isolation: Hamstrings\n➡️ Stability Ball OR Slider Hamstring Curl Series: 3 sets of 8 reps with a 5 second slow lower. Choose from ONE of the options in either of these series. The Slider is a bit more challenging than the Stability Ball due to the increased amount of friction. Superset (alternate sets) with the D2 movement down below.\nALTERNATIVES:\n1️⃣ TRX Hamstring Curl: 3 sets of 8 reps with a 5 second slow lower. If you have access to a TRX and would like to use it, these TRX Hamstring Curls are absolutely brutal! The further away you are from the anchor point, the tougher the movement "},{"id":"D2","label":"Core: Anti-Extension","exercise":"Front Plank","variations":["Front Plank","Weighted Front Plank","Stability Ball Rollout","Ab Wheel Rollout"],"sets_info":"","rpe":"","notes":"D2) Core: Anti-Extension\n➡️ Front Plank OR Weighted Front Plank OR Stability Ball Rollout OR Ab Wheel Rollout: 3 sets of 30-40 seconds for the Plank variations or 8-10 reps for the Rollout variations. Rest 60 seconds after each set before returning to D1.\nChoose from any of the Core movements above - they're technically ranked from least difficult to most difficult, but they're all fantastic options at developing anti-extension strength.\n⭐  Try to add weight/band resistance or increase by one repetition each week!"},{"id":"E","label":"Finisher","exercise":"Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill (1","variations":[],"sets_info":"","rpe":"","notes":"E) Finisher\n[𝘛𝘩𝘦 𝘌 𝘴𝘦𝘨𝘮𝘦𝘯𝘵 𝘪𝘴 𝘢 \"𝘧𝘪𝘯𝘪𝘴𝘩𝘦𝘳.\" 𝘐𝘵 𝘪𝘴 𝘰𝘱𝘵𝘪𝘰𝘯𝘢𝘭 - 𝘥𝘰 𝘵𝘩𝘦𝘴𝘦 𝘪𝘧 𝘺𝘰𝘶 𝘩𝘢𝘷𝘦 𝘵𝘪𝘮𝘦 𝘢𝘯𝘥 𝘦𝘯𝘦𝘳𝘨𝘺 𝘵𝘰 𝘤𝘢𝘱 𝘰𝘧𝘧 𝘺𝘰𝘶𝘳 𝘸𝘰𝘳𝘬𝘰𝘶𝘵 𝘸𝘪𝘵𝘩 𝘢 𝘤𝘩𝘦𝘳𝘳𝘺 𝘰𝘯 𝘵𝘰𝘱!]\nYou can choose between a kettlebell chain or biceps finisher:\n🔥 KB/DB CHAIN FINISHER:\n➡️ Chain: Single Arm Swing (1x), Single Arm Clean (1x), Single Arm Thruster (1x), Windmill (1x)\nThat's one rep on one side.\nPerform 3 reps in a row without setting the weight down. Then switch sides for an additional 3 reps.\nThat's one set.\nPerform 3 total sets with 60 seconds rest in between sets.\nYou can choose between kettlebells or dumbbells!\n⭐ Each week, try to "}]},{"id":"W2D4","week":2,"day":4,"vol":72,"sections":[{"id":"A","label":"Power Development - Day 4","exercise":"KB Swing","variations":["KB Swing","1KB Sidestep Swing","Single Arm KB Lateral Step Out Swing"],"sets_info":"","rpe":"","notes":"A) Power Development - Day 4\n➡️ KB Swing OR 1KB Sidestep Swing OR Single Arm KB Lateral Step Out Swing: 3 sets of 8 reps (6 on each side for the Sidestep and Step Out variations) with 30 seconds rest in between sets. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘯𝘰𝘵 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵. 𝘊𝘰𝘮𝘱𝘭𝘦𝘵𝘦 𝘢𝘭𝘭 𝘴𝘦𝘵𝘴 𝘣𝘦𝘧𝘰𝘳𝘦 𝘮𝘰𝘷𝘪𝘯𝘨 𝘰𝘯 𝘵𝘰 𝘵𝘩𝘦 𝘉 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵.\nThese exercises are ordered from least complex to most complex so choose the option that meets you where you're at!\n⭐ Try to increase by 1 repetition each week, or add weight!"},{"id":"B1","label":"Overhead Press Variations","exercise":"BB Military Press","variations":[],"sets_info":"4 sets of 10","rpe":"6","notes":"B1) Overhead Press Variations\n➡️ BB Military Press: 4 sets of 10 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells! Superset (alternate sets) with the B2 movement down below.\nALTERNATIVES:\n1️⃣ BB Push Press: 4 sets of 10 at a 6 RPE. You can perform these with a barbell or dumbbells/kettlebells!\nIf you're experienced with overhead pressing and would like to challenge your overhead strength with more weight than you can handle with a strict press, then opt for these Push Presses instead.\n📝 If you were on RISE last month, decrease weight from last week's working set weight"},{"id":"B2","label":"Isolation: Rear Delts/Rotator Cuff","exercise":"Single Arm Band/Cable Reverse Flye","variations":["Single Arm Band/Cable Reverse Flye","3 Point Single Arm Reverse Flye"],"sets_info":"3 sets of 12 reps on each side","rpe":"7-8","notes":"B2) Isolation: Rear Delts/Rotator Cuff\n➡️ Single Arm Band/Cable Reverse Flye OR 3 Point Single Arm Reverse Flye: 3 sets of 12 reps on each side at a 7-8 RPE. After each set, rest 60-120 seconds before returning to B1.\nIf you don't have access to a solid band/cable setup, then simply opt for the 3 Point version!\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"C1","label":"Row Variations","exercise":"BB Deadstart Row","variations":[],"sets_info":"3 sets of 8 reps","rpe":"7-8","notes":"C1) Row Variations\n➡️ BB Deadstart Row: 3 sets of 8 reps at a 7-8 RPE. Superset (alternate sets) with the C2 movement down below.\nALTERNATIVES:\n1️⃣ 2DB Bent Over Row: 3 sets of 8 reps at a 7-8 RPE. If the start-stop nature of the Deadstart Row isn't your jam, you can perform standard Bent Over Rows instead!\n💡 Feel free to sub in a chest supported row machine if you have access to one! Get 3 sets of 8 reps at a 8 RPE :)\n⭐ Try to add weight or increase by one repetition per week!"},{"id":"C2","label":"Push Variations - Day 4","exercise":"Incline Push Up","variations":["Incline Push Up","Push Up","Weighted Push Up","1.5 Push Ups"],"sets_info":"3 sets of as many reps as possible","rpe":"8-9","notes":"C2) Push Variations - Day 4\n➡️ Incline Push Up OR Push Up OR Weighted Push Up OR 1.5 Push Ups: 3 sets of as many reps as possible. Choose the variation that allows you to get around 12 reps or so!\nAfter each set, rest 60 seconds before returning to C1.\nALTERNATIVES:\n1️⃣ 2DB Bench Flyes: 3 sets of 12 reps at a 8-9 RPE. If you'd rather skip pushups and do a pec isolation movement, opt for these Flyes instead!\n💡 Feel free to sub in the pec deck machine if you have access to one! Get 3 sets of 12 reps at a 8-9 RPE :)\n⭐ Try to add weight or increase by one repetition each week!"},{"id":"D1","label":"Lower Body Accessory - Day 4","exercise":"1KB Goblet Lateral Lunge","variations":["1KB Goblet Lateral Lunge","1DB Goblet Sliding Lateral Lunge"],"sets_info":"3 sets of 8 reps on each side","rpe":"7","notes":"D1) Lower Body Accessory - Day 4\n➡️ 1KB Goblet Lateral Lunge OR 1DB Goblet Sliding Lateral Lunge: 3 sets of 8 reps on each side at a 7 RPE. Superset (alternate sets) with the D2 movement down below.\nThe Sliding Lateral Lunge is a more advanced variation compared to the standard version, so choose the option that feels best for your current strength and control!\n⭐  Try to add weight or increase by one repetition per week!"},{"id":"D2","label":"Core: Anti-Lateral Flexion","exercise":"Side Plank Series","variations":["Side Plank Series","Suitcase/Overhead Carry","Fulcrum Deadlift"],"sets_info":"3 sets of 30 seconds on each side (6 reps per side for the Fulcrum Deadlifts)","rpe":"8","notes":"D2) Core: Anti-Lateral Flexion\n➡️ Side Plank Series OR Suitcase/Overhead Carry OR Fulcrum Deadlift: 3 sets of 30 seconds on each side (6 reps per side for the Fulcrum Deadlifts) at a 8 RPE. After each set, rest 60 seconds before returning to D1.\nThey're not in any particular order so we'd recommend trying them all out in your first week! After each set, rest 60 seconds before returning to D1.\n⭐ Try to increase by 1 repetition each week, or choose a harder variation!"},{"id":"E","label":"PUMP Segment","exercise":"PUMP Segment","variations":[],"sets_info":"3 sets of 12 reps","rpe":"9-10","notes":"E) PUMP Segment\n{𝘠𝘰𝘶 𝘤𝘢𝘯 𝘤𝘩𝘰𝘰𝘴𝘦 𝘣𝘦𝘵𝘸𝘦𝘦𝘯 𝘢 triceps 𝘰𝘳 𝘢 𝘨𝘭𝘶𝘵𝘦 𝘱𝘶𝘮𝘱 𝘧𝘰𝘳 𝘵𝘩𝘪𝘴 𝘴𝘦𝘨𝘮𝘦𝘯𝘵. 𝘛𝘩𝘪𝘴 𝘦𝘹𝘦𝘳𝘤𝘪𝘴𝘦 𝘪𝘴 𝘕𝘖𝘛 𝘱𝘢𝘳𝘵 𝘰𝘧 𝘢 𝘴𝘶𝘱𝘦𝘳𝘴𝘦𝘵!}\n💪 TRICEPS:\n1️⃣ Standing Single Arm Band/Cable Upright Triceps Kickback OR Single Arm DB Triceps Kickback: Do a set of 12 reps on each side at a 9-10 RPE. Then, rest 60 seconds and perform a set to failure. Rest 60 seconds again, and perform another set to failure. By the third set, it's okay if you're only getting 6-8 reps!\n⭐ Try to increase by repetitions or increase weight each week!\n🍑 For glutes, try this out:\n2️⃣ Band/Cable 45 Degree Glute Kickbacks OR Quadruped Sin"}]}];

    const isPaired = pairedIds.has(s.id);
    const ex = s.exercise.toLowerCase();
    const isCarry = ex.includes('carry') || ex.includes('march') || ex.includes('hold') || ex.includes('plank');
    const isCore = s.label.toLowerCase().includes('core') || ex.includes('hollow') || ex.includes('plank');
    if (isE) { mins += 10; return; }
    if (isA) { mins += numSets * 1.0; return; }
    if (isPaired) {
      // Each paired section contributes half — they share rest
      mins += numSets * 1.3;
    } else {
      mins += numSets * (isCarry||isCore ? 1.5 : 2.0);
    }
  });
  return Math.round(mins);
}

function fmtTime(mins) {
  if (mins <= 0) return '';
  const lo = mins - 5, hi = mins + 5;
  return `⏱ ~${lo < 45 ? lo : Math.round(lo/5)*5}–${Math.round(hi/5)*5} min`;
}

function scoreWorkout(w,{time,busy,energy}){
  let score=100;
  const sec=w.sections.length;
  const barbs=w.sections.filter(s=>isBarbellEx(s.exercise)).length;
  const blockAge=w.vol-66; // 0-6: 0=Foundation, 6=Final
  // Time: ideal section count scales with time pip
  const idealSec=[4,6,8,10,13][Math.min(time-1,4)];
  score-=Math.abs(sec-idealSec)*5;
  // Busy gym: heavily penalise barbell exercises when gym is packed
  if(busy>=4)score-=barbs*10;
  else if(busy<=2)score+=barbs*3;
  // Energy: match block intensity to energy level
  const idealBlock=Math.round((energy-1)*1.5); // maps 1-5 → 0-6
  score-=Math.abs(blockAge-idealBlock)*6;
  if(energy<=2)score-=sec*2; // low energy → shorter session
  return score;
}

  const hs=ST.homeSession||{time:3,busy:2,energy:3};
  const candidates=WS.filter(w=>!isDone(w));
  if(!candidates.length)return null;
  candidates.sort((a,b)=>scoreWorkout(b,hs)-scoreWorkout(a,hs));
  return candidates[0];
}
function whyRecommended(w,{time,busy,energy}){
  const hints=[];
  const sec=w.sections.length;

  if(time<=2)hints.push(`Short session · ${sec} exercises`);

  if(busy>=4&&barbs===0)hints.push('no barbells needed');
  else if(busy>=4&&barbs<=1)hints.push('minimal barbell work');
  if(energy<=2)hints.push('lighter block');
  else if(energy>=4)hints.push(blockName(w.vol)+' block');
  return hints.join(' · ');
}

  // Clear checked state for this workout
  if(ST.checked[k])ST.checked[k].clear();
  // Reset current set data (keep notes)
  Object.entries(cur).forEach(([sk,sv])=>{if(!sk.startsWith('_')&&sv&&sv.sets)sv.sets=sv.sets.map(s=>({wt:s.wt,reps:''}));});
  saveST();
  if(curW)showSessionSetup(curW);
}

function stripNoteHeader(txt){

  return txt.replace(/^[A-E]\d?\)[^\n]+\n/,'').trimStart();

function fmtSetsInfo(sets_info,rpe){
  if(!sets_info)return rpe?`RPE ${rpe}`:'';
  // Use only the first clean sentence (before any long explanation)
  const s=sets_info.split(/\.\s+(?=[A-Z])/)[0].trim().replace(/\.$/,'');
  return s+(rpe?` · RPE ${rpe}`:'');
}
function fmtRaw(txt){
  return txt
    .replace(/\n\n/g,'\x00')
    .replace(/\n(?=[1-7]️⃣|⭐|📝|💡|➡️|🚩|⚠️|💪|🍑|🦵|🔥|🎯|\[|ALTERNATIVE|OLYMPIC)/g,'\x01')
    .replace(/\n/g,' ')
    .replace(/\x00/g,'<br><br>')
    .replace(/\x01/g,'<br>')
    .replace(/➡️/g,'→')
    .replace(/ {2,}/g,' ');
}
function fmtNote(txt){
  // Split alternatives section so it can be collapsed
  const altIdx=txt.search(/\n(ALTERNATIVES?(?:\s+for\s+\w+)?:?|OLYMPIC LIFTING)/i);
  if(altIdx===-1)return fmtRaw(txt);
  const main=fmtRaw(txt.substring(0,altIdx));

}

/* ─── SWIPE EXERCISE NAVIGATOR ─── */
let curSecGroups=[],curSecIdx=0,touchX0=0;

function getEffectiveSections(w){
  const s=ST.session[wk(w)];
  if(!s||s.time>=3)return w.sections;
  const n=w.sections.length;
  const cut=s.time===1?Math.max(1,Math.ceil(n*0.5)):Math.max(2,Math.ceil(n*0.7));
  return w.sections.slice(0,cut);
}
function getSecGroups(w){
  const secs=getEffectiveSections(w);
  const groups=[],rendered=new Set();
  secs.forEach((s,idx)=>{
    if(rendered.has(s.id))return;
    const pair=s.id.match(/^([A-E])1$/)&&idx+1<secs.length&&secs[idx+1].id===s.id[0]+'2';
    const sB=pair?secs[idx+1]:null;
    if(sB)rendered.add(sB.id);
    const idxA=w.sections.indexOf(s),idxB=sB?w.sections.indexOf(sB):null;
    groups.push({sA:s,sB,idxA,idxB});
  });
  return groups;
}

function isBarbellEx(ex){return/(barbell|^bb |^bb$| bb )/i.test(ex)||/squat|bench press|deadlift|military press|overhead press|bent.?over row/i.test(ex)&&!/dumbbell|db |cable|machine/i.test(ex);}
function renderSecs(w){
  curSecGroups=getSecGroups(w);
  if(curSecIdx>=curSecGroups.length)curSecIdx=0;
  const stage=document.getElementById('sectionList');
  stage.ontouchstart=e=>{touchX0=e.touches[0].clientX;};
  stage.ontouchend=e=>{const dx=e.changedTouches[0].clientX-touchX0;if(Math.abs(dx)>45){if(dx<0)nextSec();else prevSec();}};
  // Time-skip notice
  const sess=ST.session[wk(w)];
  const skipped=w.sections.length-getEffectiveSections(w).length;
  const skipEl=document.getElementById('timeSkipNotice');
  if(skipEl)skipEl.remove();
  if(sess&&sess.time<=2&&skipped>0){
    const notice=`<div class="time-skip-notice" id="timeSkipNotice">⏱ Short session — showing ${getEffectiveSections(w).length} of ${w.sections.length} sections. Last ${skipped} section${skipped>1?'s':''} skipped for time.</div>`;
    stage.insertAdjacentHTML('beforebegin',notice);
  }
  renderCurSec();
}

function nextSec(){if(curSecIdx<curSecGroups.length-1){curSecIdx++;renderCurSec();window.scrollTo(0,0);}}
function prevSec(){if(curSecIdx>0){curSecIdx--;renderCurSec();window.scrollTo(0,0);}}

function renderCurSec(){
  if(!curW||!curSecGroups.length)return;
  const {sA,sB,idxA,idxB}=curSecGroups[curSecIdx];
  const ch=gch(curW),lg=ST.logs[wk(curW)]||{};
  const l=lg[sA.id]||{},lB=sB?(lg[sB.id]||{}):null;
  const ms=getMuscles(sA.exercise),msB=sB?getMuscles(sB.exercise):[];
  const flag=getFlag(sA.exercise);
  const done=ch.has(sA.id)&&(!sB||ch.has(sB.id));
  const wSwaps=(ST.swaps&&ST.swaps[wk(curW)])||{};
  const swapA=wSwaps[sA.id],swapB=sB?wSwaps[sB.id]:null;
  const n=curSecGroups.length;
  const dnA=swapA||(l.variation&&sA.variations&&sA.variations.includes(l.variation)?l.variation:null)||sA.exercise.split(' OR ')[0].split('/')[0].replace(/^[A-E]\d?\) */,'').trim();
  const dnB=sB?(swapB||(lB&&lB.variation&&sB.variations&&sB.variations.includes(lB.variation)?lB.variation:null)||sB.exercise.split(' OR ')[0].split('/')[0].replace(/^[A-E]\d?\) */,'').trim()):'';

  let h='<div class="sec-dots">';
  for(let i=0;i<n;i++){const g=curSecGroups[i];const gd=ch.has(g.sA.id)&&(!g.sB||ch.has(g.sB.id));h+=`<div class="sec-dot${i===curSecIdx?' sec-dot-on':gd?' sec-dot-done':''}"></div>`;}
  h+='</div>';

  h+=`<div class="swc${done?' swc-done':''}">`;
  if(sB){
    h+=`<div class="swc-head">
      <div class="ss-badge-row"><span class="sbdg">${sA.id}</span><span class="ss-sep">+</span><span class="sbdg">${sB.id}</span><span class="ss-super-label">Superset · alternate sets</span></div>

    h+=renderSets(sA.id, sA.sets_info, l.sets);

function togDone(sid,sid2){
  if(!curW)return;const ch=gch(curW);
  const wasDone=ch.has(sid)&&(!sid2||ch.has(sid2));
  if(wasDone){ch.delete(sid);if(sid2)ch.delete(sid2);}
  else{ch.add(sid);if(sid2)ch.add(sid2);showToast('Section done! \U0001F4AA');}
  saveST();renderCurSec();updProg(curW);
}
function updProg(w){const ch=gch(w),t=w.sections.length,d=ch.size;const btn=document.getElementById('doneBtn');if(btn)btn.style.display=(d===t&&t>0)?'none':'block';}
function calcSessionVolume(w){let total=0;const lg=ST.logs[wk(w)]||{};w.sections.forEach(s=>{const l=lg[s.id];if(!l||!l.sets)return;l.sets.forEach(set=>{const wt=parseFloat(set.wt)||0,reps=parseInt(set.reps)||0;total+=wt*reps;});});return total;}
function getCardioCTA(sess){const opts=[];const t=sess?sess.time:3,e=sess?sess.energy:3;if(t<=2){return null;}if(t>=4&&e>=3){opts.push({icon:'🚲',name:'Bike intervals',desc:'10×(1 min hard / 1 min easy) — 20 min'});opts.push({icon:'🏃',name:'Treadmill tempo',desc:'15 min at a pace you can hold but not chat'});opts.push({icon:'🚣',name:'Rowing',desc:'5×(2 min hard / 1 min easy) — 15 min'});}else if(e>=2){opts.push({icon:'🚶',name:'Post-workout walk',desc:'10–20 min easy walk — blunts glucose spike'});opts.push({icon:'🚲',name:'Easy bike',desc:'15–20 min steady, conversational pace'});}else{opts.push({icon:'🚶',name:'Light walk',desc:'10 min easy — active recovery, helps soreness'});}return opts;}
function markAllDone(){
  if(!curW)return;
  const ch=gch(curW);curW.sections.forEach(s=>ch.add(s.id));

    <div class="cardio-options">${cardioOpts.map(o=>`<span class="cardio-opt">${o.icon} ${o.name} — ${o.desc}</span>`).join('')}</div></div>`;
  }
  h+=`<button onclick="openExport()" style="width:100%;margin-top:10px;padding:11px;border-radius:11px;border:1px solid var(--ac3);background:rgba(60,145,230,.08);color:var(--ac3);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer">📤 Export to Claude</button>`;

/* ─── EXPORT ─── */
function buildExportText(){
  const doneWs=WS.filter(w=>isDone(w)).sort((a,b)=>a.vol!==b.vol?a.vol-b.vol:a.week!==b.week?a.week-b.week:a.day-b.day);
  const hasLogs=Object.keys(ST.logs).length>0;
  let txt=`RISE TRAINING LOG — Eugenia\nExported: ${new Date().toLocaleDateString()}\nTotal workouts completed: ${doneWs.length} of ${WS.length}\n\nPROFILE: Returning lifter, 6-12mo prior experience, 1-2yr break. Band-assisted pull-ups. Learning Olympic lifts (DB/KB only). Prediabetic — managing blood sugar through training.\n\n`;
  if(!hasLogs&&doneWs.length===0){txt+='No workouts logged yet.\n';return txt;}
  txt+='=== COMPLETED WORKOUTS ===\n\n';
  doneWs.forEach(w=>{
    const lg=ST.logs[wk(w)]||{};
    txt+=`${w.id} — Vol.${w.vol} (Day ${w.day})\n`;
    w.sections.forEach(s=>{
      const l=lg[s.id]||{};
      const hasSets=l.sets&&l.sets.some(st=>st.wt||st.reps);
      const hasData=hasSets||l.notes||l.variation||l.weight||l.reps;
      if(hasData){
        txt+=`  ${s.id}) ${s.exercise.substring(0,45)}\n`;
        if(l.variation) txt+=`     Variation: ${l.variation}\n`;
        if(hasSets){
          l.sets.forEach((st,i)=>{if(st.wt||st.reps)txt+=`     Set ${i+1}: ${st.wt?st.wt+'kg':''}${st.reps?' × '+st.reps+' reps':''}\n`;});
        } else {
          if(l.weight) txt+=`     Weight: ${l.weight}\n`;
          if(l.reps) txt+=`     Reps: ${l.reps}\n`;
        }
        if(l.notes) txt+=`     Notes: ${l.notes}\n`;
      }
    });
    txt+='\n';
  });
  if(doneWs.length>0&&!hasLogs){txt+='(Workouts marked complete but no weights/reps logged yet — start logging in each exercise card!)\n';}
  txt+=`\n=== REQUEST ===\nPlease analyse my training log and provide:\n1. Progress assessment — am I improving in the right areas?\n2. Weight/rep progression recommendations for next week\n3. Any form or recovery concerns based on my notes\n4. What I should focus on in my next session`;
  return txt;
}

function openExport(){
  document.getElementById('exportText').textContent=buildExportText();
  document.getElementById('exportModal').classList.add('open');
}
function closeExport(){document.getElementById('exportModal').classList.remove('open');}
function copyExport(){
  const txt=document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(txt).then(()=>showToast('Copied! Paste into Claude 📋')).catch(()=>{document.getElementById('exportText').select?.();document.execCommand?.('copy');showToast('Copied!');});
}
function downloadExport(){
  const txt=buildExportText();
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`rise-log-${new Date().toISOString().slice(0,10)}.txt`;a.click();showToast('Downloaded! ⬇️');
}

/* ─── PROGRESS ─── */
function renderProgress(){
  const total=WS.length,done=WS.filter(w=>isDone(w)).length,pct=total>0?Math.round((done/total)*100):0;
  const streak=calcStreak();
  const byDay={};WS.forEach(w=>{const k=DAY_NAMES_FULL[w.day]||'Day '+w.day;if(!byDay[k]){byDay[k]={done:0,total:0,day:w.day};}byDay[k].total++;if(isDone(w))byDay[k].done++;});
  let vhtml='';
  for(const[k,v] of Object.entries(byDay).sort((a,b)=>a[1].day-b[1].day)){
    const vp=v.total>0?Math.round((v.done/v.total)*100):0;
    vhtml+=`<div class="vol-row"><div class="vol-label"><span style="color:var(--tx);font-weight:500;font-size:12px">${k}</span><span style="font-size:11px;color:var(--mu)">${v.done}/${v.total}</span></div><div class="pbo"><div class="pbi" style="width:${vp}%"></div></div></div>`;
  }
  const suggs=getCoachSuggs();
  let h=`<div class="pcard"><div class="pcard-title">YOUR PROGRESS</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${done}</div><div class="stat-lbl">Done</div></div>
      <div class="stat-box"><div class="stat-num">${total-done}</div><div class="stat-lbl">Left</div></div>
      <div class="stat-box"><div class="stat-num">${streak}</div><div class="stat-lbl">Streak 🔥</div></div>
    </div>
    <div style="margin-top:10px"><div class="pbo"><div class="pbi" style="width:${pct}%"></div></div><div class="ppct">${pct}% of program complete</div></div>
  </div>
  <div class="pcard"><div class="pcard-title">BY WORKOUT TYPE</div>${vhtml}</div>`;
  suggs.forEach(s=>{h+=`<div class="ccard"><div class="ccard-hd"><div class="ccard-icon">${s.icon}</div><div class="ccard-title">${s.title}</div></div><div class="ccard-body">${s.body}</div>${s.action?`<div class="ccard-action" onclick="openW('${s.action.key}')"><div><div class="ca-text">${s.action.label}</div><div class="ca-sub">${s.action.sub}</div></div><div style="color:var(--mu)">›</div></div>`:''}</div>`;});
  document.getElementById('progressContent').innerHTML=h;
}
function calcStreak(){const e=Object.entries(ST.sched).sort(([a],[b])=>b.localeCompare(a));let s=0;for(const[,wkey] of e){const w=WS.find(x=>wk(x)===wkey);if(w&&isDone(w))s++;else break;}return s;}
function getCoachSuggs(){
  const suggs=[],donedWs=WS.filter(w=>isDone(w)),nextW=getNextWorkout(),nextDay=getNextDay();
  const dayNames={1:'Lower Body + Pull',2:'Bench + Upper Pull',3:'Deadlift + Core',4:'Press + Row'};
  if(nextW){const d=getDiff(nextW),mins=estimateTime(nextW);suggs.push({icon:'➡️',title:`UP NEXT: ${blockName(nextW.vol)} · Session ${nextW.day}`,body:`Rated <strong>${d.label}</strong> · ~${fmtTime(mins)}. ${d.why.split('.')[0]}.`,action:{label:`${blockName(nextW.vol)} · Session ${nextW.day}`,sub:nextW.sections[0]?.exercise.split(' OR ')[0].substring(0,45)||'',key:wk(nextW)}});}
  const hasLogs=Object.values(ST.logs).some(l=>Object.values(l).some(s=>s.weight||s.reps));
  if(!hasLogs){suggs.push({icon:'📝',title:'START LOGGING',body:'Tap any exercise card and expand it to log your weights and reps. After 2-3 sessions you\'ll have data to track progression. This is how you replace having a trainer watching you — the numbers tell the story.'});}
  else{suggs.push({icon:'📈',title:'PROGRESSIVE OVERLOAD',body:'For your key lifts (Squat, Bench, Deadlift, Military Press): aim to add <strong>2.5–5 lbs or 1 extra rep</strong> each week. Hit the top of the rep range <strong>2 weeks in a row</strong>? Go heavier next week. Export your log to Claude for a full analysis anytime.'});}
  suggs.push({icon:'🎯',title:'YOUR THREE FOCUS AREAS',body:'<strong>Pull-ups:</strong> Band every session, thinner band each month. <strong>Plyometrics:</strong> Always use beginner alt first, build over weeks — quiet landings before big heights. <strong>Olympic lifts:</strong> Dumbbells only, light weight, timing before load. These will improve the most across the full program.'});
  suggs.push({icon:'📤',title:'EXPORT TO CLAUDE FOR COACHING',body:'After finishing a workout, tap <strong>Export to Claude</strong> on the workout screen. Paste the text into any Claude chat and ask for analysis, progression advice, or help with specific exercises. The export includes your full training history.'});
  return suggs;
}

/* ─── CALENDAR ─── */
const MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DNAMES=['S','M','T','W','T','F','S'];
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function calNav(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}calSel=null;renderCal();}
function getWeekSchedCount(dateStr){const d=new Date(dateStr+'T12:00:00'),sw=new Date(d);sw.setDate(d.getDate()-d.getDay());const ew=new Date(sw);ew.setDate(sw.getDate()+6);return Object.keys(ST.sched).filter(dk2=>{const dd=new Date(dk2+'T12:00:00');return dd>=sw&&dd<=ew;}).length;}
function renderCal(){
  document.getElementById('calMonth').textContent=`${MNAMES[calM]} ${calY}`;
  const td=new Date(),tdk=dk(td.getFullYear(),td.getMonth(),td.getDate()),fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  let h=DNAMES.map(d=>`<div class="cdn">${d}</div>`).join('');
  for(let i=0;i<fd;i++)h+='<div></div>';
  for(let d=1;d<=dim;d++){
    const dkey=dk(calY,calM,d),sch=ST.sched[dkey],w=sch?WS.find(x=>wk(x)===sch):null;
    const isCDone=w&&isDone(w),isSel=dkey===calSel;
    let cls='cc';if(dkey===tdk)cls+=' today';if(sch)cls+=' sched';if(isCDone)cls+=' cdone';if(isSel)cls+=' csel';
    h+=`<div class="${cls}" onclick="calClick('${dkey}')"><div class="cnum">${d}</div><div class="cdot"></div>${sch&&w?`<div class="cmini">${w.id}</div>`:''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=h;renderSP();renderUP();
}
function calClick(dkey){calSel=calSel===dkey?null:dkey;renderCal();}
function renderSP(){
  if(!calSel){document.getElementById('schedPanel').innerHTML='';return;}
  const d=new Date(calSel+'T12:00:00'),label=`${MNAMES[d.getMonth()]} ${d.getDate()}`,cur=ST.sched[calSel],wkCount=getWeekSchedCount(calSel),sugDay=Math.min(wkCount+1,4);
  const sorted=sortedWS();
  let h=`<div class="sp"><div class="sp-tt">Schedule — ${label}</div>`;
  if(!cur)h+=`<div class="sp-hint">💡 ${wkCount} session${wkCount!==1?'s':''} this week — suggesting Day ${sugDay} first</div>`;
  h+='<div class="sp-sc">';
  if(cur){const w=WS.find(x=>wk(x)===cur);if(w)h+=`<div class="spi pk"><div><div class="spi-id">✓ ${w.id} — ${DAY_NAMES_FULL[w.day]||'Day '+w.day}</div><div class="spi-ex">${w.sections[0]?.exercise.split(' OR ')[0].substring(0,40)||''} · ${fmtTime(estimateTime(w))}</div></div><button class="sprm" onclick="unsched('${calSel}')">Remove</button></div>`;}
  else{
    const sugg=sorted.filter(w=>w.day===sugDay&&!isDone(w));
    const others=sorted.filter(w=>w.day!==sugDay);
    sugg.forEach(w=>{h+=`<div class="spi sug" onclick="doSched('${calSel}','${wk(w)}')"><div><div class="spi-id">${w.id} — ${DAY_NAMES_FULL[w.day]||'Day '+w.day}<span class="sug-tag">SUGGESTED</span></div><div class="spi-ex">${w.sections[0]?.exercise.split(' OR ')[0].substring(0,36)||''} · ${fmtTime(estimateTime(w))}</div></div></div>`;});
    others.forEach(w=>{h+=`<div class="spi" onclick="doSched('${calSel}','${wk(w)}')"><div><div class="spi-id">${w.id} — ${DAY_NAMES_FULL[w.day]||'Day '+w.day}${dbg(w.day)}</div><div class="spi-ex">${w.sections[0]?.exercise.split(' OR ')[0].substring(0,36)||''} · ${fmtTime(estimateTime(w))}</div></div></div>`;});
  }
  h+='</div></div>';document.getElementById('schedPanel').innerHTML=h;
}
function doSched(dkey,wkey){ST.sched[dkey]=wkey;saveST();renderCal();showToast('Scheduled! 📅');}
function unsched(dkey){delete ST.sched[dkey];calSel=null;saveST();renderCal();}
function renderUP(){
  const td=new Date();
  const up=Object.entries(ST.sched).filter(([d])=>new Date(d+'T12:00:00')>=td).sort(([a],[b])=>a.localeCompare(b)).slice(0,4);
  if(!up.length){document.getElementById('upcomingSection').innerHTML='';return;}
  let h='<div class="ups"><div class="uph">COMING UP</div>';
  up.forEach(([dkey,wkey2])=>{const w=WS.find(x=>wk(x)===wkey2);if(!w)return;const d2=new Date(dkey+'T12:00:00'),ms=wMuscles(w).slice(0,3).join(' · ');h+=`<div class="upc" onclick="openW('${wkey2}')"><div class="updb"><div class="upm">${MNAMES[d2.getMonth()].slice(0,3)}</div><div class="upn">${d2.getDate()}</div></div><div class="upi"><div class="upid">${w.id} <span style="font-size:10px;color:var(--mu)">${DAY_NAMES_FULL[w.day]||''}</span></div><div class="upms">${ms} · ${fmtTime(estimateTime(w))}</div></div><div style="color:var(--mu)">›</div></div>`;});
  h+='</div>';document.getElementById('upcomingSection').innerHTML=h;
}

/* ─── MUSCLES ─── */
function renderMG(){
  const groups={'Legs & Glutes':['Quads','Glutes','Hamstrings','Adductors','Calves','Achilles'],'Back':['Lats','Rhomboids','Lower Back','Traps'],'Chest':['Chest'],'Shoulders':['Shoulders','Lateral Delts','Rear Delts','Rotator Cuff'],'Arms':['Biceps','Triceps','Forearms'],'Core':['Core','Abs','Obliques','Hip Flexors']};
  const subs={'Quads':['Leg Press','Hack Squat','Leg Extension'],'Glutes':['Hip Thrust','Cable Kickback','Banded Clam Shell'],'Hamstrings':['Leg Curl Machine','Nordic Curl'],'Chest':['DB Flye','Cable Crossover','Pec Deck'],'Lats':['Lat Pulldown','Seated Cable Row'],'Shoulders':['DB Overhead Press','Cable Lateral Raise'],'Biceps':['Incline DB Curl','Cable Curl'],'Triceps':['Overhead Tricep Ext','Cable Pushdown'],'Core':['Dead Bug','Bird Dog','Pallof Press'],'Calves':['Standing Calf Raise','Seated Calf Raise'],'Rear Delts':['Reverse Pec Deck','Band Pull-Apart']};
  const m2ex={};WS.forEach(w=>w.sections.forEach(s=>{getMuscles(s.exercise).forEach(m=>{if(!m2ex[m])m2ex[m]=new Set();m2ex[m].add(s.exercise.split(' OR ')[0].trim().substring(0,40));});}));
  let h='<div class="mgh">MUSCLE GROUPS IN YOUR PROGRAM</div>';
  h+=`<div class="pcard" style="margin-bottom:8px;font-size:12px;color:#bbb;line-height:1.6">All 94 workouts across Vol. 66–72. Tap any exercise card to see its muscle tags. Use the substitution ideas below when you need to swap for equipment or variety.</div>`;
  for(const[g,ms] of Object.entries(groups)){
    const rows=ms.map(m=>({m,exs:[...(m2ex[m]||[])].slice(0,2)})).filter(x=>x.exs.length);
    if(!rows.length)continue;
    h+=`<div class="mgg"><div class="mggn">${g}</div>`;
    rows.forEach(({m,exs})=>{const alts=(subs[m]||[]).slice(0,3);h+=`<div class="mgr"><span class="mt ${tc(m)}">${m}</span><span class="mgex">${exs.join(', ')}</span></div>`;if(alts.length)h+=`<div class="mgsub">↔ Sub: ${alts.join(', ')}</div>`;});
    h+='</div>';
  }
  document.getElementById('muscleGuide').innerHTML=h;
}

loadST();
